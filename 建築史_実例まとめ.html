const root=document.getElementById("root"), nav=document.getElementById("nav");
DATA.forEach((sec,si)=>{
  let cnt=0; sec.groups.forEach(g=>cnt+=g.items.length);
  const a=document.createElement("a");
  a.href="#sec-"+sec.id;
  a.innerHTML=`${sec.title}<span class="ct">${cnt}</span>`;
  nav.appendChild(a);

  const s=document.createElement("section");
  s.className="sec"; s.id="sec-"+sec.id;
  let html=`<div class="pagebar"><span class="no">${String(si+1).padStart(2,"0")}</span>
    <h2>${sec.title}</h2><span class="sub">${sec.sub}　全${cnt}件</span></div>`;
  sec.groups.forEach(g=>{
    html+=`<h3 class="grp">${g.name}${g.en?`<span class="en">${g.en}</span>`:""}</h3>`;
    html+=`<div class="tw"><table><colgroup><col class="c-name"><col class="c-meta"><col class="c-kw"><col class="c-warn"></colgroup>
      <thead><tr><th>建築物</th><th>所在・時代</th><th>様式・キーワード</th><th>⚠ ひっかけ注意</th></tr></thead><tbody>`;
    g.items.forEach(it=>{
      const first=Array.isArray(it.tags[0])?it.tags[0][0]:it.tags[0];
      const rest=it.tags.slice(1).map(t=>Array.isArray(t)?t[0]:t).join("・");
      const kw=`<span class="kw1">${first}</span>${rest?`<span class="kwrest">${rest}</span>`:""}`;
      const note=(it.note||"").replace(/^⚠/,"");
      html+=`<tr><td class="name">${it.n}</td><td class="meta">${it.meta}</td>
        <td>${kw}</td><td class="warn${note?"":" empty"}">${note}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  s.innerHTML=html; root.appendChild(s);
});
</script>
