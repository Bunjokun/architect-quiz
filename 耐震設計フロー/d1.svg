<text x="76" y="781.7166666666667" font-family="Noto Sans CJK JP, sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#000">○鉄骨造</text>
<text x="76" y="795.4166666666666" font-family="Noto Sans CJK JP, sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#000">   階数≦3</text>
