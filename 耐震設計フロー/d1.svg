<text x="76" y="863.9166666666666" font-family="Noto Sans CJK JP, sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#000">○鉄筋コンクリート造及び鉄骨鉄</text>
<text x="76" y="877.6166666666667" font-family="Noto Sans CJK JP, sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#000">   筋コンクリート造</text>
<text x="76" y="891.3166666666666" font-family="Noto Sans CJK JP, sans-serif" font-size="11" text-anchor="start" font-weight="normal" fill="#000">   高さ≦20m</text>
