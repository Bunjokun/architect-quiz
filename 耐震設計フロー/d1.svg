<text x="308" y="782.1" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  筋かいを含む階の応力の割増し。</text>
<text x="308" y="795.3" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  筋かいの破断の防止。柱,梁,接</text>
<text x="308" y="808.5" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  合部の急激な耐力低下の防止</text>
