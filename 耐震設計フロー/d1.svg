<text x="308" y="834.9" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  筋かい架構の応力の割増し,筋かい</text>
<text x="308" y="848.0999999999999" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  端部・接合部の破断防止,局部座屈</text>
<text x="308" y="861.3" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  等の防止及び柱脚部の破壊防止等</text>
<text x="308" y="874.5" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">○鉄筋コンクリート造及び鉄骨鉄筋</text>
<text x="308" y="887.6999999999999" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  コンクリート造</text>
<text x="308" y="900.9" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  壁量・柱量の確保</text>
<text x="308" y="914.0999999999999" font-family="Noto Sans CJK JP, sans-serif" font-size="10.5" text-anchor="start" font-weight="normal" fill="#000">  部材のせん断破壊防止   等</text>
