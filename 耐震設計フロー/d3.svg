<text x="44" y="69" font-family="Noto Sans CJK JP, sans-serif" font-size="16" text-anchor="start" font-weight="bold" fill="#fff">6  鉄骨造の耐震計算</text>
<text x="34" y="100" font-family="Noto Sans CJK JP, sans-serif" font-size="13.5" text-anchor="start" font-weight="bold" fill="#000">1. 耐震計算の方針</text>
<text x="34" y="124.83333333333333" font-family="Noto Sans CJK JP, sans-serif" font-size="11.5" text-anchor="start" font-weight="normal" fill="#000">  鉄骨造建築物は, 部材の座屈や, 部材間の接合部の破壊が生じない限り, 鋼材の優れた特性により, 靱性に富む構</text>
<text x="34" y="141.83333333333331" font-family="Noto Sans CJK JP, sans-serif" font-size="11.5" text-anchor="start" font-weight="normal" fill="#000">造物となり得る。そのため, 部材の座屈と接合部の破断の防止により, 鋼素材の本来の特性を生かして十分な耐震性</text>
<text x="34" y="158.83333333333331" font-family="Noto Sans CJK JP, sans-serif" font-size="11.5" text-anchor="start" font-weight="normal" fill="#000">を発揮できるように設計することが鋼構造設計の最も重要なことである。</text>
<text x="34" y="192" font-family="Noto Sans CJK JP, sans-serif" font-size="13.5" text-anchor="start" font-weight="bold" fill="#000">2. 耐震計算のフロー</text>
