<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>○×問題集 — 一級建築士</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Meiryo",sans-serif;background:#f0f2f7;color:#1a2744;min-height:100vh}
header{background:#1a2744;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:17px;font-weight:700}
header a{color:#8fa3c8;font-size:13px;text-decoration:none;margin-left:auto}
header a:hover{color:#fff}

.container{max-width:700px;margin:0 auto;padding:16px}

/* フィルター */
.filter-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.filter-card h2{font-size:14px;font-weight:700;margin-bottom:10px;color:#1a2744}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:2px solid #dde2ee;background:#fff;color:#555;cursor:pointer;transition:all .15s}
.tag.active{background:#1a2744;border-color:#1a2744;color:#fff}
.tag.topic-tag.active{background:#4f8ef7;border-color:#4f8ef7;color:#fff}

/* スタート */
.start-row{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary{background:#1a2744;color:#fff}
.btn-primary:hover{background:#243057}
.btn-ghost{background:#f0f2f7;color:#1a2744}
.count-badge{font-size:13px;color:#666}

/* モード・問題数セレクター */
.mode-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.mode-label{font-size:12px;color:#888;font-weight:600;white-space:nowrap}
.seg-btn{padding:5px 14px;border:2px solid #dde2ee;border-radius:20px;font-size:12px;font-weight:700;background:#fff;color:#555;cursor:pointer;transition:all .15s}
.seg-btn.active{background:#1a2744;border-color:#1a2744;color:#fff}
.seg-btn.warn.active{background:#e67e22;border-color:#e67e22;color:#fff}

/* 全体正答率バー */
.acc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8faff;border:1px solid #dde8ff;border-radius:8px;margin-top:10px;flex-wrap:wrap}
.acc-title{font-size:12px;color:#555;font-weight:700;white-space:nowrap}
.acc-pct{font-size:20px;font-weight:700;color:#1a2744}
.acc-detail{font-size:11px;color:#888}
.acc-bar-wrap{flex:1;min-width:80px}
.acc-bar-bg{height:6px;background:#e8ecf5;border-radius:3px;overflow:hidden}
.acc-bar-fill{height:100%;background:#27ae60;border-radius:3px;transition:width .4s}

/* カード */
.q-card{background:#fff;border-radius:12px;padding:22px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.q-meta{font-size:11px;color:#999;margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap}
.q-meta span{background:#f0f2f7;padding:2px 8px;border-radius:10px}
.q-text{font-size:15px;line-height:1.8;margin-bottom:18px}

/* ○× ボタン */
.ans-row{display:flex;gap:12px}
.ans-btn{flex:1;padding:14px;border-radius:10px;border:2px solid #dde2ee;background:#fff;font-size:28px;cursor:pointer;transition:all .15s;font-weight:700}
.ans-btn:hover{transform:scale(1.04)}
.ans-btn.maru{border-color:#e74c3c;color:#e74c3c}
.ans-btn.maru:hover,.ans-btn.maru.selected{background:#e74c3c;border-color:#e74c3c;color:#fff}
.ans-btn.batsu{border-color:#3498db;color:#3498db}
.ans-btn.batsu:hover,.ans-btn.batsu.selected{background:#3498db;border-color:#3498db;color:#fff}
.ans-btn:disabled{cursor:default;transform:none}
.ans-btn.correct{box-shadow:0 0 0 3px #27ae60}
.ans-btn.wrong{opacity:.4}

/* 解説 */
.result-box{display:none;margin-top:14px;padding:14px;border-radius:8px;font-size:13px;line-height:1.8}
.result-box.correct{background:#f0faf4;border:1px solid #a9dfbf}
.result-box.wrong{background:#fef9f9;border:1px solid #f5b7b1}
.result-box .verdict{font-size:16px;font-weight:700;margin-bottom:6px}
.result-box.correct .verdict{color:#1e8449}
.result-box.wrong .verdict{color:#c0392b}
.result-box .exp-text{color:#444}

/* スコアバー */
.score-bar{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.score-num{font-size:28px;font-weight:700;color:#1a2744}
.score-sub{font-size:12px;color:#888}
.progress-wrap{flex:1;min-width:120px}
.progress-bar{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#4f8ef7;border-radius:4px;transition:width .3s}

.next-btn{display:none;margin-top:12px;width:100%}
.finish-card{background:#fff;border-radius:12px;padding:30px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.finish-card .big{font-size:48px;font-weight:700;color:#1a2744;margin-bottom:8px}
.finish-card .sub{color:#888;font-size:14px;margin-bottom:20px}
.hidden{display:none}
.hist-stat{font-size:12px;font-weight:700;background:#f8f8f8;border:1px solid #e8e8e8;border-radius:10px;padding:2px 8px}
.hist-o{color:#e74c3c}
.hist-x{color:#3498db}

/* マイリスト */
.mylist-overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.52);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:12px;padding-bottom:max(12px,env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch}
.mylist-overlay.hidden{display:none}
.mylist-panel{background:#fff;border-radius:12px;max-width:700px;width:100%;max-height:calc(100vh - 24px);max-height:calc(100dvh - 24px);overflow:hidden;display:flex;flex-direction:column}
.mylist-header{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid #eee;gap:10px;flex-shrink:0}
.mylist-header h2{flex:1;font-size:15px;font-weight:700;color:#1a2744}
.mylist-tabs{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid #eee;flex-wrap:wrap;flex-shrink:0;background:#fafafa;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mylist-tab{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;border:2px solid #dde2ee;background:#fff;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap}
.mylist-tab.active{background:#1a2744;border-color:#1a2744;color:#fff}
.mylist-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 env(safe-area-inset-bottom,12px)}
.mylist-subject-head{font-size:12px;font-weight:700;color:#fff;background:#1a2744;padding:6px 16px;position:sticky;top:0;z-index:1}
.mylist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid #f2f2f2}
.mylist-item:hover{background:#f8faff}
.mylist-q{flex:1;font-size:13px;line-height:1.7;color:#222}
.mylist-topic{font-size:10px;color:#999;background:#f0f2f7;padding:1px 6px;border-radius:8px;display:inline-block;margin-bottom:3px}
.mylist-ans{font-size:24px;font-weight:700;flex-shrink:0;width:30px;text-align:center;line-height:1}
.mylist-ans.maru{color:#e74c3c}
.mylist-ans.batsu{color:#3498db}
.mylist-stat{font-size:11px;color:#888;flex-shrink:0;text-align:right;white-space:nowrap;line-height:1.6;padding-top:2px}
.mylist-empty{padding:48px 20px;text-align:center;color:#aaa;font-size:14px;line-height:1.8}
</style>
</head>
<body>
<header>
  <h1>○×問題集</h1>
  <a href="exam_tracker.html">← トラッカーに戻る</a>
</header>

<div class="container">

  <!-- フィルター -->
  <div class="filter-card" id="filter-section">
    <h2>科目</h2>
    <div class="tag-row" id="subject-tags"></div>
    <h2 style="margin-top:12px">分野</h2>
    <div class="tag-row" id="topic-tags"></div>
    <!-- モード選択 -->
    <div class="mode-row" style="margin-top:12px">
      <span class="mode-label">モード：</span>
      <button class="seg-btn active" id="mode-all" onclick="setMode('all',this)">通常</button>
      <button class="seg-btn warn" id="mode-weighted" onclick="setMode('weighted',this)">苦手優先 ⚡</button>
      <button class="seg-btn warn" id="mode-wrong" onclick="setMode('wrong',this)">苦手のみ ✗</button>
      <button class="seg-btn" id="mode-new" onclick="setMode('new',this)">未回答のみ ★</button>
    </div>
    <!-- 問題数選択 -->
    <div class="mode-row">
      <span class="mode-label">問題数：</span>
      <button class="seg-btn" id="cnt-10" onclick="setCount(10,this)">10問</button>
      <button class="seg-btn" id="cnt-20" onclick="setCount(20,this)">20問</button>
      <button class="seg-btn" id="cnt-30" onclick="setCount(30,this)">30問</button>
      <button class="seg-btn active" id="cnt-all" onclick="setCount(0,this)">全問</button>
    </div>
    <!-- 全体正答率 -->
    <div class="acc-row" id="acc-row"></div>
    <div class="start-row">
      <button class="btn btn-primary" onclick="startQuiz()">スタート</button>
      <button class="btn btn-ghost" onclick="selectAll()">全選択</button>
      <button class="btn btn-ghost" style="border:2px solid #e67e22;color:#e67e22;background:#fff" onclick="showMylist()">マイリスト 📋</button>
      <span class="count-badge" id="count-badge">0問</span>
    </div>
  </div>

  <!-- スコア -->
  <div class="score-bar hidden" id="score-bar">
    <div>
      <div class="score-num" id="score-disp">0 / 0</div>
      <div class="score-sub">正解 / 回答済み</div>
    </div>
    <div>
      <div class="score-num" style="font-size:20px;color:#27ae60" id="acc-disp">－</div>
      <div class="score-sub">正答率</div>
    </div>
    <div class="progress-wrap">
      <div style="font-size:12px;color:#888;margin-bottom:4px" id="progress-label">0 / 0 問</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="endQuiz()">中断</button>
  </div>

  <!-- 問題エリア -->
  <div id="quiz-area"></div>

  <!-- マイリスト -->
  <div class="mylist-overlay hidden" id="mylist-overlay" onclick="closeMylistOnBg(event)">
    <div class="mylist-panel" onclick="event.stopPropagation()">
      <div class="mylist-header">
        <h2>マイリスト — 2回以上間違えた問題</h2>
        <button class="btn btn-ghost" style="padding:5px 14px;font-size:12px" onclick="closeMylist()">✕ 閉じる</button>
      </div>
      <div class="mylist-tabs" id="mylist-tabs"></div>
      <div class="mylist-body" id="mylist-body"></div>
    </div>
  </div>

  <!-- 完了 -->
  <div class="finish-card hidden" id="finish-card">
    <div class="big" id="finish-score"></div>
    <div class="sub" id="finish-sub"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="backToFilter()">分野選択に戻る</button>
      <button class="btn btn-ghost" onclick="location.reload()">最初からやり直す</button>
    </div>
  </div>

</div>

<script>
const ALL_Q = [
  // ── 荷重・外力：固有周期・応答スペクトル ──
  {subject:"構造",topic:"荷重・外力",
   q:"建築物の一次固有周期は、一般に、二次固有周期に比べて長い。",
   alt:{q:"建築物の一次固有周期は、一般に、二次固有周期に比べて短い。", ans:false},
   ans:true,
   exp:"一次（基本）振動モードが最も長い周期をもつ。固有周期は振動次数が高くなるほど短くなる。"},
  {subject:"構造",topic:"荷重・外力",
   q:"地震動の変位応答スペクトルは、一般に、周期が長くなるほど小さくなる。",
   alt:{q:"地震動の変位応答スペクトルは、一般に、周期が長くなるほど大きくなる。", ans:true},
   ans:false,
   exp:"変位応答スペクトルSdは周期が長くなるほど大きくなる。加速度応答スペクトルSaは長周期域で小さくなるが、変位は逆の傾向を示す。"},

  // ── 荷重・外力：風荷重 ──
  {subject:"構造",topic:"荷重・外力",
   q:"風圧力における平均風速の高さ方向の分布を表す係数Erは、建築物の高さが同じ場合、「極めて平坦で障害物がない区域」より「都市化が極めて著しい区域」のほうが小さい。",
   alt:{q:"風圧力における平均風速の高さ方向の分布を表す係数Erは、建築物の高さが同じ場合、「極めて平坦で障害物がない区域」より「都市化が極めて著しい区域」のほうが大きい。", ans:false},
   ans:true,
   exp:"Erは地表面粗度区分が大きい（都市化が著しいほど障害物が多い）ほど小さくなる。粗度区分ⅣはⅠより小さなEr値となる。"},
  {subject:"構造",topic:"荷重・外力",
   q:"ガスト影響係数Gfは、一般に、建築物の高さと軒の高さとの平均Hの値が大きくなるほど、大きくなる。",
   alt:{q:"ガスト影響係数Gfは、一般に、建築物の高さと軒の高さとの平均Hの値が大きくなるほど、小さくなる。", ans:true},
   ans:false,
   exp:"GfはHが大きくなるほど小さくなる。建物が高くなると平均風速が支配的になり、ガスト成分の影響割合が相対的に減少するため。"},

  // ── 荷重・外力：地震荷重 ──
  {subject:"構造",topic:"荷重・外力",
   q:"建築物の地上部分における各層の地震層せん断力係数Ciは、最下層における値が最も大きくなる。",
   alt:{q:"建築物の地上部分における各層の地震層せん断力係数Ciは、最下層における値が最も小さくなる。", ans:true},
   ans:false,
   exp:"CiはAi（高さ方向の分布係数）の影響により最上層が最も大きくなる。下層ほどCiは小さく、1階が最小。"},
  {subject:"構造",topic:"荷重・外力",
   q:"各階の保有水平耐力計算において、剛性率が0.6を上回る場合、又は偏心率が0.15を下回る場合には、必要保有水平耐力の値を割増しする。",
   alt:{q:"各階の保有水平耐力計算において、剛性率が0.6を下回る場合、又は偏心率が0.15を上回る場合には、必要保有水平耐力の値を割増しする。", ans:true},
   ans:false,
   exp:"割増しが必要なのは「剛性率が0.6を下回る場合」または「偏心率が0.15を上回る場合」。上回る/下回るの向きが重要。"},
  {subject:"構造",topic:"荷重・外力",
   q:"建築物の地上部分における各層の地震層せん断力Qiは、最下層の値が最も小さくなる。",
   alt:{q:"建築物の地上部分における各層の地震層せん断力Qiは、最下層の値が最も大きくなる。", ans:true},
   ans:false,
   exp:"Qiは各層以上に作用する地震力の合計であり、最下層が最も大きくなる。最上層が最も小さい。"},
  {subject:"構造",topic:"荷重・外力",
   q:"地震時の短期に生ずる力については、特定行政庁が指定する多雪区域においては、積雪荷重を考慮する。",
   alt:{q:"地震時の短期に生ずる力については、特定行政庁が指定する多雪区域においても、積雪荷重を考慮する必要はない。", ans:false},
   ans:true,
   exp:"多雪区域では地震時荷重に積雪荷重（積雪荷重×0.35）を加算して短期応力を算定する（令88条2項）。"},

  // ── 積載荷重 ──
  {subject:"構造",topic:"荷重・外力",
   q:"単位面積当たりの積載荷重は、建築物の実況に応じて計算しない場合、「床の構造計算」・「大梁・柱・基礎の構造計算」・「地震力の計算」のうち、「地震力を計算する場合」が最も大きくなる。",
   alt:{q:"単位面積当たりの積載荷重は、建築物の実況に応じて計算しない場合、「床の構造計算」・「大梁・柱・基礎の構造計算」・「地震力の計算」のうち、「地震力を計算する場合」が最も小さくなる。", ans:true},
   ans:false,
   exp:"積載荷重は「床の構造計算」＞「大梁・柱・基礎の構造計算」＞「地震力の計算」の順に大きい。「地震力を計算する場合」が最も小さい（令85条）。"},
  {subject:"構造",topic:"荷重・外力",
   q:"店舗の売場に連絡する廊下の床の構造計算に用いる積載荷重は、建築物の実況に応じて計算しない場合、店舗の売場の床の積載荷重を用いることができる。",
   alt:{q:"店舗の売場に連絡する廊下の床の構造計算に用いる積載荷重は、建築物の実況に応じて計算しない場合、住宅の居室の積載荷重を用いることができる。", ans:false},
   ans:true,
   exp:"廊下・玄関等はそれに接続する居室の用途に応じた積載荷重を適用できる（令85条）。店舗売場に連絡する廊下は住宅居室の値ではなく店舗売場の値を使う。"},

  // ── 木材 ──
  {subject:"構造",topic:"木造",
   q:"無等級材の繊維方向の基準強度の大小関係は、曲げ ＞ 圧縮 ＞ 引張 である。",
   alt:{q:"無等級材の繊維方向の基準強度の大小関係は、引張 ＞ 圧縮 ＞ 曲げ である。", ans:false},
   ans:true,
   exp:"無等級材の繊維方向基準強度は「曲げ＞圧縮＞引張」の順。曲げが最も大きく、引張が最も小さい。"},
  {subject:"構造",topic:"木造",
   q:"9cm角の木材の筋かいを入れた軸組の壁倍率を3とし、9cm角の木材の筋かいをたすき掛けに入れた軸組の壁倍率を6とした。",
   alt:{q:"9cm角の木材の筋かいを入れた軸組の壁倍率を3とし、9cm角の木材の筋かいをたすき掛けに入れた軸組の壁倍率を5とした。", ans:true},
   ans:false,
   exp:"たすき掛けは片側×2だが上限は5（令46条）。9cm角（壁倍率3）のたすき掛けは3×2=6となるが上限5を超えるため5として扱う。「6」は誤り、「5」が正しい。"},

  // ── 鋼材（材料） ──
  {subject:"構造",topic:"鉄骨造",
   q:"建築構造用圧延鋼材（SN材）には、A、B及びCの三つの鋼種があり、いずれもシャルピー衝撃試験の吸収エネルギーの下限値が定められている。",
   alt:{q:"建築構造用圧延鋼材（SN材）のうち、SN-BおよびSN-Cにはシャルピー衝撃試験の吸収エネルギーの下限値が定められているが、SN-Aには規定されていない。", ans:true},
   ans:false,
   exp:"SN-Aにはシャルピー衝撃試験の規定はない。衝撃値の規定があるのはSN-BおよびSN-Cのみ。「いずれも」は誤り。"},

  {subject:"構造",topic:"基礎・地盤",
   q:"斜面上部の水平面に建つ建築物を支持する杭基礎に地震力等の水平力が作用した場合、斜面近傍の杭は斜面から離れた杭に比べて、負担せん断力は大きくなる。",
   alt:{q:"斜面上部の水平面に建つ建築物を支持する杭基礎に地震力等の水平力が作用した場合、斜面近傍の杭は斜面側の地盤拘束が弱いため、斜面から離れた杭に比べて負担せん断力は小さくなる。",ans:true},
   ans:false,
   exp:"斜面近傍の杭は斜面側の地盤の受働抵抗が不足するため水平抵抗力が小さく、負担できるせん断力は小さくなる。水平力は斜面から離れた杭により多く負担される。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"鉛直荷重が作用する杭には先端抵抗と周面抵抗があり、杭頭に荷重が作用して沈下が生じる際、先端抵抗が先行して発揮され、沈下が増加すると周面抵抗が発揮される。",
   alt:{q:"鉛直荷重が作用する杭には先端抵抗と周面抵抗があり、杭頭に荷重が作用して沈下が生じる際、周面抵抗が先行して発揮され、沈下が増加すると先端抵抗が発揮される。",ans:true},
   ans:false,
   exp:"周面摩擦（周面抵抗）は数mm程度の少ない変位で発揮されるのに対し、先端抵抗は数十mm程度の大きな変位が生じて初めて十分に発揮される。先端抵抗が先行するという記述は逆。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"杭先端の地盤の許容応力度を計算で求める場合に用いるN値は、杭先端付近のN値の平均値とし、その値が60を超えるときは60とする。",
   alt:{q:"杭先端の地盤の許容応力度を計算で求める場合に用いるN値は、杭先端付近のN値の平均値とし、その値が50を超えるときは50とする。",ans:false},
   ans:true,
   exp:"建築基礎構造設計指針において、杭先端の許容支持力算定に用いるN値は先端付近の平均値とし、上限値は60と定められている。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"長い杭において、杭の曲げ剛性・杭幅・杭に作用する水平力が同じであれば、水平地盤反力係数が大きいほど杭頭の水平変位は大きくなる。",
   alt:{q:"長い杭において、杭の曲げ剛性・杭幅・杭に作用する水平力が同じであれば、水平地盤反力係数が大きいほど杭頭の水平変位は小さくなる。",ans:true},
   ans:false,
   exp:"水平地盤反力係数が大きいほど地盤の水平抵抗が大きくなるため、杭頭の水平変位は小さくなる。「大きくなる」は逆。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"弾性支承梁理論の適用条件は、地震時の地盤変位が小さく、かつ、杭変形に影響を与える範囲の地盤がほぼ均一とみなせることである。",
   alt:{q:"弾性支承梁理論は地震時の大変位にも適用でき、地盤が不均一であっても適用可能な汎用的な理論である。",ans:false},
   ans:true,
   exp:"弾性支承梁理論（Winklerモデル）は線形弾性の範囲（小変位）かつ均一地盤を前提とする。大地震時の非線形地盤変位や不均質地盤には直接適用できない。"},
  {subject:"構造",topic:"基礎・地盤",

   alt:{q:"地震時に液状化のおそれのある地盤であっても、杭の水平抵抗を検討する際の水平地盤反力係数は低減しなくてよい。",ans:false},
   ans:true,
   exp:"液状化が生じると地盤の剛性が著しく低下するため、水平地盤反力係数を大幅に低減して杭の水平抵抗を検討する必要がある。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"杭の引抜き方向の許容支持力の計算において、長期及び短期ともに、杭の有効自重（自重から浮力を減じた値）を考慮することができる。",
   alt:{q:"杭の引抜き方向の許容支持力の計算において、杭の有効自重（自重から浮力を減じた値）は、短期の許容支持力の計算にのみ考慮することができ、長期には考慮できない。",ans:false},
   ans:true,
   exp:"引抜き時の許容支持力は「周面摩擦力＋有効自重」で評価でき、有効自重（自重−浮力）は長期・短期いずれの検討においても考慮してよい。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"鋼管杭の設計においては、地盤が強い酸性ではない場合、一般に、その鋼管の腐食代として厚さ1mmを見込む。",

  {subject:"構造",topic:"基礎・地盤",

  {subject:"構造",topic:"基礎・地盤",
   q:"粘性土層まで貫入させた摩擦杭と直接基礎（べた基礎）からなるパイルド・ラフト基礎とする場合は、摩擦杭の効果により基礎の沈下を抑えられることから、沈下量の検討を省略できる。",

  {subject:"構造",topic:"基礎・地盤",

  {subject:"計画",topic:"建築計画",

   q:"建設工事において、コンカレントエンジニアリングとは、設計から施工までの工程にかかわる全ての部門の人材が集まり、工程をオーバーラップさせて諸問題を討議しながら作業を進めていく方式である。",

  {subject:"計画",topic:"建設・施工",
   q:"公共工事の発注方式において、ECI方式とは、別に発注を受けた設計者による予備設計等を通じて確定した種々の条件を提示したうえで、施工のために必要な詳細設計を、施工業務と一括して発注する方式である。",
   alt:{q:"公共工事の発注方式において、DB（デザインビルド）方式とは、別に発注を受けた設計者による予備設計等を通じて確定した種々の条件を提示したうえで、施工のために必要な詳細設計を、施工業務と一括して発注する方式である。",ans:false},

  {subject:"計画",topic:"建築計画",
   q:"POE（Post Occupancy Evaluation）は、建築物の工事が完了した後、その施設の使用者が入居する前に、機能性や住環境をあらかじめ予測して評価することである。",
   alt:{q:"POE（Post Occupancy Evaluation）は、建築物の供用後（入居後）に実際の使用者へのヒアリングや実測等を行い、機能性や住環境を評価することである。",ans:true},
   ans:false,
   exp:"POEは建築物の工事完了・入居「後」に実際の利用者へのヒアリングや実測を通じて建物の機能性・居住性を評価する手法。「入居する前に予測する」のは事前評価（Pre-Occupancy Evaluation）であり、POEの定義と異なる。"},
  {subject:"計画",topic:"建築計画",
   q:"CDE（Common Data Environment）は、建築生産ライフサイクルにおいて、設計・施工・製造・運用・維持管理などの各段階の関係者が、BIMデータ等による設計・施工情報を共有し、受け渡すための手続きや環境をいう。",
   alt:{q:"CDE（Common Data Environment）は、建築生産ライフサイクルにおいて、BIMデータ等の情報を共有する環境ではなく、設計チーム内部のみで使用するデータ管理システムである。",ans:false},
   ans:true,
   exp:"CDE（共通データ環境）はISO 19650で規定される概念で、BIMデータ等の設計・施工情報を設計・施工・製造・運用・維持管理など建築生産ライフサイクル全体で関係者が共有・受け渡しするための環境・手続きをいう。"},

  {subject:"計画",topic:"建築史",

   alt:{q:"室生寺五重塔（奈良県）は、軒が深く垂木の勾配が緩やかな和様（平安時代初期）による仏塔で、上層になるに従って大きさを著しく逓減し、最上層の一辺の長さは初層の約半分になっている。",ans:true},

  {subject:"計画",topic:"建築史",

  {subject:"計画",topic:"建設・施工",
   q:"木造住宅の外壁において、壁体内の結露を防止するために通気工法を採用し、繊維系断熱材の室内側に透湿防水シートによる防風層を設け、断熱材の屋外側に胴縁等を用いて通気層を確保した。",

  {subject:"計画",topic:"建設・施工",

  {subject:"計画",topic:"建設・施工",

  {subject:"計画",topic:"建設・施工",
   q:"パーティクルボードは、木材の切削片を配向して接着した薄板の層を、互いに繊維方向が直交するように積層接着した板材であり、強度が比較的高いので耐力壁の面材にも使用される。",
   alt:{q:"OSB（配向性ストランドボード）は、木材の切削片を配向して接着した薄板の層を、互いに繊維方向が直交するように積層接着した板材であり、強度が比較的高いので耐力壁の面材にも使用される。",ans:true},
   ans:false,
   exp:"設問の記述はOSB（Oriented Strand Board／配向性ストランドボード）の説明。パーティクルボードは木材の小片（チップ）を接着剤で均一に固めた板材であり、繊維の配向や積層はしない。耐力壁の面材にはOSBが使用される。"},
  {subject:"計画",topic:"建設・施工",
   q:"インシュレーションボードは、木片を水とともに加熱して繊維をほぐし、それに接着剤を加え、板状に成形して乾燥したものであり、断熱性および吸音性に優れ、壁や天井等の下地材として使用される。",
   alt:{q:"MDF（中密度繊維板）は、木片を水とともに加熱して繊維をほぐし、それに接着剤を加え、板状に成形して乾燥したものであり、断熱性および吸音性に優れ、壁や天井等の下地材として使用される。",ans:false},
   ans:true,
   exp:"インシュレーションボード（軟質繊維板）は木材チップを水中で熱処理して繊維をほぐし板状に成形したもの。密度が低く断熱性・吸音性に優れ、壁・天井等の下地材や断熱材として使用される。MDFは高密度で加工性に優れるが断熱性は低い。"},
  {subject:"計画",topic:"建設・施工",

   alt:{q:"木質ハイブリッド型集成材は、柱や梁等の鋼材の周囲を集成材等で耐火被覆したものであり、これを主要構造部に用いた建築物の構造計算には、木造の計算規準が適用される。",ans:true},
   ans:false,
   exp:"木質ハイブリッド型集成材は鋼材を集成材等で耐火被覆した複合部材。これを主要構造部に使用した建築物の構造計算は「鉄骨造」ではなく「木造」の計算規準（建築基準法施行令等）に基づいて行う。"},

  {subject:"計画",topic:"建築計画",

  {subject:"計画",topic:"都市・まちづくり",
   q:"パトリック・ゲデス（イギリス）は、住居地域を緑地帯によって工業地域から分離させ、生活と労働の両面に対応した近代性を備える「工業都市」という構想を提案した。",
   alt:{q:"トニー・ガルニエ（フランス）は、住居地域を緑地帯によって工業地域から分離させ、生活と労働の両面に対応した近代性を備える「工業都市」という構想を提案した。",ans:true},
   ans:false,
   exp:"「工業都市（La Cité Industrielle）」の構想はフランスの建築家トニー・ガルニエ（1869〜1948年）が1904年に発表したもの。住居・工場・公共施設・緑地を明確に分離・配置した近代都市計画の先駆。パトリック・ゲデスはスコットランドの生物学者・都市計画家で「地域調査」等で知られる。"},
  {subject:"計画",topic:"都市・まちづくり",
   q:"R.バックミンスター・フラー（アメリカ）は、巨大な空気膜のドームによってニューヨーク市街の一部を覆い、その地区全体を理想的な気候状態に保つというユートピア都市の構想を提案した。",
   alt:{q:"R.バックミンスター・フラー（アメリカ）は、巨大なジオデシック・ドームによってニューヨーク市街の一部を覆い、その地区全体を理想的な気候状態に保つというユートピア都市の構想を提案した。",ans:true},
   ans:false,
   exp:"フラーが提案したマンハッタンドーム計画（1960年代）では、エアドーム（空気膜構造）ではなく彼の発明したジオデシック・ドーム（三角形の骨組みによる幾何学的構造）でマンハッタンを覆う構想。空気膜ドームという記述は誤り。"},
  {subject:"計画",topic:"都市・まちづくり",
   q:"カミロ・ジッテ（オーストリア）は、ヨーロッパ各地の歴史的な広場を分析することにより、その景観的価値を近代都市の中に再確立しようとした。",
   alt:{q:"カミロ・ジッテ（オーストリア）は、ヨーロッパ各地の歴史的な広場を分析することにより、グリッド状の街路を基本とした合理的な近代都市計画の原則を確立しようとした。",ans:false},
   ans:true,
   exp:"カミロ・ジッテ（1843〜1903年）は著書「芸術的原則による都市建設」（1889年）で欧州の歴史的都市広場を実測分析し、その空間的特質（閉鎖性・非対称性・有機的形態）を近代都市に活かす「芸術的都市計画」を主張した。グリッド計画には批判的だった。"},
  {subject:"計画",topic:"建築家・著書",
   q:"バート・ヴェンチューリ（アメリカ）は、ラスベガスの都市景観を形成する多様な要素を抽出し、大衆文化の中の象徴性について記号論的な視点から分析した。",
   alt:{q:"ロバート・ヴェンチューリ（アメリカ）は、ラスベガスの都市景観を形成する多様な要素を抽出し、大衆文化の中の象徴性について記号論的な視点から分析した。",ans:true},
   ans:false,
   exp:"「ラスベガスの教訓」（1972年）の著者は「ロバート・ヴェンチューリ」（Robert Venturi）であり「バート・ヴェンチューリ」は誤った名前。デニーズ・スコット・ブラウンとの共著でポストモダン建築論の出発点となった。"},
  {subject:"計画",topic:"建築計画",
   q:"「指定管理者制度」は、文化会館や保育所、公園等の公の施設の管理・運営を、ノウハウを有する民間事業者等が行うことで、住民サービスの質の向上を図り、施設設置の目的を効果的に達成するための制度である。",
   alt:{q:"「指定管理者制度」は、文化会館や保育所、公園等の公の施設の管理・運営を、公共団体や公共的団体に限定して委任し、コスト削減を主目的として施設管理を合理化するための制度である。",ans:false},
   ans:true,
   exp:"指定管理者制度（地方自治法第244条の2）は、公の施設の管理・運営を民間事業者等の「指定管理者」が行えるようにした制度。民間のノウハウを活用し住民サービスの向上と施設目的の効果的達成を図る。公共団体に限定するものではない。"},
  {subject:"計画",topic:"建築計画",
   q:"都市再生特別措置法に基づく「都市利便増進協定」は、まちのにぎわいや交流の創出に寄与する施設を一体的に整備又は管理することを目的とした協定であり、原則として、区域内の土地所有者等の全員の合意により結ばれる。",
   alt:{q:"都市再生特別措置法に基づく「都市利便増進協定」は、まちのにぎわいや交流の創出に寄与する施設を一体的に整備又は管理することを目的とした協定であり、区域内の土地所有者等の過半数の同意により結ばれ、反対者は協定から除外される。",ans:false},
   ans:true,
   exp:"都市利便増進協定（都市再生特別措置法）は、区域内の土地所有者等全員の合意により締結することが原則とされている。まちのにぎわい・交流創出のための施設の一体的整備・管理を目的とする。"},
  {subject:"計画",topic:"建築計画",
   q:"「GX（Green Transformation）志向型住宅」は、断熱等性能等級、一次エネルギー消費量削減率及び高度エネルギーマネジメントの導入に関する所定の性能基準を満たした住宅である。",
   alt:{q:"「ZEH（ネット・ゼロ・エネルギー・ハウス）」は、断熱等性能等級、一次エネルギー消費量削減率及び高度エネルギーマネジメントの導入に関する所定の性能基準を満たした住宅である。",ans:false},
   ans:true,
   exp:"GX志向型住宅は断熱等性能等級（6以上等）・一次エネルギー消費量削減率・高度エネルギーマネジメント（HEMSの導入等）の所定基準を満たす住宅として定義されている。ZEHは一次エネルギー消費量の削減に焦点を当てた別の基準。"},
  {subject:"計画",topic:"建築計画",

   exp:"サービス付き高齢者向け住宅の各住戸の専用面積は原則「25m²以上」が必要（高齢者の居住安定確保法）。ただし共用部分に十分な機能がある場合等の緩和規定（18m²等）もある。「15m²以上」は不十分で誤り。"},
  {subject:"計画",topic:"建築計画",

  {subject:"計画",topic:"建築計画",
   q:"「住宅確保要配慮者に対する賃貸住宅の供給の促進に関する法律」に基づく「居住サポート住宅」は、居住支援法人などが入居者に対し、日常の安否確認や訪問などによる見守り、生活・心身の状況に応じた福祉サービスへのつなぎ等のサポートを行う賃貸住宅である。",
   alt:{q:"「住宅確保要配慮者に対する賃貸住宅の供給の促進に関する法律」に基づく「居住サポート住宅」は、入居者に対して24時間の医療的ケアと介護サービスを常時提供する賃貸住宅である。",ans:false},

  {subject:"計画",topic:"集合住宅・住宅",

   alt:{q:"コレクティブハウスかんかん森（東京都）は、阪神淡路大震災の復興事業の一環として建設され、被災した高齢者個人の主体的・自律的な生活を支援する施設である。",ans:false},

  {subject:"計画",topic:"集合住宅・住宅",

  {subject:"計画",topic:"建築計画",

  {subject:"計画",topic:"建築計画",

  {subject:"計画",topic:"文化施設",

  {subject:"計画",topic:"文化施設",

  {subject:"計画",topic:"文化施設",

  {subject:"計画",topic:"文化施設",

  {subject:"計画",topic:"都市・まちづくり",

   alt:{q:"ブラウンフィールド（brownfield）は、ある土地が、土壌汚染の存在やその懸念から、本来その土地が有する潜在的な価値よりも著しく低い利用あるいは未利用となることである。",ans:true},
   ans:false,
   exp:"設問の記述は「ブラウンフィールド（brownfield）」の定義。ジェントリフィケーションは都市の低所得・衰退地区が再開発・高級化され元の低所得住民が転居を余儀なくされる社会現象を指す。"},

 {subject:"計画",topic:"防災計画",

 {subject:"計画",topic:"防災計画",

 {subject:"計画",topic:"建設・施工",

 {subject:"計画",topic:"建設・施工",

 {subject:"計画",topic:"建設・施工",
  q:"アットリスクCM（Construction Management at Risk）方式とは、発注者とCMr（Construction Manager）とがCM契約及び工事契約を締結し、工事契約部分については、別途にCMrが工事施工者と契約を行う方式である。",
  alt:{q:"ピュアCM（Pure Construction Management）方式とは、発注者とCMr（Construction Manager）とがCM契約及び工事契約を締結し、工事契約部分については、別途にCMrが工事施工者と契約を行う方式である。",ans:false},
  ans:true,
  exp:"アットリスクCM方式はCMrが工事請負リスクを持ち、発注者とCM契約・工事契約の両方を締結した上でCMrが工事施工者に発注する方式。ピュアCMはCMrが工事請負リスクを負わず発注者の代理として機能する方式で異なる。"},
 {subject:"計画",topic:"建設・施工",

  alt:{q:"CM（Construction Management）方式とは、公共工事の発注において、施工者が設計段階から関与し、技術協力を通じて施工の数量・仕様を確定したうえで工事契約を締結する方式である。",ans:false},
  ans:true,
  exp:"ECI方式は施工者（Early Contractor）を設計段階から関与させ、施工性・コスト等の技術協力を通じて仕様を確定した後に工事契約を締結する方式。CM方式とは異なる発注形式。"},
 {subject:"計画",topic:"建設・施工",
  q:"オープンブック方式とは、元請工事業者が発注者に対して、下請専門工事業者への発注金額など工事費に係る全ての情報を開示し、その内容について発注者または第三者が精査する方式である。",

  {subject:"構造",topic:"荷重・外力",
   q:"鉄筋コンクリート造の屋根における積雪荷重は、屋根に雪止めを設けない場合、その勾配が15度以下であっても、勾配に応じて低減することができる。",
   alt:{q:"鉄筋コンクリート造の屋根における積雪荷重は、屋根に雪止めを設けない場合、その勾配が15度を超え60度未満であれば、勾配に応じて低減することができる。",ans:true},
   ans:false,
   exp:"建築基準法施行令第86条第4項：屋根に雪止めを設けない場合（積もらない屋根）、勾配が「15度を超え60度未満」のときに積雪荷重を勾配に応じて低減できる。勾配が15度以下の場合は低減できず、全積雪荷重を考慮しなければならない。"},
  {subject:"構造",topic:"荷重・外力",
   q:"多雪区域における地震時に生ずる力を計算する場合には、積雪荷重によって生ずる力を加える場合と加えない場合のそれぞれについて想定する。",
   alt:{q:"多雪区域における地震時に生ずる力を計算する場合には、積雪荷重によって生ずる力を加えない場合のみを想定する。",ans:false},
   ans:true,
   exp:"多雪区域では積雪による荷重が地震時の応力に影響するため、地震力の計算において「積雪荷重を加える場合」と「加えない場合」の両方について想定し、それぞれ安全性を確認する必要がある（建告H12第1461号等）。"},
  {subject:"構造",topic:"RC造",
   q:"床スラブにおけるひび割れ発生後の断面剛性の低下を抑制するために、引張鉄筋量を多くした。",
   alt:{q:"床スラブにおけるひび割れ発生後の断面剛性の低下を抑制するために、コンクリートの設計基準強度Fcを高くした。",ans:false},
   ans:true,
   exp:"ひび割れ発生後の有効断面剛性は、引張鉄筋量（鉄筋比ρ）に比例して増大する。引張鉄筋量を多くすることでひび割れ後の剛性低下を抑制できる。Fcを高くしてもひび割れ後の剛性改善効果は小さい。"},
  {subject:"構造",topic:"RC造",
   q:"梁の引張鉄筋比が釣合い鉄筋比以下であったので、短期許容曲げモーメントを大きくするために、引張鉄筋をSD345から同一径のSD390に変更した。",
   alt:{q:"梁の引張鉄筋比が釣合い鉄筋比を超えていたので、短期許容曲げモーメントを大きくするために、引張鉄筋をSD345から同一径のSD390に変更した。",ans:false},
   ans:true,
   exp:"引張鉄筋比が釣合い鉄筋比以下（引張破壊先行）の場合、許容曲げモーメントは引張鉄筋の許容応力度に依存する。高強度鉄筋SD390（ft大）に変更することで短期許容曲げモーメントを増大できる。釣合い鉄筋比を超えると圧縮側コンクリートが先に破壊するため、鉄筋種別変更の効果はない。"},
  {subject:"構造",topic:"RC造",
   q:"耐力壁の短期許容せん断力を、「壁板の許容せん断力」と「側柱の許容せん断力」の和とした。",
   alt:{q:"耐力壁の短期許容せん断力を、「壁板の許容せん断力」のみとし、「側柱の許容せん断力」は加算しなかった。",ans:false},
   ans:true,
   exp:"RC耐力壁の短期許容せん断力はAIJ規準等に基づき、「壁板の許容せん断力」と両端の「側柱（端部柱）の許容せん断力」の和として算定することができる。側柱の寄与を加算することで耐力壁全体の許容せん断力を適切に評価できる。"},
  {subject:"構造",topic:"RC造",
   q:"梁の許容曲げモーメントの算出において、コンクリートのほか、主筋も圧縮力を負担するものとした。",
   alt:{q:"梁の許容曲げモーメントの算出において、コンクリートのほか、主筋も圧縮力を負担するものとしたが、これは圧縮側主筋の量が少ない場合には適用できない。",ans:false},
   ans:true,
   exp:"RC梁の許容曲げモーメントの計算では、引張側鉄筋だけでなく圧縮側主筋も圧縮力を負担するとした複鉄筋梁の計算法を適用できる。圧縮鉄筋を考慮することで、コンクリートだけによる場合より大きな許容曲げモーメントが算出される（ただし定着・拘束条件を満たすこと）。"},
  {subject:"構造",topic:"RC造",
   q:"曲げ降伏する柱部材の曲げ降伏後のせん断破壊を防止するために、曲げ強度に対するせん断強度の比を小さくした。",
   alt:{q:"曲げ降伏する柱部材の曲げ降伏後のせん断破壊を防止するために、曲げ強度に対するせん断強度の比を大きくした。",ans:true},
   ans:false,
   exp:"曲げ降伏後のせん断破壊を防止するには、せん断耐力が曲げ降伏時のせん断力を大きく上回る必要がある（Qu/Qmu ≥ 1.0以上、推奨1.2以上）。「せん断強度/曲げ強度の比を小さくする」と逆にせん断破壊が先行しやすくなるため誤り。"},
  {subject:"構造",topic:"RC造",
   q:"保有水平耐力の確認において、ある階の剛性率が所定の数値を下回ったため、その階における保有水平耐力の低減を行った。",
   alt:{q:"保有水平耐力の確認において、ある階の剛性率が所定の数値を下回ったため、その階における必要保有水平耐力を割り増した。",ans:true},
   ans:false,
   exp:"剛性率（建告H12第1457号）が基準値（0.6）を下回る場合は、保有水平耐力そのものを「低減」するのではなく、形状係数Fes（≥1.0）を用いて「必要保有水平耐力を割り増す」。保有水平耐力 ≥ 必要保有水平耐力×Fes を確認する。"},
  {subject:"構造",topic:"RC造",
   q:"構造特性係数DSの算出にあたり、構造耐力上支障のある急激な耐力低下のおそれのある破壊を生じない大梁において、コンクリートの設計基準強度FCに対する大梁の平均せん断応力度τuの比のみを用いて、大梁の部材種別を判定した。",
   alt:{q:"構造特性係数DSの算出にあたり、柱部材の部材種別の判定において、コンクリートの設計基準強度FCに対する柱の平均せん断応力度τuの比のみを用いて判定した。",ans:false},
   ans:true,
   exp:"RC大梁の部材種別（FA〜FD）はτu/Fc（平均せん断応力度比）を主な指標として判定できる。一方、柱の部材種別判定ではτu/Fcに加えて軸力比（Nu/Fc・b・D）や横補強筋量等の複合条件が必要であり、τu/Fcのみでは判定できない。"},
  {subject:"構造",topic:"RC造",
   q:"両端が柱と接合されている梁のたわみは、スパンの1/300以下とする。",
   alt:{q:"両端が柱と接合されている梁のたわみは、スパンの1/250以下とする。",ans:false},
   ans:true,
   exp:"建築基準法施行令第82条第4号：はりのたわみは、原則としてスパンの1/300以下（かつ絶対値20mm以下）とすることが求められる。「1/250以下」は制限値が緩く誤り。"},
  {subject:"構造",topic:"鉄骨造",
   q:"梁の高力ボルトによる継手において、梁せいが比較的大きな場合は、ウェブに作用する曲げモーメントを考慮して接合部の設計を行った。",
   alt:{q:"梁の高力ボルトによる継手において、梁せいが比較的小さな場合は、ウェブに作用する曲げモーメントを考慮して接合部の設計を行った。",ans:false},
   ans:true,
   exp:"鉄骨梁の高力ボルト継手では、梁せいが大きい場合にはウェブ部分の継手に対して曲げモーメントの一部が作用するため、ウェブの曲げを考慮した設計が必要（AIJ鋼構造接合部設計指針等）。梁せいが小さい場合はウェブへの曲げの影響は無視できる。"},
  {subject:"構造",topic:"鉄骨造",
   q:"高力ボルト摩擦接合部の許容応力度は、締め付けられる鋼材間の摩擦力と高力ボルトのせん断力との和として計算した。",
   alt:{q:"高力ボルト摩擦接合部の許容応力度は、締め付けられる鋼材間の摩擦力のみによって計算した。",ans:true},
   ans:false,
   exp:"高力ボルト摩擦接合は、ボルトで鋼材を強く締め付けた際の「摩擦力のみ」で応力を伝達する接合形式。高力ボルトのせん断抵抗は考慮しない。摩擦力とせん断力の和を用いるのは支圧接合等の計算方法であり誤り。"},
  {subject:"構造",topic:"鉄骨造",
   q:"耐震計算ルート１－３において、標準せん断力係数C0を0.3として地震力の算定を行ったので、剛性率及び偏心率の検討を省略した。",
   alt:{q:"耐震計算ルート２において、標準せん断力係数C0を0.3として地震力の算定を行ったので、剛性率及び偏心率の検討を省略した。",ans:false},
   ans:true,
   exp:"耐震計算ルート1（1-1〜1-3）は許容応力度計算に基づく簡略的な耐震計算ルートであり、剛性率・偏心率の検討は不要。C0=0.3以上（ルート1-3）による地震力の割増を行うことでルート2以上の計算を省略できる。ルート2では剛性率・偏心率の確認が必要。"},
  {subject:"構造",topic:"鉄骨造",
   q:"耐震計算ルート３において、BCR柱材に対し、局部崩壊メカニズムとなったので、ダイアフラムの形式に応じて、柱の耐力を低減して算定した保有水平耐力が必要保有水平耐力以上であることを確認した。",
   alt:{q:"耐震計算ルート３において、BCR柱材に対し、全体崩壊メカニズムとなったので、ダイアフラムの形式に応じて、柱の耐力を低減して算定した保有水平耐力が必要保有水平耐力以上であることを確認した。",ans:false},
   ans:true,
   exp:"BCR（冷間ロール成形角形鋼管）を用いたルート3の検討では、局部崩壊メカニズムとなる場合は柱脚部のダイアフラム（通しダイアフラム・内ダイアフラム）の形式に応じて柱の耐力を低減して保有水平耐力を算定し、必要保有水平耐力以上であることを確認する。全体崩壊メカニズムの場合は低減不要。"},
  {subject:"構造",topic:"鉄骨造",
   q:"耐震計算ルート２において、柱及び梁の幅厚比が制限値を満足しなかったので、耐震計算ルート３に変更して、設計を行った。",
   alt:{q:"耐震計算ルート２において、柱及び梁の幅厚比が制限値を満足しなかったので、部材断面を変更することなく耐震計算ルート１に変更して、設計を行った。",ans:false},
   ans:true,
   exp:"耐震計算ルート2では幅厚比が制限値を満たすことが必要条件の一つ。満足しない場合は、より詳細な計算であるルート3（保有水平耐力計算）に移行することができる。ルート1への格下げは原則認められない。"},
  {subject:"構造",topic:"鉄骨造",
   q:"工場や体育館等の軽量な建築物の柱継手・柱脚の断面算定においては、暴風時の応力の組合せとして、積載荷重を無視した場合についても検討する。",
   alt:{q:"工場や体育館等の軽量な建築物の柱継手・柱脚の断面算定においては、暴風時の応力の組合せとして、固定荷重と風荷重のみを考慮すれば十分であり、積載荷重の有無による検討は不要である。",ans:false},
   ans:true,
   exp:"軽量建築物では暴風時に積載荷重（活荷重）を無視した方が軸圧縮力が小さくなり、引張力が大きくなる場合がある。このため積載荷重を無視したケースと考慮したケースの両方について検討し、柱継手・柱脚が不利な応力に対して安全であることを確認する。"},
  {subject:"構造",topic:"鉄骨造",
   q:"構造計算に用いる隅肉溶接の溶接部の有効面積は、（溶接の有効長さ）×（隅肉のサイズ）により算出する。",
   alt:{q:"構造計算に用いる隅肉溶接の溶接部の有効面積は、（溶接の有効長さ）×（隅肉ののど厚）により算出する。",ans:true},
   ans:false,
   exp:"隅肉溶接の有効面積は「有効長さ × のど厚」で算出する（鋼構造設計規準等）。のど厚はサイズ×sin45°≒サイズ×0.707（≈サイズ/√2）。「サイズ」をそのまま用いるのは誤りで、のど厚（有効断面）で計算する必要がある。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"飽和砂質土層では、一般に、細粒分含有率が低ければ液状化の可能性は高くなる。",
   alt:{q:"飽和砂質土層では、一般に、細粒分含有率が高ければ液状化の可能性は高くなる。",ans:false},
   ans:true,
   exp:"細粒分（粒径0.075mm以下の粒子）含有率が低い（＝砂の純度が高い）ほど、粒子間の摩擦力が低下しやすく液状化が起こりやすい。細粒分が多い粘性土混じりの土は透水性が低く、かつ粘着力で結合されているため液状化しにくい。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"杭の水平抵抗の検討に用いる水平地盤反力係数は、一様な地盤においては杭径が大きくなるほど大きくなる。",
   alt:{q:"杭の水平抵抗の検討に用いる水平地盤反力係数は、一様な地盤においては杭径が大きくなるほど小さくなる。",ans:true},
   ans:false,
   exp:"水平地盤反力係数khはChang式等からkh ∝ D^(−3/4)の関係があり、杭径Dが大きくなるほど単位面積当たりのkhは小さくなる。大径杭ほど広い範囲の地盤に力が分散されるため、単位変位当たりの反力係数は低下する。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"地震時に液状化のおそれのある地盤において、杭の水平抵抗を検討する場合には、水平地盤反力係数の値を低減しなければならない。",
   alt:{q:"地震時に液状化のおそれのある地盤において、杭の水平抵抗を検討する場合には、水平地盤反力係数の値を増大させなければならない。",ans:false},
   ans:true,
   exp:"液状化が発生すると地盤の支持力・剛性が著しく低下するため、液状化のおそれのある地盤では水平地盤反力係数を1/6〜1/3程度に低減して杭の水平抵抗を検討しなければならない（建告H12等）。値を増大させるのは誤り。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"砂質土地盤の杭の極限先端支持力度は、場所打ちコンクリート杭より打込み杭のほうが大きく、それぞれ上限値が定められている。",
   alt:{q:"砂質土地盤の杭の極限先端支持力度は、打込み杭より場所打ちコンクリート杭のほうが大きく、それぞれ上限値が定められている。",ans:false},
   ans:true,
   exp:"砂質土地盤では打込み杭（打設による先端地盤の締固め効果）の方が場所打ちコンクリート杭より先端支持力度が大きくなる。また、両杭種ともに建築基準法告示（H13第1113号等）で上限値が規定されている。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"粘性土地盤において、場所打ちコンクリート杭の極限周面摩擦力度は、100kN/m²以下とする。",
   alt:{q:"粘性土地盤において、場所打ちコンクリート杭の極限周面摩擦力度は、150kN/m²以下とする。",ans:true},
   ans:false,
   exp:"建築基準法告示H13第1113号等において、場所打ちコンクリート杭の粘性土地盤における極限周面摩擦力度の上限は「150kN/m²」と規定されている。「100kN/m²以下」は過小評価であり誤り。"},
  {subject:"構造",topic:"RC造",
   q:"プレストレストコンクリート構造の設計に関して長期設計荷重時において、梁断面に生じる引張縁の状態によりⅠ種、Ⅱ種及びⅢ種に分類され、Ⅰ種、Ⅱ種はひび割れの発生を許容せず、Ⅲ種のみひび割れの発生を許容している。",
   alt:{q:"プレストレストコンクリート構造の設計に関して長期設計荷重時において、梁断面に生じる引張縁の状態によりⅠ種、Ⅱ種及びⅢ種に分類され、Ⅰ種のみひび割れの発生を許容せず、Ⅱ種及びⅢ種はひび割れの発生を許容している。",ans:false},
   ans:true,
   exp:"PCコンクリートの設計基準によるひび割れに関する分類：Ⅰ種（引張縁に圧縮応力度が生じる状態）とⅡ種（引張応力度が生じるが所定値以下）はともにひび割れの発生を許容しない。Ⅲ種のみひび割れの発生を許容する（部分プレストレス）。"},
  {subject:"構造",topic:"RC造",
   q:"ポストテンション方式は、PC鋼材に引張力を与えた状態でコンクリートを打設し、コンクリートの硬化後、PC鋼材に与えておいた引張力を、PC鋼材とコンクリートとの付着によりコンクリートに伝えて、プレストレスを与える方法である。",
   alt:{q:"プレテンション方式は、PC鋼材に引張力を与えた状態でコンクリートを打設し、コンクリートの硬化後、PC鋼材に与えておいた引張力を、PC鋼材とコンクリートとの付着によりコンクリートに伝えて、プレストレスを与える方法である。",ans:true},
   ans:false,
   exp:"設問の説明は「プレテンション方式」（先に鋼材を緊張し付着でプレストレスを導入）の内容。「ポストテンション方式」はコンクリートを先に打設・硬化させた後、シース内のPC鋼材を緊張して定着具でコンクリート端部に固定し、プレストレスを与える方法。"},
  {subject:"構造",topic:"RC造",
   q:"鉄骨鉄筋コンクリート造の埋込み型柱脚の曲げ終局耐力は、柱脚の鉄骨断面の曲げ終局耐力と、柱脚の埋め込み部分の支圧力による曲げ終局耐力の累加により求めることができる。",
   alt:{q:"鉄骨鉄筋コンクリート造の埋込み型柱脚の曲げ終局耐力は、柱脚の鉄骨断面の曲げ終局耐力と、柱脚の埋め込み部分の支圧力による曲げ終局耐力のいずれか小さい方を採用する。",ans:false},
   ans:true,
   exp:"SRC造の埋込み型柱脚の曲げ終局耐力は、鉄骨断面が負担する曲げ終局耐力と埋込み部分の支圧力（コンクリートへの圧縮応力）が生み出す曲げ終局耐力の「累加（合計）」として算定することができる（AIJ・SRC構造計算規準等）。"},
  {subject:"構造",topic:"RC造",
   q:"壁式ラーメン鉄筋コンクリート造は、張り間方向を連層耐力壁による壁式構造とし、けた行方向を偏平な断面形状の壁柱と梁からなるラーメン構造とする構造である。",
   alt:{q:"壁式ラーメン鉄筋コンクリート造は、張り間方向を偏平な断面形状の壁柱と梁からなるラーメン構造とし、けた行方向を連層耐力壁による壁式構造とする構造である。",ans:false},
   ans:true,
   exp:"壁式ラーメンRC造（WRC-R）は、張り間方向（短辺方向）を連層耐力壁で構成する壁式構造とし、けた行方向（長辺方向）を扁平な壁柱と梁によるラーメン構造とした複合構造形式。方向を逆にした記述は誤り。"},
  {subject:"構造",topic:"免震・制振",
   q:"免震建築物において、建設地盤に液状化の可能性がある場合、告示免震による設計を適用することはできない。",
   alt:{q:"免震建築物において、建設地盤に液状化の可能性がある場合でも、免震層の設計上の対策を講じれば、告示免震による設計を適用することができる。",ans:false},
   ans:true,
   exp:"免震建築物に関する告示（H12建告第2009号等）では、液状化のおそれがある地盤においては告示による免震設計を適用することができないとされており、国土交通大臣の認定が必要となる。免震層が地盤の液状化で不安定になる可能性があるため。"},
  {subject:"構造",topic:"免震・制振",
   q:"積層ゴムアイソレータを用いた免震構造を採用する場合、一般に、固有周期が長い建築物ほど、地震時に作用する水平力を低減する効果が大きい。",
   alt:{q:"積層ゴムアイソレータを用いた免震構造を採用する場合、一般に、固有周期が短い（剛性が高い）建築物ほど、地震時に作用する水平力を低減する効果が大きい。",ans:true},
   ans:false,
   exp:"免震の効果は、非免震時の固有周期（短い→加速度大）を免震によって長周期化することで地震力を低減するもの。もともと固有周期が短い（剛性が高い）建築物ほど、免震によって大幅に長周期化でき水平力の低減効果が大きい。長周期建築物ではすでに低加速度域にあるため効果は相対的に小さい。"},
  {subject:"構造",topic:"RC造",
   q:"鉄骨造の建築物の限界耐力計算において、塑性化の程度が小さいほど、安全限界時の各部材の減衰特性を大きく評価することができる。",
   alt:{q:"鉄骨造の建築物の限界耐力計算において、塑性化の程度が大きいほど、安全限界時の各部材の減衰特性を大きく評価することができる。",ans:true},
   ans:false,
   exp:"限界耐力計算では、安全限界時の等価粘性減衰定数（h）はヒステリシス減衰に基づき塑性変形の大きさに依存する。塑性化（変形）の程度が「大きい」ほどエネルギー吸収量が大きくなり、減衰特性を大きく評価できる。「小さいほど大きく評価」は誤り。"},
  {subject:"構造",topic:"RC造",
   q:"全体崩壊形の崩壊機構となる場合は、原則として、崩壊機構形成時の応力を用いて、部材種別及び構造特性係数DS値の判定を行う。",
   alt:{q:"全体崩壊形の崩壊機構となる場合は、原則として、設計時の初期応力を用いて、部材種別及び構造特性係数DS値の判定を行う。",ans:false},
   ans:true,
   exp:"保有水平耐力計算（ルート3）において全体崩壊形の崩壊機構が形成された場合は、その崩壊機構形成時の応力状態を用いて部材種別・DS値を判定することが原則（AIJ・RC保有水平耐力計算規準等）。初期応力や弾性設計応力を用いるのは誤り。"},
  {subject:"構造",topic:"木造",
   q:"木材の繊維方向の長期許容応力度は、積雪時の構造計算以外の場合、基準強度の１／３ である。",
   alt:{q:"木材の繊維方向の長期許容応力度は、積雪時の構造計算以外の場合、基準強度の２／３ である。",ans:false},
   ans:true,
   exp:"建築基準法施行令第89条に基づく木材の長期許容応力度：積雪時以外の場合、繊維方向の許容応力度（引張・圧縮・曲げ等）は基準強度の1/3。短期（積雪時）は長期の1.5倍、積雪以外の短期は長期の2倍が許容される。「2/3」は短期の値であり誤り。"},
  {subject:"構造",topic:"鉄骨造",
   q:"焼入れされた鋼材は、一般に、強度・硬度は低下するが、靭性は増大する。",
   alt:{q:"焼入れされた鋼材は、一般に、強度・硬度は増大するが、靭性は低下する。",ans:true},
   ans:false,
   exp:"焼入れ（quenching）処理は、オーステナイト状態から急冷することでマルテンサイト組織を形成させ、強度・硬度を「増大」させる。一方で組織が脆くなるため靭性（粘り強さ）は「低下」する。靭性を回復させるには焼戻し（tempering）を行う。"},
  {subject:"構造",topic:"鉄骨造",
   q:"建築構造用圧延鋼材（SN材）において、降伏点が明確に表れない場合は、一般に、降伏点の代わりとして、0.2％オフセット耐力を用いる。",
   alt:{q:"建築構造用圧延鋼材（SN材）において、降伏点が明確に表れない場合は、一般に、降伏点の代わりとして、引張強さの70%を降伏点とみなして用いる。",ans:false},
   ans:true,
   exp:"SN材（SNR材を含む建築構造用鋼材）は一般に明確な降伏点を示すが、降伏点が不明確な場合には「0.2%オフセット耐力（0.2%永久ひずみに対応する応力度）」を降伏点の代替値として用いる。引張強さの70%を用いるのは誤り。"},
  {subject:"構造",topic:"基礎・地盤",
   q:"透水性の低い土層に囲まれたれきは、液状化の可能性が低いので、液状化の検討を省略した。",
   alt:{q:"砂質土地盤において、細粒分含有率が10%以下の土層は、液状化の可能性が低いので、液状化の検討を省略した。",ans:false},
   ans:true,
   exp:"礫（れき）は粒径が大きくインターロッキング効果が高いため液状化が発生しにくく、液状化の検討を省略することが認められている。細粒分含有率が35%以上の土層も液状化しにくいとして省略対象とされる場合がある。逆に細粒分が少ない（10%以下程度の）純砂質土は液状化のリスクが高く、省略できない。"},
  {subject:"構造",topic:"RC造",
   q:"既存建築物の増改築に係る部分の床面積が既存部分の1/2を超える場合、増改築部分が現行基準に適合し、かつ、増改築を行わない部分については、法令で定められた一定の性能を確保できたので、存続が可能と判断した。",
   alt:{q:"既存建築物の増改築に係る部分の床面積が既存部分の1/2を超える場合、建築物全体を現行の建築基準に適合させなければ存続は不可能である。",ans:false},
   ans:true,
   exp:"建築基準法第86条の7第4項・施行令第137条の2等により、増築部分の床面積が既存部分の1/2を超える場合でも、増築部分が現行基準に適合し、かつ既存部分が「耐久性等基準」等の法令で定める一定の性能を確保できれば、既存部分を現行基準に完全適合させなくても存続が認められる。"},

  {subject:"環境",topic:"温熱環境",
   q:"室内の暑さ指数（WBGT）は、乾球温度とグローブ温度から求められる。",
   alt:{q:"室内の暑さ指数（WBGT）は、湿球温度とグローブ温度から求められる。",ans:true},
   ans:false,
   exp:"室内WBGTは「0.7×湿球温度＋0.3×グローブ温度」で算出する。乾球温度は使わない。屋外WBGTは「0.7×湿球+0.2×黒球+0.1×乾球」で異なる式となる。"},
  {subject:"環境",topic:"温熱環境",
   q:"作用温度（OT）は、人体に対する対流と放射の影響を総合した温熱指標である。",
   alt:{q:"作用温度（OT）は、人体に対する対流と蒸発の影響を総合した温熱指標である。",ans:false},
   ans:true,
   exp:"作用温度（Operative Temperature）は対流熱伝達と放射熱伝達を合わせた影響を1つの温度で表す指標。蒸発（発汗）は含まない。PMVなどではさらに蒸発も考慮する。"},
  {subject:"環境",topic:"省エネ",
   q:"外皮平均熱貫流率（UA値）は、単位温度差当たりの外皮総熱損失量を延べ床面積で除した値である。",
   alt:{q:"外皮平均熱貫流率（UA値）は、単位温度差当たりの外皮総熱損失量を外皮面積の合計で除した値である。",ans:true},
   ans:false,
   exp:"UA値＝Σ(各部位面積×熱貫流率)÷外皮面積合計 [W/(m²·K)]。分母は「外皮面積の合計」であり延べ床面積ではない。値が小さいほど断熱性能が高い。"},
  {subject:"環境",topic:"音環境",
   q:"ホワイトノイズ（白色雑音）は、全周波数域でほぼ等しい音響パワーをもつ音である。",
   alt:{q:"ホワイトノイズ（白色雑音）は、人間が同じ大きさに感じるよう低音域を増幅し高音域を減衰させた特性をもつ音である。",ans:false},
   ans:true,
   exp:"ホワイトノイズはすべての周波数成分を均等に含む雑音（パワースペクトル密度が一定）。ピンクノイズはオクターブ帯域ごとに等しいパワーを持つ（1/f特性）で人間の聴覚特性に近い。"},
  {subject:"環境",topic:"換気",
   q:"ソーラーチムニーは、太陽熱により煙突状の排気塔内部の空気を暖め、建築物内の空気を誘引して自然換気を促進させる手法である。",
   alt:{q:"ソーラーチムニーは、太陽光発電パネルによる電力で換気ファンを駆動し、強制的に建築物内の換気を行う手法である。",ans:false},
   ans:true,
   exp:"ソーラーチムニーは太陽熱（集熱）で排気塔内の空気を加熱し浮力を発生させ、室内空気を引き込む自然換気システム。太陽光発電（PV）を用いた強制換気とは別の手法。"},
  {subject:"環境",topic:"空気環境",
   q:"大気中のCO₂濃度が一定で、CO₂発生量及び換気量が同じ容積の異なる二室において、定常状態では容積が小さい室のほうがCO₂濃度が高くなる。",
   alt:{q:"大気中のCO₂濃度が一定で、CO₂発生量及び換気量が同じ容積の異なる二室において、定常状態では両室のCO₂濃度は等しくなる。",ans:true},
   ans:false,
   exp:"定常状態の室内CO₂濃度：C＝C₀＋M/Qv（C₀：外気濃度、M：発生量、Qv：換気量）。容積は定常値に無関係。容積が違っても達するまでの時間が異なるだけで、定常時の濃度は同じ。"},
  {subject:"環境",topic:"光環境",
   q:"昼光率は、全天空照度に対する室内受照点の「直射日光及び天空光による照度」の比率である。",
   alt:{q:"昼光率は、全天空照度に対する室内受照点の「天空光による照度」の比率であり、直射日光は含まない。",ans:true},
   ans:false,
   exp:"昼光率の定義は「全天空照度に対する天空光のみによる室内照度の比」。直射日光は時刻・天候で大きく変動するため除外し、拡散光（天空光）のみを対象とすることで安定した採光評価が可能。"},
  {subject:"環境",topic:"光環境",
   q:"照明における器具効率とは、ランプから発する全光束に対して、照明器具から実際に発散される光束の割合である。",
   alt:{q:"照明における器具効率とは、照明器具に供給する電力に対して、ランプから発する全光束の割合である。",ans:false},
   ans:true,
   exp:"器具効率＝器具発散光束÷ランプ全光束。ランプ光束のうち反射板・カバー等で損失する分を除いた割合。供給電力÷全光束は「発光効率（lm/W）」であり別の指標。"},
  {subject:"環境",topic:"光環境",
   q:"色光の誘目性は、一般に、色相では赤が最も高く、緑がこれに続く。",
   alt:{q:"色光の誘目性は、一般に、色相では赤が最も高く、橙・黄色がこれに続く。",ans:true},
   ans:false,
   exp:"誘目性（注意を引く力）は赤＞橙＞黄の暖色系が高く、青・緑などの寒色系は低い。「赤の次は緑」は誤りで、正しくは橙・黄色が続く。"},
  {subject:"環境",topic:"光環境",
   q:"JISの物体色における有彩色の系統色名は、基本色名に「明度・彩度に関する修飾語」と「色相に関する修飾語」を付けて示す。",
   alt:{q:"JISの物体色における有彩色の系統色名は、基本色名のみを用い、修飾語を付けないで示す。",ans:false},
   ans:true,
   exp:"JIS Z 8102の系統色名では、有彩色の基本色名（赤・黄・緑・青・紫等）に色相修飾語（例：赤みの）と明度・彩度修飾語（例：こい・うすい・あかるい・くらい）を組み合わせて表す。"},
  {subject:"環境",topic:"音環境",
   q:"建築物の空気音遮断性能に関する等級において、Dr-40はDr-50に比べて空気音の遮断性能が低い。",
   alt:{q:"建築物の空気音遮断性能に関する等級において、Dr-50はDr-40に比べて空気音の遮断性能が低い。",ans:false},
   ans:true,
   exp:"Dr値（遮断等級）は数値が大きいほど遮断性能が高い。Dr-50はDr-40より10dBランク上の遮断性能を持つ。Dr-40は住宅の戸境壁等でよく用いられる等級。"},
  {subject:"環境",topic:"音環境",
   q:"自由音場において、無指向性点音源から80m離れた位置の音圧レベルが60dBのとき、20m離れた位置の音圧レベルは約72dBである。",
   alt:{q:"自由音場において、無指向性点音源から80m離れた位置の音圧レベルが60dBのとき、20m離れた位置の音圧レベルは約66dBである。",ans:false},
   ans:true,
   exp:"自由音場の点音源：距離が1/4になると20log(4)≈12dB増加。80m→20mは距離が1/4なので60+12=72dB。66dBは距離が1/2（80→40m）の場合（+6dB）に相当する。"},
  {subject:"環境",topic:"音環境",
   q:"低音域が優勢な騒音では、A特性で周波数補正した騒音レベル（dB(A)）の値が、補正前の音圧レベル（dB）の値より低くなる。",
   alt:{q:"高音域が優勢な騒音では、A特性で周波数補正した騒音レベル（dB(A)）の値が、補正前の音圧レベル（dB）の値より著しく低くなる。",ans:false},
   ans:true,
   exp:"A特性は低周波・超低周波を大幅に減衰させ、人の聴感特性に近い重み付けをする。低音域優勢の騒音（トラック等）では低音がA特性で減衰されるため騒音レベル(dB(A))＜音圧レベル(dB)となる。"},
  {subject:"環境",topic:"音環境",
   q:"残響時間は、室内の音エネルギー密度が定常状態から100万分の1（60dB減衰）に減衰するまでの時間である。",
   alt:{q:"残響時間は、室内の音エネルギー密度が定常状態から1,000分の1（30dB減衰）に減衰するまでの時間である。",ans:false},
   ans:true,
   exp:"残響時間（RT₆₀）は音源停止後に音圧レベルが60dB低下するまでの時間。60dBの低下は音エネルギーで10⁻⁶（100万分の1）に相当。セービン式T=0.161V/Aで近似計算できる。"},
  {subject:"環境",topic:"音環境",
   q:"気温差がある屋外では、音波は高温側（音速が大きい側）に向かって屈折する。",
   alt:{q:"気温差がある屋外では、音波は低温側（音速が小さい側）に向かって屈折する。",ans:true},
   ans:false,
   exp:"音速は気温が高いほど速い（c≈331+0.6T m/s）。ホイヘンスの原理により、音波は音速が遅い方向（低温側）へ向かって曲がる。温度逆転層（地表近くが冷たい）では音が地表に向かって屈折し遠くまで聞こえやすくなる。昼間（高さとともに気温低下）では音が上方に屈折して地表では聞こえにくくなる。"},
  {subject:"環境",topic:"空調設備",
   q:"空調用水蓄熱槽の利用温度差を確保するため、冷房時に空調負荷が減少しても還水温度を高く保つことのできる定流量制御とした。",
   alt:{q:"空調用水蓄熱槽の利用温度差を確保するため、冷房時に空調負荷が減少した際に流量を絞り還水温度を高く保つ変流量制御とした。",ans:true},
   ans:false,
   exp:"定流量制御では負荷減少時にΔTが小さくなり還水温度が下がるため、蓄熱槽の利用温度差を確保できない。変流量制御（VAV）では負荷減少時に流量を減らしΔTをほぼ一定に保ち、利用温度差を確保できる。"},
  {subject:"環境",topic:"空調設備",
   q:"ガスエンジンコージェネレーションシステムにおいて、エンジン冷却水と排ガスから得た排熱を排熱投入型吸収冷温水機の熱源として利用した。",
   alt:{q:"ガスエンジンコージェネレーションシステムにおいて、エンジン冷却水と排ガスから得た排熱を直焚き型ガス吸収冷温水機の燃料として利用した。",ans:false},
   ans:true,
   exp:"コージェネの排熱（冷却水温水・排ガス）を吸収式冷凍機の駆動熱源として利用するのが排熱投入型吸収冷温水機。直焚き型はガスを燃料として直接燃焼する形式で、排熱を「燃料として」使うことはできない。"},
  {subject:"環境",topic:"空調設備",
   q:"ソーラークーリングシステムは、太陽熱集熱器で作った温水をガス吸収冷温水機の熱源として利用する方式であり、都市ガスの消費量を削減できる。",
   alt:{q:"ソーラークーリングシステムは、太陽熱集熱器で作った温水を吸収冷温水機の駆動熱源として利用する方式であり、都市ガスの消費量を削減できる。",ans:true},
   ans:false,
   exp:"ソーラークーリングは太陽熱を吸収冷温水機の駆動熱源として使うシステム。「ガス吸収冷温水機」はガスが主熱源の機器であり、太陽熱がベースとなるソーラークーリングの説明として不正確。正しくは「太陽熱駆動（太陽熱投入型）吸収冷温水機」。"},
  {subject:"環境",topic:"空調設備",
   q:"空調機に再熱コイルを設置することで、冷房時の部分負荷時において室温を維持しながら室内の湿度上昇を防ぐことができるが、エネルギー消費量は増加する。",
   alt:{q:"空調機に再熱コイルを設置することで、冷房時の部分負荷時において室温を維持しながら室内の湿度上昇を防ぐことができ、エネルギー消費量も削減できる。",ans:false},
   ans:true,
   exp:"再熱コイルは冷却・除湿後の空気を再加熱して設定温度・湿度を保つ。設定室温より低い温度の空気を一度作ってから温め直すため、冷熱と温熱の両方を消費し、エネルギー消費量は増加する。"},
  {subject:"環境",topic:"空調設備",
   q:"パッケージユニット方式の個別分散方式は、一般に、中央熱源方式と比べて機器等の設置に必要なスペースが大きくなる。",
   alt:{q:"パッケージユニット方式の個別分散方式は、一般に、中央熱源方式と比べて大規模な機械室が不要なため、機器等の設置に必要なスペースが小さくなる。",ans:true},
   ans:false,
   exp:"中央熱源方式は熱源機・冷却塔・ポンプ等を収める大規模機械室が必要。個別分散方式（パッケージエアコン等）は各室・各ゾーンに分散設置するため、大きな機械室が不要でトータルの設備スペースは小さくなる。"},
  {subject:"環境",topic:"給排水設備",
   q:"伸頂通気方式は、通気立て管を設けず排水立て管の頂上を延長した通気管のみで通気を行う方式であり、各個通気方式やループ通気方式に比べて許容流量値が小さい。",
   alt:{q:"伸頂通気方式は、通気立て管を設けず排水立て管の頂上を延長した通気管のみで通気を行う方式であり、各個通気方式やループ通気方式に比べて許容流量値が大きい。",ans:false},
   ans:true,
   exp:"伸頂通気方式は最も簡便な通気方式だが通気能力が低く、許容排水流量は各個通気やループ通気より小さい。高層建物や大流量が予想される場合は各個通気等を採用する。"},
  {subject:"環境",topic:"給排水設備",
   q:"ハイブリッド給湯システムは、ベース負荷を燃焼式加熱機が受け持ち、ベース負荷を超えた場合にヒートポンプ給湯機がバックアップする仕組みである。",
   alt:{q:"ハイブリッド給湯システムは、ベース負荷を効率の高いヒートポンプ給湯機が受け持ち、能力不足の際に燃焼式加熱機がバックアップする仕組みである。",ans:true},
   ans:false,
   exp:"ハイブリッド給湯（例：エコワン）はCOP（成績係数）が高いヒートポンプがベース負荷を担い、ヒートポンプの能力が不足する低外気温時や急峻な需要増時に燃焼式（ガス・石油）がバックアップする。逆ではない。"},
  {subject:"環境",topic:"給排水設備",
   q:"各個通気方式は、各衛生器具のトラップごとに通気管を取り出して通気立て管等に接続する方式であり、自己サイホン作用の防止に有効である。",
   alt:{q:"各個通気方式は、排水横枝管上の複数の衛生器具が共用する通気ループ管を設ける方式であり、自己サイホン作用の防止には効果がない。",ans:false},
   ans:true,
   exp:"各個通気方式は各器具トラップに独立した通気管を設ける最も完全な通気方式で、自己サイホン作用・誘導サイホン作用の両方に効果的。記述の代替部はループ通気方式に近い説明。"},
  {subject:"環境",topic:"給排水設備",
   q:"公共下水道に排除する排水の水温を55℃とした。",
   alt:{q:"公共下水道に排除する排水の水温を45℃以下とした。",ans:true},
   ans:false,
   exp:"下水道法施行令第9条の9により、公共下水道に排除できる排水の水温の上限は45℃。55℃は基準超過。ボイラー排水・厨房排水等で高温水を排出する場合は冷却処理が必要。"},
  {subject:"環境",topic:"電気設備",
   q:"かご形三相誘導電動機の始動方法において、スターデルタ始動方式は全電圧始動方式に比べて始動電流が小さい。",
   alt:{q:"かご形三相誘導電動機の始動方法において、全電圧始動方式はスターデルタ始動方式に比べて始動電流が小さい。",ans:false},
   ans:true,
   exp:"スターデルタ始動はスター結線で始動することで電圧を1/√3に抑え、始動電流を全電圧始動の1/3に低減できる。始動トルクも1/3になるが、電源設備の負担を減らせる利点がある。"},
  {subject:"環境",topic:"電気設備",
   q:"風力発電の系統連系において、ACリンク方式はDCリンク方式に比べて出力変動の影響を受けにくく、系統への安定供給が可能である。",
   alt:{q:"風力発電の系統連系において、DCリンク方式はACリンク方式に比べて出力変動の影響を受けにくく、系統への安定供給が可能である。",ans:true},
   ans:false,
   exp:"DCリンク方式は発電機→AC/DCコンバータ→DC/ACインバータの変換を経て系統連系するため、風速変動による出力変動を直流側で吸収でき、安定した電力を供給できる。ACリンク方式は変動が系統に直接伝わりやすい。"},
  {subject:"環境",topic:"電気設備",
   q:"消防法の規定に適合する燃料電池設備を、消防用設備等の非常電源として使用することができる。",
   alt:{q:"消防法の規定に適合する燃料電池設備は、常用電源が停電した場合でも自動起動しないため、消防用設備等の非常電源として使用することはできない。",ans:false},
   ans:true,
   exp:"消防法施行規則では燃料電池設備を非常電源として認めている（平成16年改正）。非常電源専用受電設備・自家発電設備・蓄電池設備に加え、燃料電池設備も適切な要件を満たせば消防用設備等の非常電源に使用可能。"},
  {subject:"環境",topic:"電気設備",
   q:"非常コンセント設備は、地階を除く階数が11以上の建築物の11階以上の各階に設置しなければならない。",
   alt:{q:"非常コンセント設備は、地階を除く階数が7以上の建築物の7階以上の各階に設置しなければならない。",ans:false},
   ans:true,
   exp:"消防法施行令第29条の2より、非常コンセント設備の設置義務は「地階を除く階数が11以上の建築物の11階以上の各階」。7階基準は連結送水管等の設置基準であり、非常コンセントとは異なる。"},
  {subject:"環境",topic:"消防設備",
   q:"スプリンクラー設備を設置すべき階において、エスカレーターにはスプリンクラーヘッドを設けなかった。",
   alt:{q:"スプリンクラー設備を設置すべき階において、エスカレーターにもスプリンクラーヘッドを設ける必要がある。",ans:false},
   ans:true,
   exp:"消防法施行規則第13条の3第1項により、エスカレーターの部分はスプリンクラーヘッドの設置が免除される。開放型エスカレーターは火災時に煙・熱が拡散しやすく、ヘッド設置の実効性が低いため。"},
  {subject:"環境",topic:"設備法規",
   q:"免震層を配管スペースとして使用する場合は、当該免震層を階数及び延べ面積に算入する必要がある。",
   alt:{q:"免震層は、いかなる用途に使用する場合でも、階数及び延べ面積に算入する必要はない。",ans:false},
   ans:true,
   exp:"免震層は原則として床面積・延べ面積に算入するが、人が常駐しない純粋な免震装置設置スペースとして扱う場合に不算入となる特例がある。配管等の設備スペースとして使用する場合は建築設備として扱われ算入が必要。"},
  {subject:"環境",topic:"設備法規",
   q:"局部震度法による設計用標準震度は、一般に、固定支持された設備機器より防振支持された設備機器のほうが大きい値となる。",
   alt:{q:"局部震度法による設計用標準震度は、一般に、防振支持された設備機器より固定支持された設備機器のほうが大きい値となる。",ans:false},
   ans:true,
   exp:"防振支持された設備機器は防振架台の固有周期が長くなり、建物の振動と共振しやすくなるため、設計用標準震度を大きく設定する必要がある。建築設備耐震設計・施工指針（建築設備耐震設計指針）に規定。"},
  {subject:"環境",topic:"環境評価",
   q:"CASBEE－建築（新築）とは、建築物の環境品質（Q）を環境負荷（LR）で除した数値により4段階で評価する手法である。",
   alt:{q:"CASBEE－建築（新築）とは、建築物の環境品質（Q）を環境負荷（LR）で除した数値により5段階（S・A・B＋・B－・C）で評価する手法である。",ans:true},
   ans:false,
   exp:"CASBEEの格付けはBEE値（Q/L）をもとにS・A・B＋・B－・Cの5段階。4段階は誤り。BEE≧3.0でSランク（最高評価）。建築環境総合性能評価システムとして国土交通省が推進。"},
  {subject:"環境",topic:"環境評価",
   q:"PFASとは特定の有機フッ素化合物の総称であり、その一部については有害性が指摘され、製造及び使用が禁止されている。",
   alt:{q:"PFASとは特定の有機リン化合物の総称であり、その一部については有害性が指摘され、製造及び使用が禁止されている。",ans:false},
   ans:true,
   exp:"PFAS（Per- and Polyfluoroalkyl Substances）はフッ素と炭素の強固な結合をもつ有機フッ素化合物群の総称。有機リン化合物ではない。PFOSやPFOAは残留性・生体蓄積性・毒性が指摘され、製造・輸入・使用が原則禁止。"},
  {subject:"環境",topic:"環境評価",
   q:"ZEB Readyとは、再生可能エネルギーを除き、基準一次エネルギー消費量から50%以上の一次エネルギー消費量を削減している建築物をいう。",
   alt:{q:"ZEB Readyとは、再生可能エネルギーを除き、基準一次エネルギー消費量から30%以上の一次エネルギー消費量を削減している建築物をいう。",ans:false},
   ans:true,
   exp:"ZEBのロードマップ：ZEB Ready＝再エネ除き50%以上削減、Nearly ZEB＝再エネ除き75%以上削減＋再エネ考慮で100%未満、ZEB＝再エネ含め100%以上削減（一次エネルギー消費量ゼロ以下）。"},

  // ── 環境追加28問 ──────────────────────────────────
  {subject:"環境",topic:"熱環境",
   q:"実効温度差（ETD）は、内外温度差・日射量・熱容量の大きい壁や天井等の部材による熱的挙動の時間遅れを考慮した、熱貫流計算を簡略に行うための仮想の温度差である。",
   alt:{q:"実効温度差（ETD）は、内外温度差と日射量のみを考慮した仮想の温度差であり、壁や天井等の熱容量による熱的挙動の時間遅れは考慮しない。",ans:false},
   ans:true,
   exp:"ETD（Equivalent Temperature Difference）は①内外温度差②日射量③壁・天井等の熱容量による時間遅れ（熱的慣性）の三要素を考慮した仮想温度差。これを熱貫流率に掛けることで熱負荷計算を簡略化できる。"},
  {subject:"環境",topic:"光環境",
   q:"色度は、色の明度と彩度の二つの属性を含めた知覚的評価の指標である。",
   alt:{q:"色度は、色の色相と彩度の組み合わせを数値的に表した指標であり、明度は含まない。",ans:true},
   ans:false,
   exp:"色度（chromaticity）は色の色相と彩度を表す指標で、明度（輝度）は含まない。色を完全に記述するには色度と輝度（明度）の両方が必要。CIE xy色度図では等エネルギー点が白色（無彩色）に対応する。"},
  {subject:"環境",topic:"温熱環境",
   q:"基礎代謝量は、空腹時に仰臥して安静状態にあるときの代謝量である。",
   alt:{q:"基礎代謝量は、食後に直立して安静状態にあるときの代謝量である。",ans:false},
   ans:true,
   exp:"基礎代謝量（BMR）は生命維持に最低限必要なエネルギー代謝量。測定条件は「早朝・空腹・仰臥・安静」の4条件。食後や直立状態では消化・筋張力による代謝が加わり基礎代謝より高くなる。"},
  {subject:"環境",topic:"温熱環境",
   q:"椅座安静状態における成人の単位体表面積当たりの代謝量は、約100W/m²である。",
   alt:{q:"椅座安静状態における成人の単位体表面積当たりの代謝量は、約58W/m²である。",ans:true},
   ans:false,
   exp:"椅座安静（1MET）の代謝量は約58W/m²（≈50kcal/m²h）。100W/m²は軽い作業（～1.7MET）程度に相当する。基礎代謝（仰臥安静）は約46W/m²、事務作業は約70W/m²が目安。"},
  {subject:"環境",topic:"温熱環境",
   q:"乾球温度が同じであれば、乾球温度と湿球温度との差が大きいほうが、相対湿度は低い。",
   alt:{q:"乾球温度が同じであれば、乾球温度と湿球温度との差が大きいほうが、相対湿度は高い。",ans:false},
   ans:true,
   exp:"湿球温度は湿った布を巻いた温度計の示す温度で、水分蒸発による気化熱で低下する。乾球と湿球の差（乾湿計湿度差）が大きいほど蒸発が盛んで空気が乾燥しており、相対湿度は低い。"},
  {subject:"環境",topic:"省エネ",
   q:"室内表面結露の防止には、壁体の熱貫流率が同じ場合、内断熱よりも外断熱のほうが効果的である。",
   alt:{q:"室内表面結露の防止には、壁体の熱貫流率が同じ場合、外断熱よりも内断熱のほうが効果的である。",ans:false},
   ans:true,
   exp:"外断熱では断熱層の外側に構造体があるため、構造体全体が室内側の温度に近い状態を保つ。これにより壁体内の温度が露点温度を下回りにくく、室内表面温度も高く保たれるため表面結露防止に有効。"},
  {subject:"環境",topic:"省エネ",
   q:"熱貫流率が1.0W/（m²・K）の壁体に、熱伝導率が0.04W/（m・K）の断熱材を60mmの厚さで設けたときの壁体の熱貫流率は0.4W/（m²・K）となる。",
   alt:{q:"熱貫流率が1.0W/（m²・K）の壁体に、熱伝導率が0.04W/（m・K）の断熱材を40mmの厚さで設けたときの壁体の熱貫流率は0.4W/（m²・K）となる。",ans:false},
   ans:true,
   exp:"断熱材の熱抵抗：R₁=0.06÷0.04=1.5m²K/W、既存壁の熱抵抗：R₀=1/1.0=1.0m²K/W、合計R=2.5、U=1/2.5=0.4W/(m²K)。40mm厚の場合はR₁=1.0、R=2.0、U=0.5W/(m²K)となり0.4にはならない。"},
  {subject:"環境",topic:"日射",
   q:"北緯35度の地点において、8月の中下旬に、南向き鉛直面の受ける快晴日の積算日射量は、西向き鉛直面の受ける快晴日の積算日射量とほぼ同等量となる。",
   alt:{q:"北緯35度の地点において、8月の中下旬に、南向き鉛直面の受ける快晴日の積算日射量は、水平面の受ける快晴日の積算日射量とほぼ同等量となる。",ans:false},
   ans:true,
   exp:"北緯35度の夏季（8月）は太陽高度が高いため、南向き鉛直面への直達日射は少ない。一方、東・西向き鉛直面は午前・午後に直達日射を受ける。この結果、8月中下旬は南向きと西向きの積算日射量がほぼ同等になる。"},
  {subject:"環境",topic:"日射",
   q:"北半球における冬至の日と夏至の日における南中時の太陽高度の差は、緯度が高い地域ほど大きくなる。",
   alt:{q:"北半球における冬至の日と夏至の日における南中時の太陽高度の差は、緯度によらず約47°で一定である。",ans:true},
   ans:false,
   exp:"南中高度＝90°－緯度＋赤緯（夏至＋23.5°、冬至－23.5°）。夏至と冬至の差は23.5°×2＝47°で、緯度に無関係に一定。緯度が高くなるほど南中高度自体が低くなるが、夏冬の差は変わらない。"},
  {subject:"環境",topic:"音環境",
   q:"アクティブノイズコントロールとは、音源からの騒音に対し同振幅・逆位相の音を発生させて相殺する制御手法であり、低周波数域よりも高周波数域における減音効果が大きい。",
   alt:{q:"アクティブノイズコントロールとは、音源からの騒音に対し同振幅・逆位相の音を発生させて相殺する制御手法であり、高周波数域よりも低周波数域における減音効果が大きい。",ans:true},
   ans:false,
   exp:"ANC（Active Noise Control）は逆位相の音で打ち消す手法。高周波になるほど波長が短く、逆位相信号の位相合わせが困難で制御できる空間も狭くなる。効果は100Hz以下の低周波帯域で特に大きい。"},
  {subject:"環境",topic:"音環境",
   q:"一重の引違い窓サッシの遮音性能は、取付け枠が変形して気密性が低下した場合、125Hz付近の周波数域より2,000Hz付近の周波数域のほうが低下する。",
   alt:{q:"一重の引違い窓サッシの遮音性能は、取付け枠が変形して気密性が低下した場合、2,000Hz付近の周波数域より125Hz付近の周波数域のほうが低下する。",ans:false},
   ans:true,
   exp:"気密性が低下して隙間が生じると、高周波数域（波長が短い）ほど隙間を通じた透過音が増加し遮音性能が大きく低下する。低周波（125Hz）は波長が長く隙間の影響を受けにくいため低下は小さい。"},
  {subject:"環境",topic:"空調設備",
   q:"同一室において、インテリアゾーンでは冷房を、ペリメータゾーンでは暖房をしている場合、ペリメータゾーンの設定室温をインテリアゾーンの設定室温に比べて高くすると、混合損失の低減に効果がある。",
   alt:{q:"同一室において、インテリアゾーンでは冷房を、ペリメータゾーンでは暖房をしている場合、ペリメータゾーンの設定室温をインテリアゾーンの設定室温に近づけると、混合損失の低減に効果がある。",ans:true},
   ans:false,
   exp:"混合損失とは冷暖房が同時に行われる際に生じるエネルギー損失。ペリメータ（暖房）の設定温度をインテリア（冷房）より高くすると両ゾーンの温度差が拡大し混合損失が増加する。低減には設定温度を近づけることが有効。"},
  {subject:"環境",topic:"空調設備",
   q:"中央式空調方式は、マルチパッケージ型空調方式に比べて、湿度の制御性に優れている。",
   alt:{q:"マルチパッケージ型空調方式は、中央式空調方式に比べて、湿度の制御性に優れている。",ans:false},
   ans:true,
   exp:"中央式空調（AHU方式）は冷却コイルで冷却・除湿し、再熱コイルで温度調整することで湿度を精密に制御できる。マルチパッケージ型は冷媒制御で温度制御が主となり湿度の独立制御が困難。"},
  {subject:"環境",topic:"空調設備",
   q:"ナイトパージは、夜間に外気導入を行い翌日の空調立上げ負荷を減らす省エネルギー手法で、一般に、昼間の外気冷房よりも低い外気温度まで利用できる。",
   alt:{q:"ナイトパージは、夜間に外気導入を行い翌日の空調立上げ負荷を減らす省エネルギー手法で、一般に、昼間の外気冷房と同等以上の外気温度が必要である。",ans:false},
   ans:true,
   exp:"ナイトパージは夜間の低温外気（通常20℃以下）で建物蓄熱を冷却する手法。夜間は外気温が低下するため、昼間の外気冷房（例：25℃以下で効果）より低い温度まで活用でき、翌朝の冷房立ち上げ負荷を低減する。"},
  {subject:"環境",topic:"空調設備",
   q:"軸流吹出し口の吹出し気流は、一般に、ふく流吹出し口の吹出し気流に比べて誘引比が小さいため広がり角が小さく到達距離が短い。",
   alt:{q:"軸流吹出し口の吹出し気流は、一般に、ふく流吹出し口の吹出し気流に比べて誘引比が小さいため広がり角が小さく到達距離が長い。",ans:true},
   ans:false,
   exp:"軸流吹出し口（ノズル型等）は誘引比が小さく気流が直進するため、広がり角は小さいが到達距離は長い。ふく流吹出し口（天井カセット型等）は誘引比が大きく広がりやすい反面、到達距離は短い。"},
  {subject:"環境",topic:"給排水設備",
   q:"通気管の末端は、窓・換気口等の開口部の上端から600mmの立上げができなかったため、当該開口部から水平に2m以上離して外気に開放した。",
   alt:{q:"通気管の末端は、窓・換気口等の開口部の上端から600mmの立上げができなかったため、当該開口部から水平に3m以上離して外気に開放した。",ans:true},
   ans:false,
   exp:"建築基準法施行令第129条の2の6第2項：通気管の末端は、窓・換気口等の開口部の上端から600mm以上立ち上げるか、それが困難な場合は当該開口部から水平距離3m以上離して外気に開放しなければならない。2mでは不足。"},
  {subject:"環境",topic:"給排水設備",
   q:"ループ通気管の端部を通気立て管に接続する位置については、同じ排水横枝管に接続される衛生器具のうち、最高位の器具のあふれ縁よりも高い位置とした。",
   alt:{q:"ループ通気管の端部を通気立て管に接続する位置については、同じ排水横枝管に接続される衛生器具のうち、最低位の器具の排水管との接続部よりも低い位置とした。",ans:false},
   ans:true,
   exp:"ループ通気管の通気立て管への接続高さは、当該横枝管に接続する最高位の衛生器具のあふれ縁より高い位置とする。これにより排水逆流時に通気管への汚水の逆流を防止できる。"},
  {subject:"環境",topic:"給排水設備",
   q:"排水槽において、排水及び汚泥の排出を容易にするため、底部に吸込みピットを設けるとともに、底面の勾配は吸込みピットに向かって1/10とした。",
   alt:{q:"排水槽において、排水及び汚泥の排出を容易にするため、底部に吸込みピットを設けるとともに、底面の勾配は水平（1/100以下）とした。",ans:false},
   ans:true,
   exp:"排水槽の底面は汚泥・排水を吸込みピットに集めやすくするため、吸込みピットに向かって勾配をつける。空衛学会指針では1/15以上の勾配を推奨しており、1/10はこれを満足する十分な勾配。"},
  {subject:"環境",topic:"電気設備",
   q:"幹線設備における地絡電流による感電、火災、設備の破損等を防止するために、過電流遮断器を設置した。",
   alt:{q:"幹線設備における地絡電流による感電、火災、設備の破損等を防止するために、漏電遮断器を設置した。",ans:true},
   ans:false,
   exp:"地絡電流（漏電電流）への対応は漏電遮断器（ELCB）が必要。過電流遮断器（MCCB）は短絡・過負荷による過電流を遮断するもので、地絡電流は小さく感知できないことが多い。感電・火災防止には漏電遮断器を使う。"},
  {subject:"環境",topic:"電気設備",
   q:"非常電源専用受電設備は、商用電源が停電した場合に消防設備へ電力を供給できなくなるため、大規模な特定防火対象物における消防用設備等の非常電源とすることができない。",
   alt:{q:"非常電源専用受電設備は、商用電源が停電した場合でも消防設備へ電力を供給できるため、あらゆる規模の特定防火対象物における消防用設備等の非常電源とすることができる。",ans:false},
   ans:true,
   exp:"非常電源専用受電設備は商用電源からの専用回路で受電するため、商用電源が停電すると電力供給不能。消防法施行規則第12条で、延べ面積1,000m²以上の特定防火対象物では非常電源として使用不可。自家発電設備等が必要。"},
  {subject:"環境",topic:"電気設備",
   q:"無停電電源装置（UPS）は、整流器、蓄電池、インバータ等により構成され、瞬間的な電圧降下時や停電時においても安定した電力供給を維持するためのものである。",
   alt:{q:"無停電電源装置（UPS）は、整流器とインバータのみにより構成され、長時間の停電時に数時間の電力供給を継続するためのものである。",ans:false},
   ans:true,
   exp:"UPS（Uninterruptible Power Supply）は整流器（AC→DC変換）・蓄電池・インバータ（DC→AC変換）で構成。常時商用電源を整流して蓄電池を充電しながらインバータ経由で電力供給し、停電時は蓄電池から継続供給する。"},
  {subject:"環境",topic:"電気設備",
   q:"LEDモジュールの寿命は、一般に、「点灯しなくなるまでの点灯経過時間」又は「全光束が初期値の70%に低下するまでの点灯経過時間」のいずれか短い時間である。",
   alt:{q:"LEDモジュールの寿命は、一般に、「点灯しなくなるまでの点灯経過時間」又は「全光束が初期値の80%に低下するまでの点灯経過時間」のいずれか短い時間である。",ans:false},
   ans:true,
   exp:"JIS C 8152等に基づくLEDモジュールの寿命は「点灯不能までの時間」または「全光束が初期値の70%（L70）に低下するまでの時間」の短い方。80%ではなく70%が業界標準の定義。一般的なLEDの寿命は40,000時間以上。"},
  {subject:"環境",topic:"消防設備",
   q:"レストランの厨房においては、自動火災報知設備の定温式熱感知器を設置しなければならない。",

   ans:true,
   exp:"厨房は調理時の蒸気・油煙が多く煙感知器が誤作動しやすいため、熱感知器（定温式）を用いる。消防法施行規則第23条で定温式スポット型感知器の設置が規定されている。差動式では急激な温度変化に誤作動するリスクがある。"},
  {subject:"環境",topic:"消防設備",
   q:"特別避難階段の付室には、機械排煙設備を設けなければならない。",
   alt:{q:"特別避難階段の付室には、機械排煙設備又は外気に接する排煙口（自然排煙）を設けなければならない。",ans:true},
   ans:false,
   exp:"建築基準法施行令第123条第3項第2号：特別避難階段の附室（バルコニーを除く）には「排煙設備」が必要だが、機械排煙に限定されない。外気に直接面する排煙口（自然排煙）でも認められる。"},
  {subject:"環境",topic:"設備法規",
   q:"設備機器に使用する防振材においては、一般に、防振ゴムよりコイルばねのほうが、設備機器を含めた防振系の固有周波数を低く設定できる。",
   alt:{q:"設備機器に使用する防振材においては、一般に、コイルばねより防振ゴムのほうが、設備機器を含めた防振系の固有周波数を低く設定できる。",ans:false},
   ans:true,
   exp:"防振系の固有周波数 f＝(1/2π)√(k/m)。コイルばねは静的撓みを大きく取れ（ばね定数kが小さい）、固有周波数を2〜4Hz程度まで低下させられる。防振ゴムは概ね5〜15Hz程度が限界で、コイルばねのほうが低い固有周波数を実現できる。"},
  {subject:"環境",topic:"設備法規",
   q:"防災センターを兼ねた中央管理室は、浸水のおそれがないように、建築物高層部に設けるのが望ましい。",
   alt:{q:"防災センターを兼ねた中央管理室は、消防活動上及び避難誘導上有効な位置（一般に低層部）に設けるのが望ましい。",ans:true},
   ans:false,
   exp:"防災センターは消防隊が迅速にアクセスし指揮を執る拠点。高層部への設置は消防活動・連絡・アクセスの観点から不適切。建築基準法施行令第20条の2等では「管理上及び避難上有効な場所」とされており、一般には1〜2階の低層部が推奨される。"},
  {subject:"環境",topic:"設備法規",
   q:"高層建築物において、1階の天井内に吊り支持された設備機器の設計用地震力を算定する場合、設計用標準震度は、適用階の区分を中間階とし、耐震クラスに応じた値を用いる。",
   alt:{q:"高層建築物において、1階の天井内に吊り支持された設備機器の設計用地震力を算定する場合、設計用標準震度は、適用階の区分を最上階とし、耐震クラスに応じた値を用いる。",ans:false},
   ans:true,
   exp:"建築設備耐震設計・施工指針では設備機器の適用階を「最上階」「中間階」「1階」に区分する。1階天井内の吊り支持機器は「中間階」区分を適用し（最上階・1階ではなく）、耐震クラスS・A・Bに応じた標準震度を用いる。"},
  {subject:"環境",topic:"環境評価",
   q:"LEED（Leadership in Energy & Environmental Design）は、建築物や敷地等に関する環境性能評価システムの一つであり、取得したポイントの合計によって4段階の認証レベルが決まる。",
   alt:{q:"LEED（Leadership in Energy & Environmental Design）は、建築物や敷地等に関する環境性能評価システムの一つであり、取得したポイントの合計によって5段階の認証レベルが決まる。",ans:false},
   ans:true,
   exp:"LEEDの認証レベルはCertified（40-49点）・Silver（50-59点）・Gold（60-79点）・Platinum（80点以上）の4段階。米国グリーンビルディング協会（USGBC）が運営する世界的な環境性能評価システム。"},

  {subject:"環境",topic:"光環境",
   q:"設計用全天空照度は、普通の日（標準の状態）の場合、15,000lxを用いることが多い。",
   alt:{q:"設計用全天空照度は、普通の日（標準の状態）の場合、50,000lxを用いることが多い。",ans:false},
   ans:true,
   exp:"設計用全天空照度は採光設計の基準値で、普通の日（標準状態）には15,000lxを用いる。快晴時は65,000lx程度、曇天時は5,000lx程度まで変動するが、設計値としては15,000lxが広く採用されている。"},
  {subject:"環境",topic:"光環境",
   q:"長時間の精密な視作業のための基準昼光率は、2%である。",
   alt:{q:"長時間の精密な視作業のための基準昼光率は、5%である。",ans:false},
   ans:true,
   exp:"基準昼光率は用途によって異なり、精密な視作業（製図・精密部品検査等）では2%が基準。一般事務作業では1%、廊下・倉庫では0.5%程度。昼光率＝室内照度/全天空照度×100[%]で表す。"},
  {subject:"環境",topic:"光環境",
   q:"光幕反射は、机上面の光沢のある書類に光が当たる場合等、光の反射によって文字等と紙面との輝度対比が大きくなる現象である。",
   alt:{q:"光幕反射は、机上面の光沢のある書類に光が当たる場合等、光の反射によって文字等と紙面との輝度対比が小さくなる現象である。",ans:true},
   ans:false,
   exp:"光幕反射（ベーリング反射）は光沢面からの反射光が視線と重なり、文字と紙面のコントラスト（輝度対比）が「低下」する現象。見えにくくなる（グレア）原因となる。「大きくなる」は誤りで「小さくなる」が正しい。"},
  {subject:"環境",topic:"光環境",
   q:"加法混色の三原色は、赤・緑・青であり、それらを同じ割合で混ぜると白色になる。",
   alt:{q:"加法混色の三原色は、赤・黄・青であり、それらを同じ割合で混ぜると黒色になる。",ans:false},
   ans:true,
   exp:"加法混色（光の混色）の三原色はRGB（赤・緑・青）で、等量混合すると白色（白色光）になる。赤・黄・青はCMYKのC（シアン）・M（マゼンタ）・Y（イエロー）に類似した減法混色の三原色で、等量混合すると黒に近い暗色になる。"},
  {subject:"環境",topic:"光環境",
   q:"室内の壁の色は、色見本で適当だと感じる色よりも、彩度の高い色を選ぶ。",
   alt:{q:"室内の壁の色は、色見本で適当だと感じる色よりも、彩度の低い色を選ぶ。",ans:true},
   ans:false,
   exp:"色の面積効果（フォーカル効果）：同じ色でも面積が大きくなると彩度・明度が高く感じられる。したがって室内の大面積の壁に使う色は、小さな色見本で適切と感じる色より彩度を「低く」した色を選ぶ必要がある。"},
  {subject:"環境",topic:"音環境",
   q:"自由音場において、全指向性の点音源からの距離が1mの点と2mの点との音圧レベルの差は、3dBとなる。",
   alt:{q:"自由音場において、全指向性の点音源からの距離が1mの点と2mの点との音圧レベルの差は、6dBとなる。",ans:true},
   ans:false,
   exp:"自由音場の点音源：L＝Lw－20log(r)－11。距離2倍で20log(2)≈6dB低下（距離倍則）。1mと2mの差は6dB。3dBは面音源（線音源）の距離2倍における減衰量であり、点音源では誤り。"},
  {subject:"環境",topic:"音環境",
   q:"振動レベルは、振動感覚補正を行って評価した振動加速度レベルである。",
   alt:{q:"振動レベルは、振動感覚補正を行わない振動加速度レベルそのものであり、人体への影響は別途評価する。",ans:false},
   ans:true,
   exp:"振動レベル（VL）はISO 2631等に基づく振動感覚補正フィルター（周波数重み付け）を適用した振動加速度レベル[dB]。人体の振動感覚特性に合わせた重み付けを行う点が単純な振動加速度レベルとの違い。"},
  {subject:"環境",topic:"音環境",
   q:"壁に多孔質吸音材料を使用するに当たり、表面を孔あき板やリブ等で保護する場合、開孔率が小さいと共鳴器型の吸音特性が現れることがある。",
   alt:{q:"壁に多孔質吸音材料を使用するに当たり、表面を孔あき板やリブ等で保護する場合、開孔率が大きいほど共鳴器型の吸音特性が現れやすくなる。",ans:false},
   ans:true,
   exp:"孔あき板の開孔率が大きいと→背後の多孔質材の吸音特性が支配的になる。開孔率が小さいと→孔あき板と背後空気層によるヘルムホルツ共鳴器効果が現れ、特定周波数（共鳴周波数）付近の吸音率が高くなる共鳴器型の特性が現れる。"},
  {subject:"環境",topic:"音環境",
   q:"ロックウールボード等の多孔質吸音材料の表面を塗装しても、高周波数域における吸音率には、ほとんど影響しない。",
   alt:{q:"ロックウールボード等の多孔質吸音材料の表面を塗装すると、細孔が塞がれるため、高周波数域における吸音率が低下する。",ans:true},
   ans:false,
   exp:"多孔質吸音材（ロックウール・グラスウール等）は音波が細孔に進入し摩擦で音エネルギーを熱に変換する機構。塗装で細孔が塞がれると特に波長の短い高周波数域の音が細孔に入りにくくなり吸音率が著しく低下する。"},
  {subject:"環境",topic:"音環境",
   q:"背後空気層をもつ板振動型吸音機構において、空気層部分にグラスウールを挿入した場合、高周波数域での吸音効果についてはあまり期待できない。",
   alt:{q:"背後空気層をもつ板振動型吸音機構において、空気層部分にグラスウールを挿入した場合、低周波数域での吸音効果についてはあまり期待できない。",ans:false},
   ans:true,
   exp:"板振動型吸音機構は薄い板が面外振動することで低周波音を吸収するのが主原理。空気層へのグラスウール挿入は低〜中周波の共鳴ピーク付近の吸音を改善するが、高周波数域の吸音効果はもともと低く、グラスウールを挿入してもあまり期待できない。"},
  {subject:"環境",topic:"音環境",
   q:"単一材料からなる壁体の遮音性能について、質量則によれば、壁の面密度を2倍にすると、透過損失の値は約6dB増加する。",
   alt:{q:"単一材料からなる壁体の遮音性能について、質量則によれば、壁の面密度を2倍にすると、透過損失の値は約3dB増加する。",ans:false},
   ans:true,
   exp:"質量則：TL≈20log(m・f)－43（m:面密度[kg/m²]、f:周波数[Hz]）。面密度mが2倍→TLの増加＝20log(2)≈6.02dB≈6dB。同様に、同一材で周波数が2倍（1オクターブ上）でも約6dB増加する。"},
  {subject:"環境",topic:"温熱環境",
   q:"自然室温は、室内における空気温度と平均放射温度の重み付け平均で表される値であり、一般に、発汗の影響が小さい環境下における熱環境に関する指標として用いられる。",
   alt:{q:"自然室温は、室内における空気温度と湿球温度の重み付け平均で表される値であり、一般に、発汗の影響が大きい高温環境下における熱環境に関する指標として用いられる。",ans:false},
   ans:true,
   exp:"自然室温（NOR）は空気温度と平均放射温度（MRT）の重み付け平均で作用温度に相当する概念。主に低〜中温度域（発汗が少ない環境）での熱環境評価指標。高温多湿環境では蒸発冷却（発汗）の影響が大きくなりWBGT等が用いられる。"},
  {subject:"環境",topic:"換気",
   q:"開口の通過風量は、開口の内外の圧力差を2倍にすると2倍になる。",
   alt:{q:"開口の通過風量は、開口の内外の圧力差を2倍にすると√2倍になる。",ans:true},
   ans:false,
   exp:"開口部通過風量 Q＝α・A・√(2ΔP/ρ)（α:流量係数、A:開口面積、ΔP:内外圧力差、ρ:空気密度）。Q∝√(ΔP)なので、ΔPが2倍になるとQ は√2≈1.41倍になる。2倍にするにはΔPを4倍にする必要がある。"},
  {subject:"環境",topic:"換気",
   q:"上下に大きさの異なる二つの開口部がある室において、無風の条件で温度差換気を行う場合、大きな開口部における内外圧力差は、小さな開口部に比べて大きい。",
   alt:{q:"上下に大きさの異なる二つの開口部がある室において、無風の条件で温度差換気を行う場合、小さな開口部における内外圧力差は、大きな開口部に比べて大きい。",ans:true},
   ans:false,
   exp:"温度差換気では中性帯（圧力差ゼロの面）の位置が開口面積比で決まる。中性帯はQ∝A√(ΔP)の釣り合いにより、大きな開口側に近い位置になる。その結果、小さな開口部は中性帯から遠くなり内外圧力差が大きくなる。"},
  {subject:"環境",topic:"換気",
   q:"第一種換気方式によって居室ごとに個別に換気を行う場合、居室と廊下等とを隔てる扉には、換気経路の確保を目的としたアンダーカットやがらりを設けなくてもよい。",
   alt:{q:"第三種換気方式によって居室ごとに個別に換気を行う場合、居室と廊下等とを隔てる扉には、換気経路の確保を目的としたアンダーカットやがらりを設けなくてもよい。",ans:false},
   ans:true,
   exp:"第一種換気（機械給気＋機械排気）は各居室で給排気を独立して完結させるため、廊下等を介した空気経路が不要。アンダーカットやがらりを省略できる。第三種換気（機械排気のみ）では外気を居室へ取り込む経路として扉の隙間等が必要になる。"},
  {subject:"環境",topic:"換気",
   q:"屋内駐車場の換気方式においては、一般に、周辺諸室への排気ガスの流出を防ぐために、第二種機械換気方式を採用する。",
   alt:{q:"屋内駐車場の換気方式においては、一般に、周辺諸室への排気ガスの流出を防ぐために、第三種機械換気方式を採用する。",ans:true},
   ans:false,
   exp:"第二種換気（機械給気＋自然排気）は室内が正圧→汚染空気が周辺室に流出する恐れがある。屋内駐車場では排気ガスを周辺室に流出させないよう、第三種換気（機械排気＋自然給気）で駐車場を負圧に保つのが適切。"},
  {subject:"環境",topic:"空気環境",
   q:"容積の異なる二つの室において、それぞれの室内のCO₂発生量及び換気回数が同じ場合、定常状態での室内のCO₂濃度は、一般に、容積が大きい室より小さい室のほうが高くなる。",
   alt:{q:"容積の異なる二つの室において、それぞれの室内のCO₂発生量及び換気回数が同じ場合、定常状態での室内のCO₂濃度は、一般に、容積の大小にかかわらず等しくなる。",ans:false},
   ans:true,
   exp:"換気回数n（回/h）が同じで容積Vが異なる→換気量Q＝n×V（小さい室は換気量が少ない）。定常CO₂濃度C＝C₀+M/Q＝C₀+M/(n×V)。容積が小さい室ほどQが少なくCが高くなる。換気「量」が同じなら容積に無関係だが「換気回数」が同じなら容積で変わる。"},
  {subject:"環境",topic:"換気",
   q:"500m²の劇場の客席（400席）の換気量を、6,000m³/hとした。",
   alt:{q:"500m²の劇場の客席（400席）の換気量を、8,000m³/hとした。",ans:true},
   ans:false,
   exp:"建築基準法施行令第20条の2に基づく劇場等の必要換気量は1人当たり20m³/h。400席×20m³/h＝8,000m³/hが必要換気量。6,000m³/h（15m³/h/人）は法定水準に満たない。"},
  {subject:"環境",topic:"熱環境",
   q:"単一の材料からなる壁を単位時間に貫流する熱量は、定常状態において、壁体の表面積が2倍になると2倍になり、壁の厚さが2倍になると1/2になる。",
   alt:{q:"単一の材料からなる壁を単位時間に貫流する熱量は、定常状態において、壁体の表面積が2倍になると2倍になり、壁の厚さが2倍になると2倍になる。",ans:false},
   ans:true,
   exp:"定常熱貫流量 Q＝λ/d×A×ΔT（λ:熱伝導率、d:厚さ、A:面積、ΔT:温度差）。面積Aが2倍→Q倍。厚さdが2倍→熱抵抗d/λが2倍→Qは1/2倍。面積と熱量は比例、厚さと熱量は反比例の関係。"},
  {subject:"環境",topic:"換気",
   q:"暖房設備から室内に発生する水蒸気の量を抑制するため、暖房設備を密閉型燃焼器具の代わりに開放型燃焼器具とした。",
   alt:{q:"暖房設備から室内に発生する水蒸気の量を抑制するため、暖房設備を開放型燃焼器具の代わりに密閉型燃焼器具とした。",ans:true},
   ans:false,
   exp:"開放型燃焼器具（石油ファンヒーター・ガスストーブ等）は燃焼ガスを室内に排出するため大量の水蒸気が発生し結露の原因になる。密閉型（FF式・FE式）は排気を屋外に排出するため室内の水蒸気発生が少ない。「密閉型の代わりに開放型」は誤りで逆が正しい。"},
  {subject:"環境",topic:"省エネ",
   q:"窓ガラスの室内側にカーテンを設けることは、冬期におけるガラス面の結露の防止対策として期待できない。",
   alt:{q:"窓ガラスの室内側にカーテンを設けることは、冬期におけるガラス面の結露の防止対策として有効である。",ans:false},
   ans:true,
   exp:"室内側カーテンは室内の暖気をガラス面に届きにくくし、ガラス表面温度がさらに低下して露点温度を下回りやすくなる（結露促進）。結露防止対策としては効果がない（むしろ逆効果）。有効な対策は複層ガラス・内窓設置・室内の暖気を窓面に当てること等。"},
  {subject:"環境",topic:"日射",
   q:"年間の水平面の日差し曲線を1枚の図としてまとめたものを、日照図表という。",
   alt:{q:"特定の建物による一定時間の日影の輪郭をまとめた図を、日照図表という。",ans:false},
   ans:true,
   exp:"日照図表は、ある地点において水平面上に投影された太陽の軌跡（日差し曲線・等時間日照線）を年間の代表日（春分・夏至・冬至等）について1枚にまとめた図。建物等の影がどの方位にどれだけ伸びるかを読み取るために使用する。"},
  {subject:"環境",topic:"日射",
   q:"透明フロート板ガラスを使用した窓の室内側にブラインドを設ける場合、一般に、暗色ブラインドより明色ブラインドのほうが日射遮蔽性能は高い。",
   alt:{q:"透明フロート板ガラスを使用した窓の室内側にブラインドを設ける場合、一般に、明色ブラインドより暗色ブラインドのほうが日射遮蔽性能は高い。",ans:false},
   ans:true,
   exp:"室内側ブラインドは日射がガラスを透過した後に作用するため、日射を反射できるかどうかが重要。明色（白・アイボリー等）は日射を多く反射し暗色（黒・濃色）は吸収して熱に変え室内に放射するため、明色ブラインドのほうが日射遮蔽係数（SC値）が低く遮蔽性能が高い。"},
  {subject:"環境",topic:"日射",
   q:"日射遮蔽係数は、3mm厚の普通透明ガラスの日射遮蔽性能を基準として表した係数であり、その値が大きいほど日射熱取得が小さくなる。",
   alt:{q:"日射遮蔽係数は、3mm厚の普通透明ガラスの日射遮蔽性能を基準として表した係数であり、その値が大きいほど日射熱取得が大きくなる。",ans:true},
   ans:false,
   exp:"日射遮蔽係数（SC）＝対象ガラスの日射熱取得量÷基準ガラス（3mm透明板ガラス）の日射熱取得量。基準ガラスのSC＝1.0。SC値が大きいほど日射熱取得量が多い（遮蔽性能が低い）。熱線吸収ガラスや熱線反射ガラスはSC＜1.0。"},
  {subject:"環境",topic:"日射",
   q:"曇天時においては、雲量が多いほど、雲高が低いほど夜間放射量は大きくなる。",
   alt:{q:"曇天時においては、雲量が多いほど、雲高が低いほど夜間放射量は小さくなる。",ans:true},
   ans:false,
   exp:"夜間放射（正味長波放射）＝地表からの上向き長波放射－大気（雲）からの下向き長波放射。雲量が多い・雲高が低い（雲の温度が高い）ほど下向き大気放射が増大→地表への正味の熱損失（夜間放射）は小さくなる。晴天夜は夜間放射が大きく冷え込みが強い。"},
  {subject:"環境",topic:"日射",
   q:"水平面天空日射量は、大気透過率が大きいほど、小さくなる。",
   alt:{q:"水平面天空日射量は、大気透過率が大きいほど、大きくなる。",ans:false},
   ans:true,
   exp:"天空日射量（散乱日射量）は大気中の微粒子や水蒸気による散乱で生じる。大気透過率が大きい（大気が清澄）→散乱が少ない→天空日射量が小さくなる。逆に大気が混濁（透過率小）すると散乱が多く天空日射量は大きくなる。"},
  {subject:"環境",topic:"日射",
   q:"北緯35度のある地点における春分・秋分の日の終日日射量は、終日快晴の場合、どの向きの鉛直面よりも水平面のほうが大きい。",
   alt:{q:"北緯35度のある地点における春分・秋分の日の終日日射量は、終日快晴の場合、水平面よりも南向き鉛直面のほうが大きい。",ans:false},
   ans:true,
   exp:"春分・秋分（赤緯0°）の北緯35度での南中高度は55°。水平面は日の出から日没まで（約12時間）継続して日射を受け、南向き鉛直面は朝夕の東西成分の直達日射が当たらない。終日積算では水平面＞南向き鉛直面（春秋分・北緯35度の条件）。"},

  {subject:"計画",topic:"建築計画",

   alt:{q:"クールチューブは、地中に埋設したダクトに外気を通し、地盤の熱容量を利用して空気を冷却することで夏期の室温上昇を抑える方式である。",ans:true},
   ans:false,

   alt:{q:"茨城県営六番池アパート（水戸市）は、四つの住棟、集会室及び中央広場で構成され、中央広場については、住戸又は集会室を介してアクセスする居住者専用のものである。",ans:false},

  {subject:"計画",topic:"集合住宅",

   ans:true,

  {subject:"計画",topic:"集合住宅",

  {subject:"計画",topic:"福祉施設",

  {subject:"計画",topic:"住宅計画",

  {subject:"計画",topic:"事務所計画",

  {subject:"計画",topic:"事務所計画",

  {subject:"計画",topic:"事務所計画",

  {subject:"計画",topic:"劇場",

  {subject:"計画",topic:"商業施設",

  {subject:"計画",topic:"展示施設",

  // ── 構造追加 ──
  {subject:"構造",topic:"屋根・風圧",
   q:"屋根葺き材の風圧に対する構造耐力上の安全性を確かめるための構造計算の基準は、建築物の高さにかかわらず適用される。",
   alt:{q:"屋根葺き材の風圧に対する構造耐力上の安全性を確かめるための構造計算の基準は、高さ13mを超える建築物にのみ適用される。",ans:false},
   ans:true,
   exp:"屋根葺き材等の風圧に対する構造計算（平成12年建設省告示第1458号等）は、建築物の規模・高さを問わず適用される。一般の構造計算と異なり高さによる免除規定がない。"},
  {subject:"構造",topic:"屋根・風圧",
   q:"屋根葺き材に作用する風圧力の算出に用いる平均速度圧qの大きさは、気流の乱れを表すガスト影響係数Gfに比例する。",
   alt:{q:"屋根葺き材に作用する風圧力の算出に用いるガスト影響係数Gfの大きさは、地表面粗度区分によって異なる値が用いられる。",ans:true},
   ans:false,
   exp:"平均速度圧qは基準風速Vo・地表面粗度区分・高さ補正係数Erから算出され、ガスト影響係数Gfとは独立した値。GfはqとはWp=q×Cf×Gfの積の形で風圧力に乗じるものであり、qはGfに比例しない。"},
  {subject:"構造",topic:"積雪荷重",
   q:"多雪区域における大スパン等の一定の条件を満たす緩勾配屋根を有する建築物では、屋根版の構造種別によっては、構造計算において用いる積雪荷重に積雪後の降雨を考慮した割増係数を乗じることが求められる場合がある。",
   alt:{q:"多雪区域における大スパン等の一定の条件を満たす緩勾配屋根を有する建築物では、屋根版の構造種別にかかわらず、構造計算において用いる積雪荷重に積雪後の降雨を考慮した割増係数を必ず乗じることが求められる。",ans:false},
   ans:true,
   exp:"平成12年建設省告示第1455号に基づき、多雪区域の大スパン緩勾配屋根では屋根版の構造種別（木造、RC造等）によっては積雪荷重に降雨割増係数を乗じることが求められる。「構造種別にかかわらず必ず」は誤り。"},
  {subject:"構造",topic:"積雪荷重",
   q:"多雪区域を指定する基準において、垂直積雪量が１m未満であっても、積雪の初終間日数の平年値が30日以上の区域である場合は、多雪区域となる。",
   alt:{q:"多雪区域を指定する基準において、積雪の初終間日数の平年値が30日以上の区域であっても、垂直積雪量が１m未満である場合は、多雪区域とならない。",ans:false},
   ans:true,
   exp:"建築基準法施行令第86条第3項により、多雪区域の指定基準は「垂直積雪量1m以上」または「積雪の初終間日数の平年値30日以上」のいずれかを満たす区域。1m未満でも初終間日数30日以上なら多雪区域となる。"},
  {subject:"構造",topic:"RC構造",
   q:"梁部材における主筋のコンクリートに対する許容付着応力度として、上端筋では下端筋よりも大きい値を用いた。",
   alt:{q:"梁部材における主筋のコンクリートに対する許容付着応力度として、上端筋では下端筋よりも小さい値を用いた。",ans:true},
   ans:false,
   exp:"梁上端筋はコンクリート打設時にコンクリートが沈降・ブリーディングにより鉄筋下面に水が溜まり付着が低下するため、許容付着応力度は下端筋より小さい値を用いる（RC規準の規定）。"},
  {subject:"構造",topic:"RC構造",
   q:"柱部材の長期許容せん断力の計算において、帯筋や軸圧縮応力度の効果はないものとした。",
   alt:{q:"柱部材の短期許容せん断力の計算において、帯筋や軸圧縮応力度の効果はないものとした。",ans:false},
   ans:true,
   exp:"RC規準では、柱の長期許容せん断力の計算式には帯筋（せん断補強筋）の効果は含まれない。帯筋と軸圧縮応力度の効果は短期許容せん断力（Qa）の算定式に反映される。"},
  {subject:"構造",topic:"RC構造",
   q:"柱梁接合部のせん断耐力は、取り付く梁の主筋量には関係しない。",
   alt:{q:"柱梁接合部のせん断耐力は、取り付く梁の主筋量が多いほど大きくなる。",ans:false},
   ans:true,
   exp:"RC柱梁接合部のせん断耐力は、パネルゾーンのコンクリート強度・横補強筋量・柱の軸力等に依存し、取り付く梁の主筋量とは直接関係しない（梁主筋量が多いとせん断需要が増えるが、耐力自体は変わらない）。"},
  {subject:"構造",topic:"RC構造",
   q:"引張鉄筋の必要定着長さは、横補強筋で拘束されたコア内に定着する場合より、横補強筋で拘束されていない部分に定着する場合のほうが短くなる。",
   alt:{q:"引張鉄筋の必要定着長さは、横補強筋で拘束されていない部分に定着する場合より、横補強筋で拘束されたコア内に定着する場合のほうが短くなる。",ans:true},
   ans:false,
   exp:"横補強筋で拘束されたコア内はコンクリートの拘束効果が高く付着強度が増大するため必要定着長さを短くできる。拘束されていない部分では付着強度が低いため必要定着長さは長くなる。設問は逆が正しい。"},
  {subject:"構造",topic:"RC構造",
   q:"梁主筋の柱への必要定着長さは、柱のコンクリートの設計基準強度が高いほど短くなる。",
   alt:{q:"梁主筋の柱への必要定着長さは、柱のコンクリートの設計基準強度が高いほど長くなる。",ans:false},
   ans:true,
   exp:"必要定着長さはL＝k×φ×(ft/τa)等の式で求められる。コンクリート基準強度Fcが高いほど許容付着応力度τaが大きくなり、必要定着長さは短くなる。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"圧縮材の許容圧縮応力度は、鋼材及び部材の座屈長さが同じ場合、座屈軸まわりの断面二次半径が小さいほど小さくなる。",
   alt:{q:"圧縮材の許容圧縮応力度は、鋼材及び部材の座屈長さが同じ場合、座屈軸まわりの断面二次半径が小さいほど大きくなる。",ans:false},
   ans:true,
   exp:"細長比λ＝lk/i（座屈長さ/断面二次半径）。断面二次半径iが小さいほどλが大きくなり、座屈が起こりやすくなる。許容圧縮応力度fcはλが大きいほど小さくなる。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"鉄骨構造の耐震計算に関して「ルート３」で、建築構造用冷間プレス成形角形鋼管BCPの柱が局部崩壊メカニズムと判定された場合、柱の耐力を割増して算定した保有水平耐力が、必要保有水平耐力以上であることを確認する必要がある。",
   alt:{q:"鉄骨構造の耐震計算に関して「ルート３」で、建築構造用冷間プレス成形角形鋼管BCPの柱が大梁崩壊メカニズムと判定された場合、柱の耐力を割増して算定した保有水平耐力が、必要保有水平耐力以上であることを確認する必要がある。",ans:false},
   ans:true,
   exp:"ルート3でBCPを用いた場合、局部崩壊メカニズムと判定されたときは、残留応力の影響で柱の塑性変形能力が低下することを考慮し、柱の保有耐力を1/0.25倍等で割増して保有水平耐力を確認する。大梁崩壊メカニズムでは割増不要。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"鉄骨構造の耐震計算に関して「ルート１－２」で、厚さ６mm以上の冷間成形角形鋼管を用いた柱を設計する場合、地震時応力の割増し係数は、建築構造用冷間プレス成形角形鋼管BCPより、建築構造用冷間ロール成形角形鋼管BCRのほうが大きい。",
   alt:{q:"鉄骨構造の耐震計算に関して「ルート１－２」で、厚さ６mm以上の冷間成形角形鋼管を用いた柱を設計する場合、地震時応力の割増し係数は、建築構造用冷間ロール成形角形鋼管BCRより、建築構造用冷間プレス成形角形鋼管BCPのほうが大きい。",ans:false},
   ans:true,
   exp:"ルート1-2における地震時応力割増係数は、BCR（ロール成形）が1.5、BCP（プレス成形）が1.3。BCRは製造時のコーナー部の残留応力が大きく、BCPより割増係数が大きく設定されている。"},
  {subject:"構造",topic:"合成構造",
   q:"鉄筋コンクリートスラブとこれを支持する鉄骨梁とを接合する合成梁を完全合成梁とする場合には、合成梁断面が全塑性モーメントを発揮するのに必要な本数の過半の頭付きスタッドを設ける。",
   alt:{q:"鉄筋コンクリートスラブとこれを支持する鉄骨梁とを接合する合成梁を完全合成梁とする場合には、合成梁断面が全塑性モーメントを発揮するのに必要な本数の頭付きスタッドを全数設ける。",ans:true},
   ans:false,
   exp:"完全合成梁とは全塑性モーメント発揮に必要な頭付きスタッドを「全数」設けたもの。「過半（半数超）」はスタッド数が必要本数に満たない不完全合成梁（部分合成梁）の定義に相当し、完全合成梁の条件を満たさない。"},
  {subject:"構造",topic:"合成構造",
   q:"鉄骨造において、長期間の荷重によるデッキプレート版（デッキ合成スラブ）の変形増大係数は、梁よりも大きい値を用いる。",
   alt:{q:"鉄骨造において、長期間の荷重によるデッキプレート版（デッキ合成スラブ）の変形増大係数は、梁と同じ値を用いる。",ans:false},
   ans:true,
   exp:"デッキ合成スラブはコンクリートのクリープと乾燥収縮の影響を大きく受けるため、長期荷重による変形増大係数は鉄骨梁（鋼材のみでクリープが無視できる）より大きい値を用いる。"},
  {subject:"構造",topic:"合成構造",
   q:"鉄骨梁と鉄筋コンクリートスラブとを頭付きスタッドを介して緊結した合成梁の曲げ剛性の算定に用いる床スラブの有効幅は、鉄筋コンクリート梁の曲げ剛性の算定に用いる床スラブの有効幅と同じとすることができる。",
   alt:{q:"鉄骨梁と鉄筋コンクリートスラブとを頭付きスタッドを介して緊結した合成梁の曲げ剛性の算定に用いる床スラブの有効幅は、鉄筋コンクリート梁の曲げ剛性の算定に用いる床スラブの有効幅より大きい値としなければならない。",ans:false},
   ans:true,
   exp:"合成梁の曲げ剛性算定に用いる床スラブの有効幅は、RC梁に準じた有効幅の規定（梁間中心距離の1/2や梁せいの倍数等）と同じとすることができる。"},
  {subject:"構造",topic:"地盤・基礎",
   q:"地震時に液状化のおそれのない地盤において、杭の極限支持力は、杭の種類や施工法に応じた極限先端支持力と極限周面抵抗力との和として算定できる。",
   alt:{q:"地震時に液状化のおそれのない地盤において、杭の極限支持力は、杭の種類や施工法にかかわらず、極限先端支持力のみで算定しなければならない。",ans:false},
   ans:true,
   exp:"杭の極限支持力Ru＝Rpu（極限先端支持力）＋Rfu（極限周面抵抗力）で算定される。杭の種類・施工法に応じた値を用い、先端と周面の両方を考慮するのが基本。"},
  {subject:"構造",topic:"地盤・基礎",
   q:"地震時に液状化のおそれのある地盤においては、杭の許容支持力は、載荷試験による極限支持力から求めることはできない。",
   alt:{q:"地震時に液状化のおそれのある地盤においては、杭の許容支持力を算定する場合、液状化による支持力の低下を考慮する必要がある。",ans:true},
   ans:false,
   exp:"液状化のおそれがある地盤においても、杭の載荷試験を行い極限支持力を求めることは可能。ただし、液状化時には支持力が大幅に低下することを考慮した設計が必要であり、「載荷試験から求めることができない」は誤り。"},
  {subject:"構造",topic:"地盤・基礎",
   q:"砂質地盤における杭の極限周面抵抗力度は、場所打ちコンクリート杭より杭周固定液を使用した埋込み杭のほうが大きく評価できる。",
   alt:{q:"砂質地盤における杭の極限周面抵抗力度は、杭周固定液を使用した埋込み杭より場所打ちコンクリート杭のほうが大きく評価できる。",ans:true},
   ans:false,
   exp:"砂質地盤では場所打ちコンクリート杭は地盤と直接密着して大きな付着・摩擦が得られるが、埋込み杭（杭周固定液使用）は杭と地盤の間に固化材が介在するため、一般に場所打ちコンクリート杭のほうが周面抵抗力度を大きく評価できる。"},
  {subject:"構造",topic:"地盤・基礎",
   q:"受働土圧は、地下外壁や擁壁が地盤から離れる方向に変位するときに、最終的に一定値に落ち着いた状態で発揮される土圧である。",
   alt:{q:"受働土圧は、地下外壁や擁壁が地盤に向かって押し込まれる方向に変位するときに、最終的に一定値に落ち着いた状態で発揮される土圧である。",ans:true},
   ans:false,
   exp:"受働土圧（Passive Earth Pressure）は壁が地盤を圧縮する方向（地盤に向かって押し込まれる方向）に変位するときに発揮される。地盤から離れる方向（引張側）に変位するときは主働土圧となる。"},
  {subject:"構造",topic:"地盤・基礎",
   q:"直接基礎の基礎スラブの部材応力算定用の接地圧については、一般に、基礎スラブの自重を考慮しなくてよい。",
   alt:{q:"直接基礎の基礎スラブの部材応力算定用の接地圧については、一般に、基礎スラブの自重を接地圧に加算して考慮しなければならない。",ans:false},
   ans:true,
   exp:"基礎スラブの部材応力算定用接地圧は、スラブ全体の地盤反力（接地圧）からスラブ自重を差し引いた「有効接地圧」を用いる。自重は鉛直荷重として接地圧と相殺されるため、部材応力の算定では考慮しなくてよい。"},
  {subject:"構造",topic:"耐震計画",
   q:"制振構造に用いられる鋼材ダンパーは、ダンパーが弾性範囲に留まる地震動レベルにおいてはエネルギー吸収能力を発揮しない。",
   alt:{q:"制振構造に用いられる鋼材ダンパーは、ダンパーが弾性範囲に留まる地震動レベルにおいてもエネルギー吸収能力を十分に発揮する。",ans:false},
   ans:true,
   exp:"鋼材ダンパー（履歴型ダンパー）は金属の塑性変形によってエネルギーを吸収する。ダンパーが弾性範囲内（降伏前）の変形では塑性変形が生じないため、エネルギー吸収能力を発揮しない。降伏させることが使用前提。"},
  {subject:"構造",topic:"耐震計画",
   q:"耐震計算を行う場合に用いるAiは、多数の地震応答解析結果の蓄積から、それらをまとめたものに基づき定められた、設計用層せん断力を求めるための高さ方向の分布を表す係数である。",
   alt:{q:"耐震計算を行う場合に用いるAiは、理論的な解析式から一意に定まる、設計用層せん断力を求めるための深さ方向の分布を表す係数である。",ans:false},
   ans:true,
   exp:"Ai（層せん断力係数の高さ方向分布係数）は、多数の地震応答解析の結果を統計的に整理したものに基づいて建築基準法施行令第88条第4項で定められた設計用の係数。「高さ方向」の分布を表す。"},
  {subject:"構造",topic:"材料",
   q:"コンクリートのヤング係数は、コンクリートの圧縮強度が高いほど大きい。",
   alt:{q:"コンクリートのヤング係数は、コンクリートの圧縮強度が高いほど小さい。",ans:false},
   ans:true,
   exp:"コンクリートのヤング係数E＝33×γ³×√Fc（SI単位の近似式）。圧縮強度Fcが大きいほど√Fcが大きくなるため、ヤング係数も大きくなる。高強度コンクリートほど剛性が高い。"},
  {subject:"構造",topic:"材料",
   q:"水和熱によるコンクリートのひび割れは、単位セメント量が少ないコンクリートほど発生しやすい。",
   alt:{q:"水和熱によるコンクリートのひび割れは、単位セメント量が多いコンクリートほど発生しやすい。",ans:true},
   ans:false,
   exp:"水和熱はセメントが水と化学反応して発生する熱。単位セメント量が多いほど水和熱が大きくなり、温度応力によるひび割れが発生しやすくなる。マスコンクリートでは低熱ポルトランドセメントや単位セメント量の低減が対策となる。"},
  {subject:"構造",topic:"鋼材",
   q:"建築構造用圧延鋼材SN490B（板厚12mm以上）は、「降伏点又は耐力」の下限値は規定されているが、上限値は規定されていない。",
   alt:{q:"建築構造用圧延鋼材SN490B（板厚12mm以上）は、「降伏点又は耐力」の下限値と上限値の両方が規定されている。",ans:true},
   ans:false,
   exp:"SN材（建築構造用圧延鋼材）はJIS G 3136で規定され、SN490Bは降伏点の下限値（325N/mm²以上）だけでなく上限値（445N/mm²以下）も規定されている。降伏比の管理を通じて靭性確保が目的。SS材やSM材と異なり上限値も規定されるのがSN材の特徴。"},
  {subject:"構造",topic:"鋼材",
   q:"鋼材は、一般に、炭素含有量が多くなるほど、破断に至るまでの伸びが小さくなる。",
   alt:{q:"鋼材は、一般に、炭素含有量が多くなるほど、破断に至るまでの伸びが大きくなる。",ans:false},
   ans:true,
   exp:"炭素鋼は炭素含有量が増加すると硬度・引張強度は増大するが、延性・靭性（破断伸び）が低下する。高炭素鋼は硬くて割れやすく、低炭素鋼は軟らかくて変形しやすい。"},
  {subject:"構造",topic:"PC構造",
   q:"プレストレストコンクリート構造におけるプレテンション方式は、PC鋼材を緊張した状態でその周りに直接コンクリートを打設し、コンクリートが所定の強度に達した後に緊張端の張力を解放して、PC鋼材とコンクリートとの付着によりプレストレスを導入するものである。",
   alt:{q:"プレストレストコンクリート構造におけるポストテンション方式は、PC鋼材を緊張した状態でその周りに直接コンクリートを打設し、コンクリートが所定の強度に達した後に緊張端の張力を解放して、PC鋼材とコンクリートとの付着によりプレストレスを導入するものである。",ans:false},
   ans:true,
   exp:"プレテンション方式：①PC鋼材を緊張→②周りにコンクリート打設→③硬化後に張力解放→④付着によりプレストレス導入。ポストテンション方式はコンクリート硬化後にシース内のPC鋼材を緊張・定着する方式であり、設問はプレテンション方式の正確な説明。"},

  {subject:"計画",topic:"建築実例",
   q:"バラガン自邸（ルイス・バラガン、メキシコ）は、庭と分かち難く結びついた内部空間をもち、居間の奥には庭に面して大きな窓を設け、積極的に外部を内部に取り込んだ住宅である。",
   alt:{q:"住吉の長屋（安藤忠雄、大阪府）は、庭と分かち難く結びついた内部空間をもち、居間の奥には庭に面して大きな窓を設け、積極的に外部を内部に取り込んだ住宅である。",ans:false},
   ans:true,
   exp:"バラガン自邸（1948年、メキシコシティ）は色彩豊かな壁・光・水の演出、プライベートな庭と居間を大きな窓でつなぐ内外一体の空間が特徴で、1999年に世界文化遺産に登録されたルイス・バラガンの代表作。住吉の長屋（安藤忠雄設計、1976年）はRC打放しの閉鎖的外壁をもち、外部に向けて大きな窓を開かず中庭を介して光・風を取り込む内向きの住宅であり、積極的に外部を取り込む構成ではない。"},
  {subject:"計画",topic:"集合住宅",
   q:"堀川団地出水団地第１棟・第２棟（京都府）は、戦後建設された鉄筋コンクリート造の店舗併用集合住宅であり、改修により、耐震補強やエレベーター設置のほか、多世代向けの住戸改修とDIY可能な住戸の導入などがされている。",
   alt:{q:"堀川団地出水団地第１棟・第２棟（京都府）は、戦後建設された鉄骨造の単身者向け集合住宅であり、改修により全住戸を解体し現代的な共同住宅として建て替えが行われた。",ans:false},
   ans:true,
   exp:"京都市の堀川団地（出水団地第1・2棟、1950年代建設）はRC造の戦後集合住宅で、下層階に店舗が入る店舗併用型。改修では既存躯体を活かして耐震補強・EV設置を行い、多世代向け住戸改修・DIY可能住戸（居住者自身がリノベーションできる住戸）の導入など、スクラップ＆ビルドによらない継続活用の先進事例として評価されている。"},
  {subject:"計画",topic:"集合住宅",
   q:"幕張ベイタウンパティオス４番街（千葉県、1995年）は、分譲集合住宅であり、住戸には仕事場等として使用できる開放的なf-ルームが設けられ、中廊下やコモンテラスと連続して計画された。",
   alt:{q:"幕張ベイタウンパティオス４番街（千葉県、1995年）は、高層板状住棟による高密度な賃貸集合住宅であり、住戸には仕事場等として使用できる開放的なf-ルームが設けられ、中廊下やコモンテラスと連続して計画された。",ans:false},
   ans:true,
   exp:"幕張ベイタウンパティオス4番街（1995年）は分譲集合住宅。住戸にはSOHO的に使えるf-ルーム（フレキシブルルーム）を設け、中廊下・コモンテラスとつながる豊かな共用空間が特徴。「賃貸集合住宅」とする記述は誤りで、分譲（所有権取得型）の住宅。"},
  {subject:"計画",topic:"集合住宅",
   q:"基町高層アパート（広島県）は、偶数階に通路をもつ住棟を「く」の字型に連結させた計画である。",
   alt:{q:"基町高層アパート（広島県）は、全階に通路をもつ住棟を「く」の字型に連結させた計画である。",ans:false},
   ans:true,
   exp:"基町高層アパート（大高正人設計、広島市）はスキップフロア型（隔層廊下）を採用し、全階ではなく偶数階のみに共用廊下を設けた高層住棟を「く」の字型に連結した計画。隔層廊下によりプライバシー確保と通風・採光を両立した、都市型高層集合住宅の先駆的事例。"},
  {subject:"計画",topic:"医療施設",
   q:"1看護単位当たりの病床数は、40床を標準とする。",
   alt:{q:"1看護単位当たりの病床数は、80床を標準とする。",ans:false},
   ans:true,
   exp:"看護単位（ナーシングユニット）とは、1人の看護師長のもとで一体的に管理される病棟単位。適正な病床数は40〜50床が標準とされ、40床は看護師の目が行き届き患者ケアの質を確保できる規模として建築計画上の目安となる。80床は1看護単位として大きすぎ、管理面・ケアの質の両面で問題が生じやすい。"},
  {subject:"計画",topic:"医療施設",
   q:"LDR室の計画に当たり、家具や空間の仕上げに木材を使用する等、暖かい家庭的な雰囲気となるように配慮した。",
   alt:{q:"LDR室の計画に当たり、清潔感と医療の安心感を最優先とし、全面をステンレスと磁器タイル仕上げとした無機質な空間として計画した。",ans:false},
   ans:true,
   exp:"LDR室（Labor Delivery Recovery Room）は陣痛・分娩・産後回復を1室で一貫して行う産科の多機能室。産婦や家族がリラックスして過ごせるよう、木材・布製品など温かみのある素材を用いた家庭的な雰囲気に配慮することが計画の重要な視点。ステンレス・タイルのみの無機質な仕上げは産婦のストレスを高める恐れがある。"},
  {subject:"計画",topic:"福祉施設",
   q:"「日本版CCRC（Continuing Care Retirement Community）」は、大都市に在住する高齢者が健康な段階から地方へ移住し、地域活動に積極的に参加することをとおして、地域社会に溶け込み、多世代と交流・共働する居住が基本となっている。",
   alt:{q:"「日本版CCRC（Continuing Care Retirement Community）」は、大都市に在住する高齢者が介護が必要となった段階から地方へ移住し、医療・介護施設において同世代の高齢者のみで共同生活することが基本となっている。",ans:false},

  {subject:"構造",topic:"荷重",

   ans:true,
   exp:"建築基準法施行令第88条・第86条等に基づき、積雪荷重と他の荷重の組み合わせが義務付けられるのは多雪区域（垂直積雪量1m以上等）のみ。一般地域では暴風時・地震時と積雪荷重の組み合わせは不要。多雪区域では短期（暴風・地震）にも積雪荷重の70%を加算して組み合わせる。"},
  {subject:"構造",topic:"耐震計算",

   ans:true,
   exp:"令第88条第4項により、必要保有水平耐力（ルート3）の算定に用いるC0は1.0以上とする。C0=0.2以上は許容応力度計算（ルート1・2）における地震力算定時の標準値であり、保有水平耐力計算とは異なる。"},
  {subject:"構造",topic:"木造壁量",

  {subject:"構造",topic:"木造壁量",

  {subject:"構造",topic:"木造壁量",

   ans:true,

  {subject:"構造",topic:"耐力壁",
   q:"鉄筋コンクリート耐力壁の長期許容せん断力の計算において、壁の横筋による効果を無視した。",

   ans:true,
   exp:"RC規準では、耐力壁の長期許容せん断力の算定式には水平鉄筋（横筋）の効果を含まない。横筋（せん断補強筋）の効果は短期許容せん断力の割増に反映される。長期は壁コンクリートのみで負担するとして横筋を無視するのが標準的な扱い。"},
  {subject:"構造",topic:"RC造",
   q:"鉄筋コンクリート構造の柱の軸方向の圧縮耐力は、一般に、帯筋によるコンクリートの拘束の度合いが大きいほど大きくなり、最大耐力以降の耐力低下の度合いも緩やかになる。",
   alt:{q:"鉄筋コンクリート構造の柱の軸方向の圧縮耐力は、一般に、帯筋によるコンクリートの拘束の度合いが大きくなっても、最大耐力以降の耐力低下の度合いは変わらない。",ans:false},
   ans:true,

  {subject:"構造",topic:"RC造",

   ans:true,
   exp:"RC規準の柱のせん断耐力算定式では、コンクリートの設計基準強度Fcが大きいほど許容付着応力度・せん断応力度が増大する。√Fc や Fc^(1/3) に比例する項を含む算定式が多く、高強度コンクリートほどせん断強度が高い。"},
  {subject:"構造",topic:"耐力壁",

  {subject:"構造",topic:"RC造",

  {subject:"構造",topic:"RC造",
   q:"鉄筋コンクリート構造の鉄筋に関して最上階以外の梁で、上端筋と下端筋を柱内で連続させてU字形の折曲げ定着とする場合、その定着長さの取り方は折曲げ角度90度のフックを準用してもよい。",

   exp:"RC規準では、最上階以外の梁でU字形（上端筋・下端筋を連続させた折返し）の折曲げ定着を行う場合、その定着長さは90度フックの規定を準用してよいとされる。最上階の梁端部（柱頭部）では別の規定が適用される。"},
  {subject:"構造",topic:"鉄骨造",
   q:"H形鋼梁の許容曲げ応力度を、鋼材の基準強度、断面寸法及び材長を用いて計算した。",
   alt:{q:"H形鋼梁の許容曲げ応力度を、鋼材の基準強度及び断面寸法のみを用いて計算した。",ans:false},
   ans:true,
   exp:"H形鋼梁の許容曲げ応力度の計算では、鋼材の基準強度Fと断面寸法（フランジ幅・梁せい等）に加え、横座屈（lateral buckling）の影響を考慮するため梁の材長（有効長さ）も必要。材長のみでは細長比が求められず、横座屈に対する低減係数が算定できない。"},
  {subject:"構造",topic:"鉄骨造",
   q:"高力ボルト摩擦接合は、ボルトの締付け力により接合面に生じる摩擦力によって応力を伝達する機構である。",

   ans:true,
   exp:"高力ボルト摩擦接合はボルトを高力（規定トルク）で締め付け、接合面間に大きなクランプ力を発生させ、その摩擦力で応力を伝達する。支圧（ボルト軸部と母材孔壁の接触）で力を伝えるのは「支圧接合」であり、摩擦接合とは異なる機構。"},
  {subject:"構造",topic:"鉄骨造",
   q:"F10Tの高力ボルト摩擦接合において、２面摩擦の許容せん断応力度は、１面摩擦の場合の２倍である。",
   alt:{q:"F10Tの高力ボルト摩擦接合において、２面摩擦の許容せん断応力度は、１面摩擦の場合の1.5倍である。",ans:false},
   ans:true,
   exp:"高力ボルト摩擦接合の許容せん断力は「摩擦係数×軸力×摩擦面数」で決まる。2面摩擦は摩擦面が2つあるため1面摩擦の2倍の許容せん断力（許容せん断応力度）となる。1.5倍という係数は規定にない。"},
  {subject:"構造",topic:"鉄骨造",
   q:"突合せ溶接部において、母材の種類に応じた適切な溶接材料を用いる場合、溶接部の許容応力度は母材と同じ値を採用することができる。",
   alt:{q:"突合せ溶接部において、母材の種類に応じた適切な溶接材料を用いる場合であっても、溶接部の許容応力度は母材より低い値としなければならない。",ans:false},
   ans:true,
   exp:"完全溶込み突合せ溶接（開先溶接）では、適切な溶接材料を使用すれば溶接金属の強度は母材と同等以上となるため、溶接部の許容応力度は母材と同じ値を採用できる。部分溶込み溶接や隅肉溶接では異なる規定が適用される。"},
  {subject:"構造",topic:"耐震計算",
   q:"鉄骨構造の耐震計算に関して「ルート２」で計算する場合、地階を除き水平力を負担する筋かいの水平力分担率に応じて、地震時の応力を割増して許容応力度計算を行う必要がある。",
   alt:{q:"鉄骨構造の耐震計算に関して「ルート２」で計算する場合、地階を除き水平力を負担する筋かいの水平力分担率に応じて、地震時の応力を低減して許容応力度計算を行う必要がある。",ans:false},
   ans:true,
   exp:"ルート2（許容応力度等計算）において、筋かいの水平力分担率β（ベータ）が高い場合、筋かいが脆性的に破断する前に建物が変形しにくい（変形能力が低い）ことを考慮し、地震時応力を割増係数（βに応じて1.0〜1.5）で割増して許容応力度計算を行う。「低減」は誤り。"},
  {subject:"構造",topic:"耐震計算",
   q:"鉄骨構造の耐震計算に関して「ルート３」で計算する場合、構造特性係数Dsの算定において、柱梁接合部パネルの耐力を考慮する必要がある。",
   alt:{q:"鉄骨構造の耐震計算に関して「ルート３」で計算する場合、構造特性係数Dsの算定において、柱梁接合部パネルの耐力を考慮する必要はない。",ans:false},
   ans:true,
   exp:"ルート3（保有水平耐力計算）のDs算定では、部材の塑性変形能力と耐力を評価する。鉄骨造の柱梁接合部パネルは骨組の変形メカニズムに影響するため、パネルゾーンの耐力・変形能力をDsの算定に考慮する必要がある。"},
  {subject:"構造",topic:"地盤・基礎",
   q:"砂のせん断力に対する抵抗力の大きさは、標準貫入試験で得られるN値と相関関係にある。",
   alt:{q:"砂のせん断力に対する抵抗力の大きさは、標準貫入試験で得られるN値との相関関係はなく、三軸圧縮試験等により直接求める必要がある。",ans:false},
   ans:true,
   exp:"砂質土のN値は内部摩擦角φおよびせん断強度と高い相関関係を持ち（例：φ≈√(20N)+15°等の経験式）、地盤の支持力計算に広く利用される。ただし粘性土ではN値との相関が弱く一軸・三軸圧縮試験等が用いられる。"},
  {subject:"構造",topic:"地盤・基礎",
   q:"地盤の極限鉛直支持力は、一般に、地盤のせん断破壊が生じることにより決定される。",
   alt:{q:"地盤の極限鉛直支持力は、一般に、土粒子の圧縮破壊が生じることにより決定される。",ans:false},
   ans:true,
   exp:"極限支持力はTerzaghiの支持力公式等で表されるように、地盤のせん断強度（内部摩擦角・粘着力）を基本として、せん断破壊面の形成によって決定される。土粒子自体の圧縮（粉砕）破壊は通常の地盤応力では生じない。"},
  {subject:"構造",topic:"特定天井",
   q:"人が日常立ち入る場所に設けられる、高さが６mを超え、水平投影面積が200m²を超え、かつ単位面積質量が２kg/m²を超える吊り天井は、特定天井に該当する。",
   alt:{q:"人が日常立ち入る場所に設けられる、高さが６mを超え、水平投影面積が200m²を超え、かつ単位面積質量が５kg/m²を超える吊り天井は、特定天井に該当する。",ans:false},
   ans:true,

  {subject:"構造",topic:"特定天井",

  {subject:"構造",topic:"耐震計算",

  {subject:"構造",topic:"耐震計算",
   q:"１階にピロティ階を有する鉄筋コンクリート造建築物において、ピロティ階の独立柱の曲げ降伏による層崩壊を想定する場合、当該階における必要保有水平耐力Qunの算出に用いる形状係数Fesは、剛性率による割増係数とピロティ階への損傷集中による強度割増係数のうち、大きいほうの値を用いる。",
   alt:{q:"１階にピロティ階を有する鉄筋コンクリート造建築物において、ピロティ階の独立柱の曲げ降伏による層崩壊を想定する場合、当該階における必要保有水平耐力Qunの算出に用いる形状係数Fesは、剛性率による割増係数とピロティ階への損傷集中による強度割増係数のうち、小さいほうの値を用いる。",ans:false},
   ans:true,
   exp:"Fesはいずれか「大きいほうの値」を採用する（安全側）。剛性率が低い（不整形）かつピロティによる損傷集中が重複する場合、より大きな割増係数を採用することで必要保有水平耐力を十分に確保する。「小さいほう」は危険側の誤り。"},
  {subject:"構造",topic:"耐震計算",

   alt:{q:"地震層せん断力係数の建築物の高さ方向の分布を表す係数Aiは、一般に、建築物の上階になるほど大きくなるが、設計用一次固有周期Tが長くなるほど小さくなる。",ans:false},

  {subject:"構造",topic:"耐震計算",
   q:"保有水平耐力計算における必要保有水平耐力の算定では、形状特性を表す係数Fesは、各階の剛性率及び偏心率に応じた割増係数の積として算出する。",
   alt:{q:"保有水平耐力計算における必要保有水平耐力の算定では、形状特性を表す係数Fesは、各階の剛性率及び偏心率に応じた割増係数のうち大きいほうを採用する。",ans:false},

  {subject:"構造",topic:"免震",
   q:"積層ゴムアイソレータを用いた免震構造は、一般に、水平地震動に対する免震効果はあるが、上下地震動に対する免震効果は期待できない。",

   ans:true,
   exp:"積層ゴムアイソレータはゴム層と鋼板の交互積層構造で、水平方向に柔らかく（固有周期を長周期化して免震効果大）、鉛直方向には剛性が高い（圧縮荷重に対して変形しにくい）。このため鉛直（上下）地震動に対する免震効果は期待できない。"},
  {subject:"構造",topic:"免震",

   alt:{q:"長期荷重を受ける積層ゴムアイソレータの設計に用いる面圧は、積層ゴムの断面積を支持軸力で除した値とする。",ans:false},

  {subject:"構造",topic:"免震",

   ans:true,

  {subject:"構造",topic:"免震",
   q:"天然ゴム系の積層ゴムアイソレータを用いた免震構造においては、アイソレータのみでは減衰能力が不足するので、オイルダンパーや鋼材ダンパー等を組み込む必要がある。",

   ans:true,
   exp:"天然ゴム系積層ゴム（NRB）は高弾性・低減衰のゴム材料で、等価粘性減衰定数が2〜5%程度と低く単独では地震応答を十分に制御できない。そのため鉛プラグ入りアイソレータ（LRB）との組み合わせや、別途オイルダンパー・鋼材ダンパーを設置して減衰を補う。"},

  {subject:"環境",topic:"光環境",

  {subject:"環境",topic:"光環境",

  {subject:"環境",topic:"光環境",

  {subject:"環境",topic:"光環境",
   q:"プルキンエ現象は、暗所視において、比視感度が最大となる波長が短い波長へずれる現象である。",
   alt:{q:"プルキンエ現象は、暗所視において、比視感度が最大となる波長が長い波長へずれる現象である。",ans:false},
   ans:true,
   exp:"プルキンエ現象（Purkinje phenomenon）：明所視（錐体細胞主体）の比視感度ピークは555nm（黄緑）だが、暗所視（桿体細胞主体）では507nm（青緑）へ短波長側にシフトする。このため暗い場所では青・緑が相対的に明るく、赤が暗く見える。「長波長へずれる」は逆。"},
  {subject:"環境",topic:"光環境",

  {subject:"環境",topic:"空調設備",
