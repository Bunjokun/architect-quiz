  // ── 構造追加 ──
  {subject:"構造",topic:"一次設計",
   q:"屋根葺き材の風圧に対する構造耐力上の安全性を確かめるための構造計算の基準は、建築物の高さにかかわらず適用される。",
   alt:{q:"屋根葺き材の風圧に対する構造耐力上の安全性を確かめるための構造計算の基準は、高さ13mを超える建築物にのみ適用される。",ans:false},
   ans:true,
   exp:"屋根葺き材等の風圧に対する構造計算（平成12年建設省告示第1458号等）は、建築物の規模・高さを問わず適用される。一般の構造計算と異なり高さによる免除規定がない。"},
  {subject:"構造",topic:"一次設計",
   q:"屋根葺き材に作用する風圧力の算出に用いる平均速度圧qの大きさは、気流の乱れを表すガスト影響係数Gfに比例する。",
   alt:{q:"屋根葺き材に作用する風圧力の算出に用いるガスト影響係数Gfの大きさは、地表面粗度区分によって異なる値が用いられる。",ans:true},
   ans:false,
   exp:"平均速度圧qは基準風速Vo・地表面粗度区分・高さ補正係数Erから算出され、ガスト影響係数Gfとは独立した値。GfはqとはWp=q×Cf×Gfの積の形で風圧力に乗じるものであり、qはGfに比例しない。"},
  {subject:"構造",topic:"一次設計",
   q:"多雪区域における大スパン等の一定の条件を満たす緩勾配屋根を有する建築物では、屋根版の構造種別によっては、構造計算において用いる積雪荷重に積雪後の降雨を考慮した割増係数を乗じることが求められる場合がある。",
   alt:{q:"多雪区域における大スパン等の一定の条件を満たす緩勾配屋根を有する建築物では、屋根版の構造種別にかかわらず、構造計算において用いる積雪荷重に積雪後の降雨を考慮した割増係数を必ず乗じることが求められる。",ans:false},
   ans:true,
   exp:"平成12年建設省告示第1455号に基づき、多雪区域の大スパン緩勾配屋根では屋根版の構造種別（木造、RC造等）によっては積雪荷重に降雨割増係数を乗じることが求められる。「構造種別にかかわらず必ず」は誤り。"},
  {subject:"構造",topic:"一次設計",
   q:"多雪区域を指定する基準において、垂直積雪量が１m未満であっても、積雪の初終間日数の平年値が30日以上の区域である場合は、多雪区域となる。",
   alt:{q:"多雪区域を指定する基準において、積雪の初終間日数の平年値が30日以上の区域であっても、垂直積雪量が１m未満である場合は、多雪区域とならない。",ans:false},
   ans:true,
   exp:"建築基準法施行令第86条第3項により、多雪区域の指定基準は「垂直積雪量1m以上」または「積雪の初終間日数の平年値30日以上」のいずれかを満たす区域。1m未満でも初終間日数30日以上なら多雪区域となる。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"梁部材における主筋のコンクリートに対する許容付着応力度として、上端筋では下端筋よりも大きい値を用いた。",
   alt:{q:"梁部材における主筋のコンクリートに対する許容付着応力度として、上端筋では下端筋よりも小さい値を用いた。",ans:true},
   ans:false,
   exp:"梁上端筋はコンクリート打設時にコンクリートが沈降・ブリーディングにより鉄筋下面に水が溜まり付着が低下するため、許容付着応力度は下端筋より小さい値を用いる（RC規準の規定）。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"柱部材の長期許容せん断力の計算において、帯筋や軸圧縮応力度の効果はないものとした。",
   alt:{q:"柱部材の短期許容せん断力の計算において、帯筋や軸圧縮応力度の効果はないものとした。",ans:false},
   ans:true,
   exp:"RC規準では、柱の長期許容せん断力の計算式には帯筋（せん断補強筋）の効果は含まれない。帯筋と軸圧縮応力度の効果は短期許容せん断力（Qa）の算定式に反映される。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"柱梁接合部のせん断耐力は、取り付く梁の主筋量には関係しない。",
   alt:{q:"柱梁接合部のせん断耐力は、取り付く梁の主筋量が多いほど大きくなる。",ans:false},
   ans:true,
   exp:"RC柱梁接合部のせん断耐力は、パネルゾーンのコンクリート強度・横補強筋量・柱の軸力等に依存し、取り付く梁の主筋量とは直接関係しない（梁主筋量が多いとせん断需要が増えるが、耐力自体は変わらない）。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"引張鉄筋の必要定着長さは、横補強筋で拘束されたコア内に定着する場合より、横補強筋で拘束されていない部分に定着する場合のほうが短くなる。",
   alt:{q:"引張鉄筋の必要定着長さは、横補強筋で拘束されていない部分に定着する場合より、横補強筋で拘束されたコア内に定着する場合のほうが短くなる。",ans:true},
   ans:false,
   exp:"横補強筋で拘束されたコア内はコンクリートの拘束効果が高く付着強度が増大するため必要定着長さを短くできる。拘束されていない部分では付着強度が低いため必要定着長さは長くなる。設問は逆が正しい。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"梁主筋の柱への必要定着長さは、柱のコンクリートの設計基準強度が高いほど短くなる。",
   alt:{q:"梁主筋の柱への必要定着長さは、柱のコンクリートの設計基準強度が高いほど長くなる。",ans:false},
   ans:true,
   exp:"必要定着長さはL＝k×φ×(ft/τa)等の式で求められる。コンクリート基準強度Fcが高いほど許容付着応力度τaが大きくなり、必要定着長さは短くなる。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"圧縮材の許容圧縮応力度は、鋼材及び部材の座屈長さが同じ場合、座屈軸まわりの断面二次半径が小さいほど小さくなる。",
   alt:{q:"圧縮材の許容圧縮応力度は、鋼材及び部材の座屈長さが同じ場合、座屈軸まわりの断面二次半径が小さいほど大きくなる。",ans:false},
   ans:true,
   exp:"細長比λ＝lk/i（座屈長さ/断面二次半径）。断面二次半径iが小さいほどλが大きくなり、座屈が起こりやすくなる。許容圧縮応力度fcはλが大きいほど小さくなる。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"鉄骨構造の耐震計算に関して「ルート３」で、建築構造用冷間プレス成形角形鋼管BCPの柱が局部崩壊メカニズムと判定された場合、柱の耐力を低減して算定した保有水平耐力が、必要保有水平耐力以上であることを確認する必要がある。",
   alt:{q:"鉄骨構造の耐震計算に関して「ルート３」で、建築構造用冷間プレス成形角形鋼管BCPの柱が大梁崩壊メカニズムと判定された場合、柱の耐力を低減して算定した保有水平耐力が、必要保有水平耐力以上であることを確認する必要がある。",ans:false},
   ans:true,
   exp:"ルート3でBCPを用いた場合、局部崩壊メカニズムと判定されたときは、残留応力の影響で柱の塑性変形能力が低下することを考慮し、柱の耐力を低減して保有水平耐力を算定する。大梁崩壊メカニズム（全体崩壊形）では低減不要。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"鉄骨構造の耐震計算に関して「ルート１－２」で、厚さ６mm以上の冷間成形角形鋼管を用いた柱を設計する場合、地震時応力の割増し係数は、建築構造用冷間プレス成形角形鋼管BCPより、建築構造用冷間ロール成形角形鋼管BCRのほうが大きい。",
   alt:{q:"鉄骨構造の耐震計算に関して「ルート１－２」で、厚さ６mm以上の冷間成形角形鋼管を用いた柱を設計する場合、地震時応力の割増し係数は、建築構造用冷間ロール成形角形鋼管BCRより、建築構造用冷間プレス成形角形鋼管BCPのほうが大きい。",ans:false},
   ans:true,
   exp:"ルート1-2における地震時応力割増係数は、BCR（ロール成形）が1.5、BCP（プレス成形）が1.3。BCRは製造時のコーナー部の残留応力が大きく、BCPより割増係数が大きく設定されている。"},
  {subject:"構造",topic:"合成構造・混合構造",
   q:"鉄筋コンクリートスラブとこれを支持する鉄骨梁とを接合する合成梁を完全合成梁とする場合には、合成梁断面が全塑性モーメントを発揮するのに必要な本数の過半の頭付きスタッドを設ける。",
   alt:{q:"鉄筋コンクリートスラブとこれを支持する鉄骨梁とを接合する合成梁を完全合成梁とする場合には、合成梁断面が全塑性モーメントを発揮するのに必要な本数の頭付きスタッドを全数設ける。",ans:true},
   ans:false,
   exp:"完全合成梁とは全塑性モーメント発揮に必要な頭付きスタッドを「全数」設けたもの。「過半（半数超）」はスタッド数が必要本数に満たない不完全合成梁（部分合成梁）の定義に相当し、完全合成梁の条件を満たさない。"},
  {subject:"構造",topic:"合成構造・混合構造",
   q:"鉄骨造において、長期間の荷重によるデッキプレート版（デッキ合成スラブ）の変形増大係数は、梁よりも大きい値を用いる。",
   alt:{q:"鉄骨造において、長期間の荷重によるデッキプレート版（デッキ合成スラブ）の変形増大係数は、梁と同じ値を用いる。",ans:false},
   ans:true,
   exp:"デッキ合成スラブはコンクリートのクリープと乾燥収縮の影響を大きく受けるため、長期荷重による変形増大係数は鉄骨梁（鋼材のみでクリープが無視できる）より大きい値を用いる。"},
  {subject:"構造",topic:"合成構造・混合構造",
   q:"鉄骨梁と鉄筋コンクリートスラブとを頭付きスタッドを介して緊結した合成梁の曲げ剛性の算定に用いる床スラブの有効幅は、鉄筋コンクリート梁の曲げ剛性の算定に用いる床スラブの有効幅と同じとすることができる。",
   alt:{q:"鉄骨梁と鉄筋コンクリートスラブとを頭付きスタッドを介して緊結した合成梁の曲げ剛性の算定に用いる床スラブの有効幅は、鉄筋コンクリート梁の曲げ剛性の算定に用いる床スラブの有効幅より大きい値としなければならない。",ans:false},
   ans:true,
   exp:"合成梁の曲げ剛性算定に用いる床スラブの有効幅は、RC梁に準じた有効幅の規定（梁間中心距離の1/2や梁せいの倍数等）と同じとすることができる。"},
  {subject:"構造",topic:"基礎構造",
   q:"地震時に液状化のおそれのない地盤において、杭の極限支持力は、杭の種類や施工法に応じた極限先端支持力と極限周面抵抗力との和として算定できる。",
   alt:{q:"地震時に液状化のおそれのない地盤において、杭の極限支持力は、杭の種類や施工法にかかわらず、極限先端支持力のみで算定しなければならない。",ans:false},
   ans:true,
   exp:"杭の極限支持力Ru＝Rpu（極限先端支持力）＋Rfu（極限周面抵抗力）で算定される。杭の種類・施工法に応じた値を用い、先端と周面の両方を考慮するのが基本。"},
  {subject:"構造",topic:"基礎構造",
   q:"地震時に液状化のおそれのある地盤においては、杭の許容支持力は、載荷試験による極限支持力から求めることはできない。",
   alt:{q:"地震時に液状化のおそれのある地盤においては、杭の許容支持力を算定する場合、液状化による支持力の低下を考慮する必要がある。",ans:true},
   ans:false,
   exp:"液状化のおそれがある地盤においても、杭の載荷試験を行い極限支持力を求めることは可能。ただし、液状化時には支持力が大幅に低下することを考慮した設計が必要であり、「載荷試験から求めることができない」は誤り。"},
  {subject:"構造",topic:"基礎構造",
   q:"砂質地盤における杭の極限周面抵抗力度は、場所打ちコンクリート杭より杭周固定液を使用した埋込み杭のほうが大きく評価できる。",
   alt:{q:"砂質地盤における杭の極限周面抵抗力度は、杭周固定液を使用した埋込み杭より場所打ちコンクリート杭のほうが大きく評価できる。",ans:true},
   ans:false,
   exp:"砂質地盤では場所打ちコンクリート杭は地盤と直接密着して大きな付着・摩擦が得られるが、埋込み杭（杭周固定液使用）は杭と地盤の間に固化材が介在するため、一般に場所打ちコンクリート杭のほうが周面抵抗力度を大きく評価できる。"},
  {subject:"構造",topic:"地盤構造",
   q:"受働土圧は、地下外壁や擁壁が地盤から離れる方向に変位するときに、最終的に一定値に落ち着いた状態で発揮される土圧である。",
   alt:{q:"受働土圧は、地下外壁や擁壁が地盤に向かって押し込まれる方向に変位するときに、最終的に一定値に落ち着いた状態で発揮される土圧である。",ans:true},
   ans:false,
   exp:"受働土圧（Passive Earth Pressure）は壁が地盤を圧縮する方向（地盤に向かって押し込まれる方向）に変位するときに発揮される。地盤から離れる方向（引張側）に変位するときは主働土圧となる。"},
  {subject:"構造",topic:"基礎構造",
   q:"直接基礎の基礎スラブの部材応力算定用の接地圧については、一般に、基礎スラブの自重を考慮しなくてよい。",
   alt:{q:"直接基礎の基礎スラブの部材応力算定用の接地圧については、一般に、基礎スラブの自重を接地圧に加算して考慮しなければならない。",ans:false},
   ans:true,
   exp:"基礎スラブの部材応力算定用接地圧は、スラブ全体の地盤反力（接地圧）からスラブ自重を差し引いた「有効接地圧」を用いる。自重は鉛直荷重として接地圧と相殺されるため、部材応力の算定では考慮しなくてよい。"},
  {subject:"構造",topic:"構造計算・構造計画",
   q:"制振構造に用いられる鋼材ダンパーは、ダンパーが弾性範囲に留まる地震動レベルにおいてはエネルギー吸収能力を発揮しない。",
   alt:{q:"制振構造に用いられる鋼材ダンパーは、ダンパーが弾性範囲に留まる地震動レベルにおいてもエネルギー吸収能力を十分に発揮する。",ans:false},
   ans:true,
   exp:"鋼材ダンパー（履歴型ダンパー）は金属の塑性変形によってエネルギーを吸収する。ダンパーが弾性範囲内（降伏前）の変形では塑性変形が生じないため、エネルギー吸収能力を発揮しない。降伏させることが使用前提。"},
  {subject:"構造",topic:"構造計算・構造計画",
   q:"耐震計算を行う場合に用いるAiは、多数の地震応答解析結果の蓄積から、それらをまとめたものに基づき定められた、設計用層せん断力を求めるための高さ方向の分布を表す係数である。",
   alt:{q:"耐震計算を行う場合に用いるAiは、理論的な解析式から一意に定まる、設計用層せん断力を求めるための深さ方向の分布を表す係数である。",ans:false},
   ans:true,
   exp:"Ai（層せん断力係数の高さ方向分布係数）は、多数の地震応答解析の結果を統計的に整理したものに基づいて建築基準法施行令第88条第4項で定められた設計用の係数。「高さ方向」の分布を表す。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"コンクリートのヤング係数は、コンクリートの圧縮強度が高いほど大きい。",
   alt:{q:"コンクリートのヤング係数は、コンクリートの圧縮強度が高いほど小さい。",ans:false},
   ans:true,
   exp:"コンクリートのヤング係数E＝33×γ³×√Fc（SI単位の近似式）。圧縮強度Fcが大きいほど√Fcが大きくなるため、ヤング係数も大きくなる。高強度コンクリートほど剛性が高い。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"水和熱によるコンクリートのひび割れは、単位セメント量が少ないコンクリートほど発生しやすい。",
   alt:{q:"水和熱によるコンクリートのひび割れは、単位セメント量が多いコンクリートほど発生しやすい。",ans:true},
   ans:false,
   exp:"水和熱はセメントが水と化学反応して発生する熱。単位セメント量が多いほど水和熱が大きくなり、温度応力によるひび割れが発生しやすくなる。マスコンクリートでは低熱ポルトランドセメントや単位セメント量の低減が対策となる。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"建築構造用圧延鋼材SN490B（板厚12mm以上）は、「降伏点又は耐力」の下限値は規定されているが、上限値は規定されていない。",
   alt:{q:"建築構造用圧延鋼材SN490B（板厚12mm以上）は、「降伏点又は耐力」の下限値と上限値の両方が規定されている。",ans:true},
   ans:false,
   exp:"SN材（建築構造用圧延鋼材）はJIS G 3136で規定され、SN490Bは降伏点の下限値（325N/mm²以上）だけでなく上限値（445N/mm²以下）も規定されている。降伏比の管理を通じて靭性確保が目的。SS材やSM材と異なり上限値も規定されるのがSN材の特徴。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"鋼材は、一般に、炭素含有量が多くなるほど、破断に至るまでの伸びが小さくなる。",
   alt:{q:"鋼材は、一般に、炭素含有量が多くなるほど、破断に至るまでの伸びが大きくなる。",ans:false},
   ans:true,
   exp:"炭素鋼は炭素含有量が増加すると硬度・引張強度は増大するが、延性・靭性（破断伸び）が低下する。高炭素鋼は硬くて割れやすく、低炭素鋼は軟らかくて変形しやすい。"},
  {subject:"構造",topic:"プレストレストコンクリート構造",
   q:"プレストレストコンクリート構造におけるプレテンション方式は、PC鋼材を緊張した状態でその周りに直接コンクリートを打設し、コンクリートが所定の強度に達した後に緊張端の張力を解放して、PC鋼材とコンクリートとの付着によりプレストレスを導入するものである。",
   alt:{q:"プレストレストコンクリート構造におけるポストテンション方式は、PC鋼材を緊張した状態でその周りに直接コンクリートを打設し、コンクリートが所定の強度に達した後に緊張端の張力を解放して、PC鋼材とコンクリートとの付着によりプレストレスを導入するものである。",ans:false},
   ans:true,
   exp:"プレテンション方式：①PC鋼材を緊張→②周りにコンクリート打設→③硬化後に張力解放→④付着によりプレストレス導入。ポストテンション方式はコンクリート硬化後にシース内のPC鋼材を緊張・定着する方式であり、設問はプレテンション方式の正確な説明。"},

  {subject:"計画",topic:"住宅・集合住宅実例",
   q:"バラガン自邸（ルイス・バラガン、メキシコ）は、庭と分かち難く結びついた内部空間をもち、居間の奥には庭に面して大きな窓を設け、積極的に外部を内部に取り込んだ住宅である。",
   alt:{q:"住吉の長屋（安藤忠雄、大阪府）は、庭と分かち難く結びついた内部空間をもち、居間の奥には庭に面して大きな窓を設け、積極的に外部を内部に取り込んだ住宅である。",ans:false},
   ans:true,
   exp:"バラガン自邸（1948年、メキシコシティ）は色彩豊かな壁・光・水の演出、プライベートな庭と居間を大きな窓でつなぐ内外一体の空間が特徴で、1999年に世界文化遺産に登録されたルイス・バラガンの代表作。住吉の長屋（安藤忠雄設計、1976年）はRC打放しの閉鎖的外壁をもち、外部に向けて大きな窓を開かず中庭を介して光・風を取り込む内向きの住宅であり、積極的に外部を取り込む構成ではない。"},
  {subject:"計画",topic:"住宅・集合住宅実例",
   q:"堀川団地出水団地第１棟・第２棟（京都府）は、戦後建設された鉄筋コンクリート造の店舗併用集合住宅であり、改修により、耐震補強やエレベーター設置のほか、多世代向けの住戸改修とDIY可能な住戸の導入などがされている。",
   alt:{q:"堀川団地出水団地第１棟・第２棟（京都府）は、戦後建設された鉄骨造の単身者向け集合住宅であり、改修により全住戸を解体し現代的な共同住宅として建て替えが行われた。",ans:false},
   ans:true,
   exp:"京都市の堀川団地（出水団地第1・2棟、1950年代建設）はRC造の戦後集合住宅で、下層階に店舗が入る店舗併用型。改修では既存躯体を活かして耐震補強・EV設置を行い、多世代向け住戸改修・DIY可能住戸（居住者自身がリノベーションできる住戸）の導入など、スクラップ＆ビルドによらない継続活用の先進事例として評価されている。"},
  {subject:"計画",topic:"住宅・集合住宅実例",
   q:"東雲キャナルコート（東京都江東区）は、住戸に仕事場等として使用できる開放的なf-ルームを設け、中廊下やコモンテラスと連続させて計画された集合住宅である。",
   alt:{q:"幕張ベイタウンパティオス４番街（千葉県、1995年）は、住戸に仕事場等として使用できる開放的なf-ルームを設け、中廊下やコモンテラスと連続させて計画された集合住宅である。",ans:false},
   ans:true,
   exp:"f-ルーム（フレキシブルルーム）・コモンテラス・中廊下を特徴とするのは東雲キャナルコート（山本理顕らが計画したUR賃貸集合住宅）。幕張ベイタウンパティオス4番街は都市デザインガイドラインに基づく街区型の分譲集合住宅であり、f-ルーム等はもたない。両者の混同は頻出の誤り。"},
  {subject:"計画",topic:"住宅・集合住宅実例",
   q:"基町高層アパート（広島県）は、偶数階に通路をもつ住棟を「く」の字型に連結させた計画である。",
   alt:{q:"基町高層アパート（広島県）は、全階に通路をもつ住棟を「く」の字型に連結させた計画である。",ans:false},
   ans:true,
   exp:"基町高層アパート（大高正人設計、広島市）はスキップフロア型（隔層廊下）を採用し、全階ではなく偶数階のみに共用廊下を設けた高層住棟を「く」の字型に連結した計画。隔層廊下によりプライバシー確保と通風・採光を両立した、都市型高層集合住宅の先駆的事例。"},
  {subject:"計画",topic:"公共建築",
   q:"1看護単位当たりの病床数は、40床を標準とする。",
   alt:{q:"1看護単位当たりの病床数は、80床を標準とする。",ans:false},
   ans:true,
   exp:"看護単位（ナーシングユニット）とは、1人の看護師長のもとで一体的に管理される病棟単位。適正な病床数は40〜50床が標準とされ、40床は看護師の目が行き届き患者ケアの質を確保できる規模として建築計画上の目安となる。80床は1看護単位として大きすぎ、管理面・ケアの質の両面で問題が生じやすい。"},
  {subject:"計画",topic:"公共建築",
   q:"LDR室の計画に当たり、家具や空間の仕上げに木材を使用する等、暖かい家庭的な雰囲気となるように配慮した。",
   alt:{q:"LDR室の計画に当たり、清潔感と医療の安心感を最優先とし、全面をステンレスと磁器タイル仕上げとした無機質な空間として計画した。",ans:false},
   ans:true,
   exp:"LDR室（Labor Delivery Recovery Room）は陣痛・分娩・産後回復を1室で一貫して行う産科の多機能室。産婦や家族がリラックスして過ごせるよう、木材・布製品など温かみのある素材を用いた家庭的な雰囲気に配慮することが計画の重要な視点。ステンレス・タイルのみの無機質な仕上げは産婦のストレスを高める恐れがある。"},
  {subject:"計画",topic:"高齢者・障害者",
   q:"「日本版CCRC（Continuing Care Retirement Community）」は、大都市に在住する高齢者が健康な段階から地方へ移住し、地域活動に積極的に参加することをとおして、地域社会に溶け込み、多世代と交流・共働する居住が基本となっている。",
   alt:{q:"「日本版CCRC（Continuing Care Retirement Community）」は、大都市に在住する高齢者が介護が必要となった段階から地方へ移住し、医療・介護施設において同世代の高齢者のみで共同生活することが基本となっている。",ans:false},
   ans:true,
   exp:"日本版CCRCは「生涯活躍のまち」とも呼ばれ、大都市圏の高齢者が健康なうちから地方に移住し、地域活動・多世代交流・共働を通じて地域社会に溶け込む居住形態を目指す。アメリカ発祥のCCRC概念をベースに、日本版では多世代共生・地域貢献活動への参加を重視。「介護が必要な段階から移住」「同世代のみで共同生活」という記述は誤り。"},
  {subject:"計画",topic:"高齢者・障害者",
   q:"二つのユニットを有する個室ユニットケア型特別養護老人ホームにおいて、隣接するユニットの共同生活室はユニットごとに独立して設け、各ユニットで専用に使用できるようにした。",
   alt:{q:"二つのユニットを有する個室ユニットケア型特別養護老人ホームにおいて、隣接するユニットの共同生活室は共用として、二つのユニットが一体的に使えるようにした。",ans:false},
   ans:true,
   exp:"個室ユニットケア型特別養護老人ホームでは、各ユニット（原則10人以下）が固定した生活単位として機能することが求められる。厚生労働省令により共同生活室（居間・食事室等）はユニットごとに専用として設けることが規定されており、2ユニットで1つの共同生活室を共用することは認められない。ユニットの自律性・家庭的雰囲気の確保が目的。"},
  {subject:"計画",topic:"公共建築",
   q:"基準階の事務室の床面積を1,000m²とする貸事務所ビルの計画において、男子小便器３個、男子大便器３個、女子便器４個とした。",
   alt:{q:"基準階の事務室の床面積を1,000m²とする貸事務所ビルの計画において、男子小便器２個、男子大便器２個、女子便器３個とした。",ans:false},
   ans:true,
   exp:"事務所ビルの床面積1,000m²には約50〜80名程度の在室者を想定する。JIS A 3302の事務所用途の衛生器具算定基準では、男子小便器3個・男子大便器3個・女子便器4個は適切な計画水準。男子小便器2個・大便器2個・女子便器3個では在室者数に対して不足し適切でない。"},
  {subject:"計画",topic:"公共建築",
   q:"高層事務所ビルのエレベーターの計画において、低層用５台と高層用５台とを幅４mの通路を挟んで対面配置とした。",
   alt:{q:"高層事務所ビルのエレベーターの計画において、低層用５台と高層用５台とを幅２mの通路を挟んで対面配置とした。",ans:false},
   ans:true,
   exp:"事務所ビルのエレベーター対面配置における待合通路（EVホール）の幅は、一般に3.5〜4.5m程度が適切とされる。低層用・高層用各5台の対面配置において幅4mは利用者のすれ違い・扉開閉時の待機スペースを確保できる適切な寸法。幅2mでは混雑時の通行・待機が困難になり不適切。"},
  {subject:"計画",topic:"建築史実例",
   q:"1997年に復元されたロンドンのシェークスピア劇場（グローブ座）は、観客が舞台の三方を囲む形で観覧する、エリザベス朝劇場様式のオープンステージ形式の劇場である。",
   alt:{q:"1997年に復元されたロンドンのシェークスピア劇場（グローブ座）は、観客と舞台との一体感を得られやすいプロセニアム形式の劇場である。",ans:false},
   ans:true,
   exp:"シェークスピア・グローブ座（1997年復元）は16世紀エリザベス朝の野外円形劇場を再現した約20角形の劇場。突き出し舞台（スラストステージ）を観客が三方から囲む形式のオープンステージで、舞台と客席の一体感が特徴。プロセニアムアーチで舞台と客席を仕切るプロセニアム形式とは全く異なる様式。"},

  {subject:"構造",topic:"一次設計",
   q:"多雪区域ではない一般の地域においては、暴風時又は地震時の荷重を、積雪荷重と組み合わせる必要はない。",
   alt:{q:"多雪区域ではない一般の地域においても、暴風時又は地震時の荷重を、積雪荷重と組み合わせる必要がある。",ans:false},
   ans:true,
   exp:"建築基準法施行令第88条・第86条等に基づき、積雪荷重と他の荷重の組み合わせが義務付けられるのは多雪区域（垂直積雪量1m以上等）のみ。一般地域では暴風時・地震時と積雪荷重の組み合わせは不要。多雪区域では短期（暴風・地震）にも積雪荷重の70%を加算して組み合わせる。"},
  {subject:"構造",topic:"構造計算・構造計画",
   q:"建築物の地上部分の必要保有水平耐力を計算する場合、標準せん断力係数C0は1.0以上としなければならない。",
   alt:{q:"建築物の地上部分の必要保有水平耐力を計算する場合、標準せん断力係数C0は0.2以上としなければならない。",ans:false},
   ans:true,
   exp:"令第88条第4項により、必要保有水平耐力（ルート3）の算定に用いるC0は1.0以上とする。C0=0.2以上は許容応力度計算（ルート1・2）における地震力算定時の標準値であり、保有水平耐力計算とは異なる。"},
  {subject:"構造",topic:"木質構造",
   q:"平面が長方形の建築物において、必要壁量が風圧力により決定される場合、張り間方向と桁行方向の必要壁量は、それぞれ異なる値となる。",
   alt:{q:"平面が長方形の建築物において、必要壁量が風圧力により決定される場合、張り間方向と桁行方向の必要壁量は、同じ値となる。",ans:false},
   ans:true,
   exp:"風圧力による必要壁量は「見付面積（各方向に風が当たる鉛直投影面積）×係数」で求める。長方形平面では張り間方向と桁行方向の見付面積が一般に異なるため、必要壁量もそれぞれ異なる値となる。"},
  {subject:"構造",topic:"木質構造",
   q:"木造建築物において、延べ面積が500m²である場合は、構造計算による構造耐力上安全であることの確認を行わなくてもよい。",
   alt:{q:"木造建築物において、延べ面積が500m²を超える場合であっても、構造計算による構造耐力上安全であることの確認を行わなくてもよい。",ans:false},
   ans:true,
   exp:"令第46条・第81条により、木造2階建て以下で延べ面積500m²以下（超えない）の場合は許容応力度等の構造計算は義務付けられず、壁量計算等の仕様規定で確認できる。500m²を超える場合は構造計算が必要。"},
  {subject:"構造",topic:"木質構造",
   q:"風圧力に対する必要壁量を求める場合、見付面積に乗ずる数値は、１階部分と２階部分で同じ値を用いる。",
   alt:{q:"風圧力に対する必要壁量を求める場合、見付面積に乗ずる数値は、１階部分と２階部分で異なる値を用いる。",ans:false},
   ans:true,
   exp:"令第46条第4項の表に規定する風圧力に対する壁量係数（見付面積1m²に対するcm数）は地域区分によって決まり、1階・2階の区別はない。同一地域では1階・2階とも同じ係数を用いる。1階・2階で見付面積が異なるため必要壁量の総量は異なるが、係数自体は同じ。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"鉄筋コンクリート耐力壁の長期許容せん断力の計算において、壁の横筋による効果を無視した。",
   alt:{q:"鉄筋コンクリート耐力壁の長期許容せん断力の計算において、壁の横筋の効果を考慮した。",ans:false},
   ans:true,
   exp:"RC規準では、耐力壁の長期許容せん断力の算定式には水平鉄筋（横筋）の効果を含まない。横筋（せん断補強筋）の効果は短期許容せん断力の割増に反映される。長期は壁コンクリートのみで負担するとして横筋を無視するのが標準的な扱い。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"鉄筋コンクリート構造の柱の軸方向の圧縮耐力は、一般に、帯筋によるコンクリートの拘束の度合いが大きいほど大きくなり、最大耐力以降の耐力低下の度合いも緩やかになる。",
   alt:{q:"鉄筋コンクリート構造の柱の軸方向の圧縮耐力は、一般に、帯筋によるコンクリートの拘束の度合いが大きくなっても、最大耐力以降の耐力低下の度合いは変わらない。",ans:false},
   ans:true,
   exp:"帯筋によるコンクリートの横拘束（confinement）効果：拘束が増すほど①圧縮強度（耐力）が増大し、②最大耐力到達後の耐力低下勾配が緩やかになり靱性が向上する。これを利用して帯筋量を増やすことで柱の靱性確保を図る。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"柱において、一般に、使用するコンクリートの設計基準強度が大きいほど、せん断強度は大きくなる。",
   alt:{q:"柱において、一般に、使用するコンクリートの設計基準強度の大小にかかわらず、せん断強度は変化しない。",ans:false},
   ans:true,
   exp:"RC規準の柱のせん断耐力算定式では、コンクリートの設計基準強度Fcが大きいほど許容付着応力度・せん断応力度が増大する。√Fc や Fc^(1/3) に比例する項を含む算定式が多く、高強度コンクリートほどせん断強度が高い。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"曲げ降伏する両側柱付き耐力壁において、側柱の帯筋量を増やすと、靱性は大きくなる。",
   alt:{q:"曲げ降伏する両側柱付き耐力壁において、側柱の帯筋量を増やしても、靱性は大きくならない。",ans:false},
   ans:true,
   exp:"両側柱付き耐力壁が曲げ降伏する場合、損傷は主に側柱の曲げ変形（端部の塑性ヒンジ）に集中する。側柱の帯筋量を増やすことでコンクリートの拘束効果が高まり、側柱の靱性（変形能力）が向上し、結果として耐力壁全体の靱性も大きくなる。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"鉄筋コンクリート構造の鉄筋の定フックの折曲げ角度を90度とする場合における引張鉄筋の必要定着長さは、180度とする場合より長くなる。",
   alt:{q:"鉄筋コンクリート構造の鉄筋の定フックの折曲げ角度を90度とする場合における引張鉄筋の必要定着長さは、180度とする場合と同じ値を用いることができる。",ans:false},
   ans:true,
   exp:"RC規準の定フック（標準フック）において、180度フックはセミサークル状で定着効率が高く余長は4d以上。90度フックは直角曲げで余長12d以上が必要。折曲げ角度が小さいほど定着効果が低下するため、90度フックの場合の必要定着長さは180度フックより長くなる。"},
  {subject:"構造",topic:"鉄筋コンクリート構造",
   q:"鉄筋コンクリート構造の鉄筋に関して最上階以外の梁で、上端筋と下端筋を柱内で連続させてU字形の折曲げ定着とする場合、その定着長さの取り方は折曲げ角度90度のフックを準用してもよい。",
   alt:{q:"鉄筋コンクリート構造の鉄筋に関して最上階以外の梁で、上端筋と下端筋を柱内で連続させてU字形の折曲げ定着とする場合、その定着長さの取り方は折曲げ角度180度のフックを準用しなければならない。",ans:false},
   ans:true,
   exp:"RC規準では、最上階以外の梁でU字形（上端筋・下端筋を連続させた折返し）の折曲げ定着を行う場合、その定着長さは90度フックの規定を準用してよいとされる。最上階の梁端部（柱頭部）では別の規定が適用される。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"H形鋼梁の許容曲げ応力度を、鋼材の基準強度、断面寸法及び材長を用いて計算した。",
   alt:{q:"H形鋼梁の許容曲げ応力度を、鋼材の基準強度及び断面寸法のみを用いて計算した。",ans:false},
   ans:true,
   exp:"H形鋼梁の許容曲げ応力度の計算では、鋼材の基準強度Fと断面寸法（フランジ幅・梁せい等）に加え、横座屈（lateral buckling）の影響を考慮するため梁の材長（有効長さ）も必要。材長のみでは細長比が求められず、横座屈に対する低減係数が算定できない。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"高力ボルト摩擦接合は、ボルトの締付け力により接合面に生じる摩擦力によって応力を伝達する機構である。",
   alt:{q:"高力ボルト摩擦接合は、部材とボルト軸部との間の支圧による応力を伝達する機構である。",ans:false},
   ans:true,
   exp:"高力ボルト摩擦接合はボルトを高力（規定トルク）で締め付け、接合面間に大きなクランプ力を発生させ、その摩擦力で応力を伝達する。支圧（ボルト軸部と母材孔壁の接触）で力を伝えるのは「支圧接合」であり、摩擦接合とは異なる機構。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"F10Tの高力ボルト摩擦接合において、２面摩擦の許容せん断応力度は、１面摩擦の場合の２倍である。",
   alt:{q:"F10Tの高力ボルト摩擦接合において、２面摩擦の許容せん断応力度は、１面摩擦の場合の1.5倍である。",ans:false},
   ans:true,
   exp:"高力ボルト摩擦接合の許容せん断力は「摩擦係数×軸力×摩擦面数」で決まる。2面摩擦は摩擦面が2つあるため1面摩擦の2倍の許容せん断力（許容せん断応力度）となる。1.5倍という係数は規定にない。"},
  {subject:"構造",topic:"鉄骨構造",
   q:"突合せ溶接部において、母材の種類に応じた適切な溶接材料を用いる場合、溶接部の許容応力度は母材と同じ値を採用することができる。",
   alt:{q:"突合せ溶接部において、母材の種類に応じた適切な溶接材料を用いる場合であっても、溶接部の許容応力度は母材より低い値としなければならない。",ans:false},
   ans:true,

  {subject:"構造",topic:"構造計算・構造計画",

   alt:{q:"鉄骨構造の耐震計算に関して「ルート２」で計算する場合、地階を除き水平力を負担する筋かいの水平力分担率に応じて、地震時の応力を低減して許容応力度計算を行う必要がある。",ans:false},
   ans:true,
   exp:"ルート2（許容応力度等計算）において、筋かいの水平力分担率β（ベータ）が高い場合、筋かいが脆性的に破断する前に建物が変形しにくい（変形能力が低い）ことを考慮し、地震時応力を割増係数（βに応じて1.0〜1.5）で割増して許容応力度計算を行う。「低減」は誤り。"},
  {subject:"構造",topic:"構造計算・構造計画",

   alt:{q:"鉄骨構造の耐震計算に関して「ルート３」で計算する場合、構造特性係数Dsの算定において、柱梁接合部パネルの耐力を考慮する必要はない。",ans:true},
   ans:false,

  {subject:"構造",topic:"地盤構造",
   q:"砂のせん断力に対する抵抗力の大きさは、標準貫入試験で得られるN値と相関関係にある。",
   alt:{q:"砂のせん断力に対する抵抗力の大きさは、標準貫入試験で得られるN値との相関関係はなく、三軸圧縮試験等により直接求める必要がある。",ans:false},
   ans:true,

  {subject:"構造",topic:"地盤構造",
   q:"地盤の極限鉛直支持力は、一般に、地盤のせん断破壊が生じることにより決定される。",

  {subject:"構造",topic:"構造計算・構造計画",
   q:"人が日常立ち入る場所に設けられる、高さが６mを超え、水平投影面積が200m²を超え、かつ単位面積質量が２kg/m²を超える吊り天井は、特定天井に該当する。",

  {subject:"構造",topic:"構造計算・構造計画",
   q:"既存建築物においては、落下防止措置としてネットやワイヤーにより一時的に天井の脱落を防ぐ方法も許容される。",
   alt:{q:"既存建築物においては、ネットやワイヤーによる一時的な落下防止措置は認められず、特定天井の基準に適合した全面的な改修のみが許容される。",ans:false},
   ans:true,
   exp:"既存建築物の特定天井への対応として、新基準への完全適合改修のほか、落下防止ネット・ワイヤーによる脱落防止措置（一時的対応）も許容されることが国交省通知等で示されている。コストや工事難度を考慮した段階的対応が認められる。"},
  {subject:"構造",topic:"構造計算・構造計画",
   q:"地震時水平力を受けて骨組の水平変形が大きくなると、P−Δ効果による付加的な応力及び水平変形が発生する。",
   alt:{q:"地震時水平力を受けて骨組の水平変形が大きくなると、P−Δ効果による付加的な応力は発生するが、水平変形への影響はない。",ans:false},
   ans:true,
   exp:"P-Δ効果（幾何非線形）：軸力P×水平変形Δにより生じる付加モーメントが骨組に作用し、これがさらに水平変形を増大させる。大変形時ほど影響が大きく、高層建物・スレンダーな構造では無視できない。応力だけでなく水平変形も増大する。"},
  {subject:"構造",topic:"構造計算・構造計画",
   q:"１階にピロティ階を有する鉄筋コンクリート造建築物において、ピロティ階の独立柱の曲げ降伏による層崩壊を想定する場合、当該階における必要保有水平耐力Qunの算出に用いる形状係数Fesは、剛性率による割増係数とピロティ階への損傷集中による強度割増係数のうち、大きいほうの値を用いる。",
   alt:{q:"１階にピロティ階を有する鉄筋コンクリート造建築物において、ピロティ階の独立柱の曲げ降伏による層崩壊を想定する場合、当該階における必要保有水平耐力Qunの算出に用いる形状係数Fesは、剛性率による割増係数とピロティ階への損傷集中による強度割増係数のうち、小さいほうの値を用いる。",ans:false},
   ans:true,
   exp:"Fesはいずれか「大きいほうの値」を採用する（安全側）。剛性率が低い（不整形）かつピロティによる損傷集中が重複する場合、より大きな割増係数を採用することで必要保有水平耐力を十分に確保する。「小さいほう」は危険側の誤り。"},
  {subject:"構造",topic:"構造計算・構造計画",
   q:"地震層せん断力係数の建築物の高さ方向の分布を表す係数Aiは、一般に、建築物の上階になるほど、また、建築物の設計用一次固有周期Tが長くなるほど、大きくなる。",
   alt:{q:"地震層せん断力係数の建築物の高さ方向の分布を表す係数Aiは、一般に、建築物の上階になるほど大きくなるが、設計用一次固有周期Tが長くなるほど小さくなる。",ans:false},
   ans:true,

  {subject:"構造",topic:"構造計算・構造計画",
   q:"保有水平耐力計算における必要保有水平耐力の算定では、形状特性を表す係数Fesは、各階の剛性率及び偏心率に応じた割増係数の積として算出する。",
   alt:{q:"保有水平耐力計算における必要保有水平耐力の算定では、形状特性を表す係数Fesは、各階の剛性率及び偏心率に応じた割増係数のうち大きいほうを採用する。",ans:false},

  {subject:"構造",topic:"構造計算・構造計画",
   q:"積層ゴムアイソレータを用いた免震構造は、一般に、水平地震動に対する免震効果はあるが、上下地震動に対する免震効果は期待できない。",
   alt:{q:"積層ゴムアイソレータを用いた免震構造は、一般に、水平地震動・上下地震動の両方に対して同等の免震効果が期待できる。",ans:false},
   ans:true,
   exp:"積層ゴムアイソレータはゴム層と鋼板の交互積層構造で、水平方向に柔らかく（固有周期を長周期化して免震効果大）、鉛直方向には剛性が高い（圧縮荷重に対して変形しにくい）。このため鉛直（上下）地震動に対する免震効果は期待できない。"},
  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"構造計算・構造計画",
   q:"天然ゴム系の積層ゴムアイソレータを用いた免震構造においては、アイソレータのみでは減衰能力が不足するので、オイルダンパーや鋼材ダンパー等を組み込む必要がある。",

  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"プレストレストコンクリート構造",
   q:"プレストレストコンクリート構造において、クリープ等によるプレストレスの減少率は、一般に、プレテンション方式に比べて、ポストテンション方式のほうが小さい。",

  {subject:"構造",topic:"合成構造・混合構造",

  {subject:"構造",topic:"合成構造・混合構造",

  {subject:"構造",topic:"合成構造・混合構造",

  {subject:"構造",topic:"構造計算・構造計画",

   alt:{q:"免震構造において、転倒モーメントによりアイソレータに大きな引張軸力が生じる場合は、天然ゴム系の積層ゴムアイソレータを採用することが最も有効な対策である。",ans:false},

  {subject:"構造",topic:"構造計算・構造計画",

  {subject:"構造",topic:"地盤構造",

  {subject:"構造",topic:"地盤構造",
   q:"一軸圧縮試験は、拘束圧を作用させない状態における圧縮強さを調べるものであり、飽和した粘性土の非排水せん断強度を簡便に求めることができる。",
   alt:{q:"一軸圧縮試験は、拘束圧を作用させた状態における圧縮強さを調べるものであり、土の粘着力及び内部摩擦角を求めることができる。",ans:false},

  {subject:"構造",topic:"地盤構造",

  {subject:"構造",topic:"基礎構造",
   q:"応答変位法は、地震時の杭頭に作用する水平力と地盤変位を考慮して杭応力等を計算する方法であり、地震時に液状化しやすい軟弱地盤における杭の検討にも適用できる。",
   alt:{q:"応答変位法は、地震時の杭頭に作用する水平力のみを考慮して杭応力等を計算する方法であり、地盤変位の影響は考慮しない。",ans:false},

  {subject:"構造",topic:"基礎構造",
   q:"地震時に杭に作用する水平力は、基礎スラブの根入れ深さに応じて一定の範囲で低減できるが、建築物の地上部分の高さが大きいほど、この低減の度合いは小さくなる。",
   alt:{q:"地震時に杭に作用する水平力は、基礎スラブの根入れ深さに応じて一定の範囲で低減できるが、建築物の地上部分の高さが大きいほど、この低減の度合いは大きくなる。",ans:false},

  {subject:"構造",topic:"基礎構造",

   alt:{q:"複数の杭（群杭）が水平力を受けると、杭同士が地盤を介して影響し合うので、単杭と比較して群杭１本当たりの水平抵抗は大きくなる。",ans:false},

  {subject:"構造",topic:"基礎構造",

  {subject:"環境",topic:"照明設備",

  {subject:"環境",topic:"色彩",

  {subject:"環境",topic:"色彩",

   alt:{q:"水蓄熱槽を用いた熱源システムは、熱源機が常に空調負荷の変動に直接追従する必要があるため、熱源機の容量低減はできない。",ans:false},
   ans:true,
   exp:"水蓄熱槽（温水・冷水）を設けることで熱源機はピーク負荷ではなく平均的な負荷に対応すればよくなり（負荷平準化）、熱源機容量を低減できる。また夜間電力を利用した蓄熱（氷蓄熱等）による省エネ・電気代削減も可能。"},
  {subject:"環境",topic:"空調設備",
   q:"空気熱源ヒートポンプチリングユニットを複数台連結するモジュール型は、負荷変動に対応して運転台数が変わるので、効率的な運転が可能である。",
   alt:{q:"空気熱源ヒートポンプチリングユニットを複数台連結するモジュール型は、常に全台を定格運転するため、部分負荷時の効率は低下する。",ans:false},
   ans:true,
   exp:"モジュール型チラーは複数台（モジュール）の組み合わせで構成され、空調負荷の変動に応じて運転台数を増減させる台数制御が可能。各台を定格近傍で高効率運転できるため、部分負荷時でも効率的な運転が実現できる。"},
  {subject:"環境",topic:"換気",
   q:"火気使用室において、排気フードⅠ型を設けた換気扇の有効換気量Vは、V＝20KQ（K：燃料の単位燃焼量当たりの理論廃ガス量、Q：火を使用する設備又は器具の実状に応じた燃料消費量）により算出した。",
   alt:{q:"火気使用室において、排気フードⅠ型を設けた換気扇の有効換気量Vは、V＝30KQ（K：燃料の単位燃焼量当たりの理論廃ガス量、Q：燃料消費量）により算出した。",ans:false},
   ans:true,
   exp:"建築基準法施行令第20条の3・告示による換気計算：排気フードⅠ型（密閉型）の場合、V＝20KQ（m³/h）。排気フードⅡ型（開放型）の場合はV＝30KQ。型の種類によって係数（20または30）が異なる。"},
  {subject:"環境",topic:"換気",
   q:"喫煙室において、非喫煙場所との境界の開口部における気流の風速は、喫煙室に向かって0.2m/s以上とした。",
   alt:{q:"喫煙室において、非喫煙場所との境界の開口部における気流の風速は、喫煙室に向かって0.1m/s以上とした。",ans:false},
   ans:true,
   exp:"職場の受動喫煙防止対策に関する指針（厚生労働省）および労働安全衛生法に基づく喫煙室の設計基準では、喫煙室の開口部（出入口）における気流速度は喫煙室方向に向かって0.2m/s以上とすることが要件。0.1m/sでは煙の逆流防止に不十分。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"雨水排水管と汚水排水管とを別系統で配管した建築物において、公共下水道が合流式であったことから、雨水排水と汚水排水とを屋外の排水ますで同一系統とした。",
   alt:{q:"雨水排水管と汚水排水管とを別系統で配管した建築物において、公共下水道が合流式であっても、敷地内の排水は雨水・汚水を別系統のまま公共下水道に接続しなければならない。",ans:false},
   ans:true,
   exp:"公共下水道が合流式（雨水・汚水を同一管で流す方式）の地域では、建物内で別系統の雨水管と汚水管を屋外の排水ますで合流させ、合流式下水道に接続することが適切。分流式下水道では雨水を下水道に直接接続できない場合がある。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"公共下水道が合流式である地域においては、害虫や臭気等の侵入防止を目的として、雨水排水はトラップますを介して一般排水系統の敷地排水管に接続する。",
   alt:{q:"公共下水道が合流式である地域においては、雨水排水は臭気・害虫の侵入リスクがないため、トラップなしで直接公共下水道に接続することができる。",ans:false},
   ans:true,
   exp:"合流式下水道に接続する雨水排水管は、下水道管内の臭気・害虫が逆流することがあるため、トラップます（Uトラップ等）を介して敷地排水管に接続し、侵入を防止する。トラップなし直接接続では室内に下水臭・害虫が侵入するリスクがある。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"管径200mmの敷地排水管の排水ますは、起点、屈曲点、合流箇所、ますの間隔が40m以内となるような位置等に設ける。",
   alt:{q:"管径200mmの敷地排水管の排水ますは、起点、屈曲点、合流箇所、ますの間隔が25m以内となるような位置等に設ける。",ans:false},
   ans:true,
   exp:"空気調和・衛生工学会基準等による排水ます（インスペクションチェンバー）の設置間隔の目安：管径100mm以下15m以内、管径150mm以下30m以内、管径200mm以下45m以内。40mは45m以内の基準を満足する適切な設計値。25mは過剰に短い。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"上水系統の受水槽の水抜き管とオーバーフロー管は、いずれも十分な排水口空間を介して排水管等への間接排水とする。",
   alt:{q:"上水系統の受水槽の水抜き管は直接排水としてよく、オーバーフロー管のみ十分な排水口空間を介した間接排水とする。",ans:false},
   ans:true,
   exp:"受水槽の水抜き管・オーバーフロー管はいずれも排水管への直接接続（クロスコネクション）を禁止し、排水口空間（エアギャップ）を設けた間接排水とする。水抜き管・OFLパイプともに排水管内の汚水・臭気が逆流して上水を汚染するのを防ぐためである。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"コージェネレーションシステムに使用される発電機の発電効率は、一般に、ガスタービンに比べてガスエンジンのほうが高い。",
   alt:{q:"コージェネレーションシステムに使用される発電機の発電効率は、一般に、ガスエンジンに比べてガスタービンのほうが高い。",ans:false},
   ans:true,
   exp:"発電効率の比較：ガスエンジン（内燃機関）は30〜40%程度、ガスタービン（外燃機関）は20〜35%程度。ガスエンジンのほうが発電効率が高い。ただし、ガスタービンは排熱温度が高く排熱利用効率（熱電比）が高い特徴があり、用途によって使い分ける。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"太陽光発電システムの構成要素の一つであるパワーコンディショナは、インバータ及び系統連系保護装置が組み合わされたものである。",
   alt:{q:"太陽光発電システムの構成要素の一つであるパワーコンディショナは、インバータ、系統連系保護装置及び蓄電池が組み合わされたものである。",ans:false},
   ans:true,
   exp:"パワーコンディショナ（PCS）の基本構成：①インバータ（DC→AC変換）＋②系統連系保護装置（単独運転防止・過電圧・過電流保護等）。蓄電池はパワコンとは別の機器（蓄電システム）であり、標準的なパワコンには含まれない。蓄電池内蔵のハイブリッドパワコンは別製品。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"力率は、交流回路に電力を供給する際における、「有効電力」を「皮相電力」で除したものである。",
   alt:{q:"力率は、交流回路に電力を供給する際における、「皮相電力」を「有効電力」で除したものである。",ans:false},
   ans:true,
   exp:"力率（Power Factor）＝有効電力（W）÷皮相電力（VA）＝cosθ。皮相電力は有効電力と無効電力の合成（√(P²+Q²)）。力率が高い（1に近い）ほど電力を効率よく利用している。「皮相電力÷有効電力」は逆数であり誤り。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"需要率は、ある電力系統における、「接続された負荷の最大需要電力」を「負荷設備容量の総和」で除したものである。",
   alt:{q:"需要率は、ある電力系統における、「負荷設備容量の総和」を「接続された負荷の最大需要電力」で除したものである。",ans:false},
   ans:true,
   exp:"需要率＝最大需要電力（kW）÷負荷設備容量の総和（kW）≤1.0。すべての設備が同時に定格運転されることはないため、需要率は通常1未満。「設備容量÷最大需要電力」は逆数（不等率に近い概念）であり誤り。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"負荷率は、ある期間における、「平均需要電力」を「最大需要電力」で除したものである。",
   alt:{q:"負荷率は、ある期間における、「最大需要電力」を「平均需要電力」で除したものである。",ans:false},
   ans:true,
   exp:"負荷率＝平均需要電力÷最大需要電力（≤1.0）。負荷率が高いほど電力消費が平均化されており電力設備を効率よく利用していることを示す。「最大需要電力÷平均需要電力」は逆数（≥1.0）となり定義と逆。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"不等率は、「ある系統に接続されている個々の負荷の最大需要電力の合計」を「その系統の最大需要電力」で除したものである。",
   alt:{q:"不等率は、「その系統の最大需要電力」を「ある系統に接続されている個々の負荷の最大需要電力の合計」で除したものである。",ans:false},
   ans:true,
   exp:"不等率＝Σ（個々の負荷の最大需要電力）÷系統全体の最大需要電力（≥1.0）。各負荷の最大値が同時に生じないため、不等率は必ず1以上となる。設備計画では不等率を考慮して電源容量を低減できる。逆数は「同時需要係数」と呼ばれる。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"火災時に廊下において形成される上方の煙と下方の比較的清浄な空気とからなる二層流は、煙の温度が低いほど安定する。",
   alt:{q:"火災時に廊下において形成される上方の煙と下方の比較的清浄な空気とからなる二層流は、煙の温度が高いほど安定する。",ans:false},
   ans:true,
   exp:"火災時の廊下二層流は、高温の煙と低温の清浄空気との温度差（密度差）による層状分離。煙の温度が低いほど浮力が小さく、上下の密度差が小さくなるため層状流が維持されやすく安定する。煙温度が高いほど浮力が増大・乱流が促進されて二層流は不安定になり煙が全体に広がりやすい。"},
  {subject:"環境",topic:"空調設備",
   q:"地域冷暖房システムの導入は、一般に、未利用熱の活用による排熱削減が期待でき、ヒートアイランド現象の緩和にも効果的である。",
   alt:{q:"地域冷暖房システムの導入は、熱源機を集中設置するため排熱が増大し、ヒートアイランド現象を促進する可能性がある。",ans:false},
   ans:true,
   exp:"地域冷暖房は面的に熱源を集中管理することで大型高効率機器の採用・河川水・下水処理水・工場排熱等の未利用エネルギー活用が可能となり、個別熱源方式に比べて排熱を削減できる。また排熱の集中管理によりヒートアイランド緩和にも貢献する。"},
  {subject:"環境",topic:"温熱環境",
   q:"建築物省エネルギー性能表示制度（BELS）のマークは、BEIの値が小さいほど星の数が増える。",
   alt:{q:"建築物省エネルギー性能表示制度（BELS）のマークは、BEIの値が大きいほど星の数が増える。",ans:false},
   ans:true,
   exp:"BEI（Building Energy Index）＝設計一次エネルギー消費量÷基準一次エネルギー消費量。BEI<1で省エネ達成、BEIが小さいほど省エネ性能が高い。BELSの星評価はBEI≤0.8で★★★★★（5つ星）となるなど、BEI値が小さいほど高評価（星多い）。"},
  {subject:"環境",topic:"伝熱・結露",
   q:"「建築物のエネルギー消費性能の向上に関する法律」に基づく新築住宅の省エネルギー基準では、原則として、外皮平均熱貫流率（UA値）や冷房期の平均日射熱取得率（ηAC値）を地域の区分に応じた基準値以下となること等が求められる。",
   alt:{q:"「建築物のエネルギー消費性能の向上に関する法律」に基づく新築住宅の省エネルギー基準では、原則として、外皮平均熱貫流率（UA値）や冷房期の平均日射熱取得率（ηAC値）を地域の区分に応じた基準値以上となること等が求められる。",ans:false},
   ans:true,
   exp:"建築物省エネ法の外皮性能基準：UA値（外皮平均熱貫流率）は「基準値以下」（値が小さいほど断熱性能が高い）、ηAC値（冷房期平均日射熱取得率）も「基準値以下」（値が小さいほど日射遮蔽性能が高い）が要件。「以上」とすると意味が逆（断熱・遮蔽性能の低い建物でよくなる）であり誤り。"},

  {subject:"計画",topic:"高齢者・障害者",
   q:"「高齢者、障害者等の円滑な移動等に配慮した建築設計標準（国土交通省）」に照らして、宿泊施設における車椅子使用者用客室内の浴室の出入口の有効幅員を、85cmとした。",
   alt:{q:"「高齢者、障害者等の円滑な移動等に配慮した建築設計標準（国土交通省）」に照らして、宿泊施設における車椅子使用者用客室内の浴室の出入口の有効幅員を、70cmとした。",ans:false},
   ans:true,
   exp:"建築設計標準では、車椅子使用者用客室内の浴室出入口の有効幅員は80cm以上を求めている。85cmはこの基準を満たす適切な設計値。70cmでは車椅子が通過できず基準未満となり不適切。"},
  {subject:"計画",topic:"建築積算",
   q:"鉄筋の所要数量は、その設計数量の３％割増しを標準とする。",
   alt:{q:"鉄筋の所要数量は、その設計数量の５％割増しを標準とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準（国土交通省）により、鉄筋の所要数量は設計数量の3%増しを標準とする。5%ではなく3%が正しい割増率。なお、木材・ボルト等ではそれぞれ異なる割増率が規定されている。"},
  {subject:"計画",topic:"建築積算",
   q:"仮設における共通仮設は、工事全体にわたって共通的に必要な仮設をいい、仮囲いや現場事務所等がこれに該当する。",
   alt:{q:"仮設における直接仮設は、工事種目ごとの工事科目で単独に使用する仮設をいう。",ans:false},
   ans:true,
   exp:"積算における仮設の分類：共通仮設は複数の工事種目にまたがり工事全体で共用する仮設（仮囲い・現場事務所・仮設電力・仮設水道等）。直接仮設は各工事科目の中で当該工事に直接附属して使用される仮設（型枠支保工・建方用足場等）。直接仮設は工種ごとの工事費に含まれる。"},
  {subject:"計画",topic:"建築積算",
   q:"法付け工法の場合、作業上のゆとり幅は0.5mを標準とし、山留め工法の場合には、山留め壁と躯体との間の余幅は1.0mを標準とする。",
   alt:{q:"法付け工法の場合、作業上のゆとり幅は1.0mを標準とし、山留め工法の場合には、山留め壁と躯体との間の余幅は0.5mを標準とする。",ans:false},
   ans:true,
   exp:"建築工事における掘削の余幅の標準：法付けオープンカット工法の場合は作業上のゆとり幅0.5m、山留め工法の場合は山留め壁と構造体外周面との間の余幅1.0m（支保工の設置・解体・防水工事等の作業スペース確保のため）を標準とする。"},
  {subject:"計画",topic:"建築積算",
   q:"全面がガラスである建具類のガラスの数量において、かまち、方立、桟等の見付幅が0.1mを超えるものがあるときは、その面積を差し引いた面積とする。",
   alt:{q:"全面がガラスである建具類のガラスの数量において、かまち、方立、桟等の見付幅が0.05mを超えるものがあるときは、その面積を差し引いた面積とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準では、全面ガラスの建具についてガラス面積を計測する際、かまち・方立・桟等の見付幅が0.1m（10cm）を超えるものについてはその部分の面積を差し引いて純粋なガラス面積を算出する。0.05mでは差引が多くなりすぎる。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"LCMは、建築物の機能や効用の維持・向上を、通常、建築物の企画から解体・廃棄処分まで、適切なコストのもとで管理・実行することをいい、LCCの低減を行うことが目的の一つである。",
   alt:{q:"LCMは、建築物の機能や効用の維持・向上を、通常、建築物の企画から解体・廃棄処分まで、適切なコストのもとで管理・実行することをいい、LCCの最大化を行うことが目的の一つである。",ans:false},
   ans:true,
   exp:"LCM（ライフサイクルマネジメント）は建築物の企画・設計・施工・維持管理・改修・解体・廃棄に至るライフサイクル全体を通じて、建築物の機能・効用の維持向上を適切なコスト管理のもとで実行するもの。目的の一つはLCC（ライフサイクルコスト）の低減であり、最大化ではない。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"賃貸住宅におけるサブリース事業は、賃貸管理事業者が建物所有者等から建築物を転貸目的として賃借し、自らが転貸人となって入居者に転貸するシステムによって行う賃貸管理事業である。",
   alt:{q:"賃貸住宅におけるサブリース事業は、賃貸管理事業者が建物所有者等から建築物を転貸目的として賃借し、自らが賃借人のまま入居者を管理するシステムによって行う賃貸管理事業である。",ans:false},
   ans:true,
   exp:"サブリース（一括借上げ）事業：賃貸管理事業者（サブリース業者）が①建物オーナーから建物を一括賃借（自らは賃借人）し、②入居者に転貸する（自らは転貸人）二段構えの賃貸管理。業者がオーナーへの賃料保証と入居者管理の両方を担う。「賃借人のまま」では転貸関係が成立しない。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"建築物におけるコミッショニングは、一般に、環境・エネルギー性能等の観点から建築物のオーナーやユーザーが求める要求性能を把握して、その要求性能の実現を検証することである。",
   alt:{q:"建築物におけるコミッショニングは、一般に、環境・エネルギー性能等の観点から建築物の設計者が求める要求性能を把握して、その要求性能の実現を検証することである。",ans:false},
   ans:true,
   exp:"コミッショニング（Cx）は建築物のオーナー・ユーザーの要求性能（Owner's Project Requirements）を出発点とし、設計・施工・引渡し・運用の各段階でその要求性能の実現を体系的に検証・確認するプロセス。「設計者が求める」ではなくオーナー・ユーザーの要求が起点。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"景観法に基づく景観協定は、景観計画区域内の一団の土地の区域における良好な景観の形成に関する事項について、原則として、土地所有者等の全員の合意により結ばれる。",
   alt:{q:"景観法に基づく景観協定は、景観計画区域内の一団の土地の区域における良好な景観の形成に関する事項について、原則として、土地所有者等の過半数の合意により結ばれる。",ans:false},
   ans:true,
   exp:"景観法第81条：景観協定は景観計画区域内の土地所有者等の全員の合意により締結される（一人協定の場合は単独で可）。建築協定と同様、全員合意が原則。過半数の合意では締結できない。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"高度利用地区は、市街地の合理的かつ健全な高度利用と都市機能の更新を図るため、都市計画に建築物の容積率の最高限度及び最低限度、建蔽率の最高限度、建築面積の最低限度並びに壁面の位置の制限を定めることができる地区である。",
   alt:{q:"高度利用地区は、市街地の合理的かつ健全な高度利用を図るため、都市計画に建築物の高さの最高限度又は最低限度を定めることができる地区である。",ans:false},
   ans:true,
   exp:"高度利用地区（都市計画法第9条第19項）では容積率の最高・最低限度、建蔽率の最高限度、建築面積の最低限度、壁面位置の制限を定める。「建築物の高さの最高・最低限度を定める」のは高度地区（法第9条第18項）であり別の制度。高度利用地区と高度地区は名称が似ているが異なる。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"『広場の造形（芸術的原理に基づく都市計画）』（カミロ・ジッテ、1889年）は、ヨーロッパ各地の歴史的な広場を分析することで、中世の街並みに起源をもつ自然発生的な都市空間の構成を再評価し、そのスケール感や空間感覚を学ぶことの重要性を主張した。",
   alt:{q:"『広場の造形（芸術的原理に基づく都市計画）』（カミロ・ジッテ、1889年）は、ヨーロッパ各地の歴史的な広場を分析することで、近代都市計画の機能的・合理的側面を評価し、大規模な放射状街路計画の優位性を主張した。",ans:false},
   ans:true,
   exp:"カミロ・ジッテ（Camillo Sitte）の『広場の造形』（1889）はウィーンのリンク通りなど近代的な都市整備を批判し、歴史的なヨーロッパの広場・街路の分析を通じて、人間的なスケール感・囲まれ感・不規則性の美を再評価した。機能主義的な大規模街路計画への批判を含む。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"ジェイン・ジェイコブズは、著書「アメリカ大都市の死と生」において、頻繁に使われている街路は安全となる傾向にあり、街路には常に住民、通行人、店員などの多数の目を置く必要があるとしている。",
   alt:{q:"ジェイン・ジェイコブズは、著書「アメリカ大都市の死と生」において、頻繁に使われている街路は危険となる傾向にあり、プライバシー確保のため街路への「目」を減らすことの重要性を主張している。",ans:false},
   ans:true,
   exp:"ジェイン・ジェイコブズ『アメリカ大都市の死と生』（1961年）：「街路の目（eyes on the street）」の概念を提唱。人が頻繁に使う活気ある街路は自然監視が機能して安全になり、逆に人気のない街路は危険になると論じた。近代都市計画（スーパーブロック・高層団地等）への批判でもある。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"インナーシティ問題は、都市の中心とその周辺の市街地における人口の減少と産業の衰退、地域の荒廃等のことである。",
   alt:{q:"インナーシティ問題は、都市の郊外における人口の急増と産業の過密による交通渋滞や環境悪化のことである。",ans:false},
   ans:true,
   exp:"インナーシティ（inner city）問題：1970〜80年代から先進国の大都市中心部・旧工業地区で顕在化した、人口流出・産業空洞化・建物老朽化・貧困・犯罪増加等の複合的な都市問題。郊外では逆にスプロール問題が発生する。"},
  {subject:"計画",topic:"都市計画・住宅地計画実例",
   q:"レッチワース（イギリス、20世紀初頭）は、エベネザー・ハワードの「田園都市（Garden City）」の構想に基づいて建設された、世界最初の田園都市である。",
   alt:{q:"レッチワース（イギリス、20世紀初頭）は、パトリック・ゲデスの「保存的外科手術」という概念のもと、都市の歴史性を保存しながら再開発が行われた都市である。",ans:false},
   ans:true,
   exp:"レッチワース（Letchworth Garden City、1903年着工）はエベネザー・ハワード（Ebenezer Howard）の著書『明日の田園都市』（1902）の構想を実現した世界初の田園都市。パトリック・ゲデスの「保存的外科手術（Conservative Surgery）」は既存都市の歴史性を活かした段階的改善の手法で全く別の概念。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"都市再生特別地区の指定により、通常の用途地域の用途・容積率等の制限を超えた土地の高度利用と都市機能の更新を促進することができる。",
   alt:{q:"北海道札幌市では、都市再生特別地区の指定により、建築物の形態意匠の制限の他、建築物の高さの最高限度や敷地面積の最低限度を定めることで市街地の良好な景観形成に取り組んでいる。",ans:false},
   ans:true,
   exp:"都市再生特別地区（都市再生特別措置法）は、用途地域による制限によらず、容積率の割増や用途制限の緩和等を定め、民間都市開発を誘導して都市機能の更新を図る制度。「建築物の形態意匠の制限・高さの最高限度・敷地面積の最低限度を定める」のは地区計画の内容であり、都市再生特別地区の制度とは異なる。"},
  {subject:"計画",topic:"都市計画・住宅地計画実例",
   q:"長野県小布施町においては、葛飾北斎の作品を収蔵した北斎館を核として、江戸時代の豪商の屋敷を整備した「栗の小径」等のオープンガーデンによるまちづくりを行っている。",
   alt:{q:"小布施町（長野県）においては、明治時代に建築された黒漆喰仕上げの建築物を保存・改装し、この建築物を核とした街並み「黒壁スクエア」を中心にして観光振興によるまちづくりを行っている。",ans:false},
   ans:true,
   exp:"長野県小布施町のまちづくり：葛飾北斎の晩年の滞在地であることを活かした北斎館を核として、豪商高井鴻山の屋敷周辺を「栗の小径」等として整備するオープンガーデンのまちづくりで有名。「黒壁スクエア」は滋賀県長浜市の、旧第百三十国立銀行（明治期の黒漆喰建物）を保存・活用した別のまちづくり事例。"},
  {subject:"計画",topic:"都市計画・住宅地計画実例",
   q:"ドックランズ再開発計画（ロンドン）は、老朽化した港湾施設（旧ドック）を大規模に再整備し、オフィス・住宅・商業施設等の高度複合開発によって都市機能の更新を図ったプロジェクトである。",
   alt:{q:"ドックランズ再開発計画（ロンドン）は、大規模な区画の整理によって街区を撤去し、中央部を遊歩道とする広場をつくり出したプロジェクトである。",ans:false},
   ans:true,
   exp:"ロンドン・ドックランズ再開発（1981年〜、LDDC主導）：テムズ川東部の旧港湾・工業地区（ドックランズ）を大規模に再開発。カナリーワーフの超高層オフィス群・住宅・商業施設を整備し、DLR（軽量鉄道）を整備して旧衰退地区を新たな商業・業務中心地として再生した。"},
  {subject:"計画",topic:"都市計画・住宅地計画実例",
   q:"富山県富山市では、レジリエンス戦略を策定し、自然災害による大きな被害や少子高齢化等の社会構造の変化に直面しても、速やかに復興し、さらに成長する能力や強靭さを有する都市づくりに取り組んでいる。",
   alt:{q:"富山県富山市では、人口増加を見込んだ市街地拡大型の都市整備を推進し、広大な低密度郊外住宅地の開発を積極的に行うことで都市活力の維持に取り組んでいる。",ans:false},
   ans:true,
   exp:"富山市はアジア都市気候変動レジリエンス・ネットワーク（ACCCRN）に参加するなど、気候変動や人口減少等のリスクへの強靱性（レジリエンス）向上を目指した都市づくりに取り組む。同時に公共交通活性化・コンパクトシティ（LRT整備等）でも全国的に知られる。"},
  {subject:"計画",topic:"都市計画・住宅地計画実例",
   q:"千里ニュータウン（大阪府）は、高度経済成長期に大阪圏に流入し、増加した人口の受け皿として、「近隣住区」等の都市計画理論に基づき開発された我が国で最初のニュータウンである。",
   alt:{q:"高蔵寺ニュータウン（愛知県）は、高度経済成長期に名古屋圏に流入し、増加した人口の受け皿として、「近隣住区」等の都市計画理論に基づき開発された我が国で最初のニュータウンである。",ans:false},
   ans:true,
   exp:"日本最初のニュータウンは千里ニュータウン（大阪府豊中市・吹田市、1962年入居開始）。日本住宅公団主導でクラレンス・ペリーの「近隣住区論」を採用。高蔵寺ニュータウン（愛知県春日井市）は1968年入居開始で千里より後発。"},
  {subject:"計画",topic:"建築史実例",
   q:"ジョン F. ケネディ国際空港TWAターミナルビル（ニューヨーク、E.サーリネン、1962年）は、長さ約105mの屋根をもち、４本のY字柱脚に支えられた４枚の鉄筋コンクリート造によるシェルで構成されている。",
   alt:{q:"ジョン F. ケネディ国際空港TWAターミナルビル（ニューヨーク、E.サーリネン、1962年）は、長さ約105mの屋根をもち、２本のX字柱脚に支えられた２枚の鉄筋コンクリート造によるシェルで構成されている。",ans:false},
   ans:true,
   exp:"TWAフライトセンター（1962年、エーロ・サーリネン設計）：飛翔する鳥・蝶を連想させる有機的な外観をもつRC薄肉シェル構造。中央部で高さが下がり両翼に広がる屋根は4枚のシェルで構成され、Y字形の4本の柱脚（ピア）に支持される。2001年廃止後、現在はホテルに転用。"},
  {subject:"計画",topic:"公共施設実例",
   q:"ロームシアター京都（旧京都会館）（京都府）は、昭和30年代に建設された既存建築物を保存し、意匠的な要素を再現しながら、増築と一部建て替えを行うことで、機能拡充が図られたものである。",
   alt:{q:"ロームシアター京都（旧京都会館）（京都府）は、昭和30年代に建設された既存建築物を全面解体し、現代的なデザインで建て替えることで機能拡充が図られたものである。",ans:false},
   ans:true,
   exp:"ロームシアター京都（旧京都会館、1960年竣工・前川國男設計）：2016年リニューアルオープン。既存建物を保存・活用しながら、前川建築の意匠（テラコッタタイル・格子状外壁）を再現。メインホールを拡張し新ウィングを増築したが、全面解体ではなく保存を前提とした改修。"},
  {subject:"計画",topic:"公共施設実例",
   q:"金沢市民芸術村（石川県）は、大正から昭和初期に建設された紡績工場の倉庫を改修し、工房、レストラン、オープンスペース等から構成される芸術文化施設へ再生させたものである。",
   alt:{q:"金沢市民芸術村（石川県）は、明治時代に建設された醸造所の倉庫を改修し、工房、レストラン、オープンスペース等から構成される芸術文化施設へ再生させたものである。",ans:false},
   ans:true,
   exp:"金沢市民芸術村（1996年開館）：大正から昭和初期に建設された旧大和紡績（のちのカネボウ）金沢工場の倉庫群（レンガ造・木造トラス）を改修・転用。ドラマ工房・音楽工房・邦楽工房・美術工房等からなる24時間365日利用可能な芸術文化施設として再生。醸造所の倉庫ではない。"},

  // ── 環境追加②（24問）──
  {subject:"環境",topic:"温熱環境",
   q:"建築物の二次エネルギー消費量を一次エネルギー消費量に換算して同じ単位で比べた場合、二次エネルギー消費量は一次エネルギー消費量よりも小さくなる。",
   alt:{q:"建築物の二次エネルギー消費量を一次エネルギー消費量に換算して同じ単位で比べた場合、二次エネルギー消費量は一次エネルギー消費量よりも大きくなる。",ans:false},
   ans:true,
   exp:"一次エネルギーは石油・石炭・天然ガス等の原料エネルギー。二次エネルギー（電気・ガス・熱等）はその変換・輸送過程で損失を伴って得られる。変換効率は1未満であるため、同量の二次エネルギーを得るには常に多くの一次エネルギーが必要。よって換算後の二次エネルギー消費量＜一次エネルギー消費量。"},
  {subject:"環境",topic:"空調設備",
   q:"軸流送風機は、一般に、遠心送風機に比べて静圧の低い用途に用いられる。",
   alt:{q:"軸流送風機は、一般に、遠心送風機に比べて静圧の高い用途に用いられる。",ans:false},
   ans:true,
   exp:"送風機の特性：遠心送風機（シロッコファン・多翼ファン等）は高静圧・比較的低風量で、ダクト抵抗の大きい空調ダクト系に適する。軸流送風機（プロペラファン等）は低静圧・大風量で、換気扇・冷却塔ファン等の静圧が低くて済む用途に適する。「静圧の高い用途」は遠心送風機。"},
  {subject:"環境",topic:"空調設備",
   q:"パッケージ型空調機のAPF（Annual Performance Factor）は、「冷房期間総合負荷及び暖房期間総合負荷の和」を「通年消費電力量」で除した値により表される。",
   alt:{q:"パッケージ型空調機のAPF（Annual Performance Factor）は、「通年消費電力量」を「冷房期間総合負荷及び暖房期間総合負荷の和」で除した値により表される。",ans:false},
   ans:true,
   exp:"APF（通年エネルギー消費効率）＝（冷房期間総合負荷＋暖房期間総合負荷）÷通年消費電力量。分子は熱量（kWh相当）、分母は電力消費量（kWh）。APFが大きいほど高効率。「消費電力量÷負荷の和」はその逆数（エネルギー消費原単位に近い概念）であり誤り。"},
  {subject:"環境",topic:"空調設備",
   q:"空調熱源用の冷却塔の設計出口水温は、冷凍機の冷却水入口水温の許容範囲内の低い温度で運転したほうが、省エネルギー上有効である。",
   alt:{q:"空調熱源用の冷却塔の設計出口水温は、冷凍機の冷却水入口水温の許容範囲内の高い温度で運転したほうが、省エネルギー上有効である。",ans:false},
   ans:true,
   exp:"冷凍機（チラー）のCOP（成績係数）は冷却水入口水温が低いほど高くなる（凝縮圧力が下がり仕事量が減少）。冷却塔の出口水温（＝冷凍機冷却水入口水温）を低くすることで冷凍機の省エネになる。ただし低温すぎると冷凍機保護のため制限がある。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"水道直結直圧方式は、水道本管の圧力を利用して建築物内の必要箇所に給水する方式であり、一般に、３階建て以下の建築物で小規模なものに適用することができる。",
   alt:{q:"水道直結直圧方式は、水道本管の圧力を利用して建築物内の必要箇所に給水する方式であり、一般に、10階建て以上の高層建築物にも適用することができる。",ans:false},
   ans:true,
   exp:"水道直結直圧方式は水道本管の圧力（通常0.2〜0.4MPa程度）をそのまま利用するため、圧力・水量の制約から一般に3階建て以下の小規模建物に適用される。高層建物では水道本管の圧力が不足するため増圧ポンプを用いる直結増圧方式や高置タンク方式が必要。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"集合住宅における設計用給水量として、居住者１人１日当たり250lとした。",
   alt:{q:"集合住宅における設計用給水量として、居住者１人１日当たり100lとした。",ans:false},
   ans:true,
   exp:"集合住宅の設計用給水量の目安は居住者1人1日当たり200〜400L程度。250Lはこの範囲内の適切な設計値。50Lは過少で生活用水（飲料・炊事・入浴・洗濯等）として全く不十分。なお、一般事務所では1人1日当たり60〜100L程度が目安。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"給水配管設備において、管内の圧力が高かったので、ウォーターハンマー防止のためエアチャンバーを設けた。",
   alt:{q:"給水配管設備において、管内の圧力が高かったので、ウォーターハンマー防止のため逆止弁を設けた。",ans:false},
   ans:true,
   exp:"ウォーターハンマー（水撃）は弁の急閉鎖等により生じる圧力衝撃。防止策：エアチャンバー（空気室）・ウォーターハンマーアレスタ・クッション弁・定水位弁等で圧力衝撃を緩衝する。逆止弁は逆流防止のための弁であり、ウォーターハンマー防止は主な目的ではない。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"排水を再利用した雑用水については、便器洗浄水や修景用水の他に、清掃用水にも使用できるが、冷却塔補給水への使用は認められていない。",
   alt:{q:"排水を再利用した雑用水については、便器洗浄水や修景用水の他に、清掃用水や冷却塔補給水にも使用した。",ans:false},
   ans:true,
   exp:"建築物衛生法・水道法等に基づく雑用水（中水）の使用用途：便所洗浄水・散水・修景・清掃用水は認められるが、冷却塔補給水は一般に認められていない。冷却塔内でエアロゾル化した水が人体に吸入されるリスク（レジオネラ属菌等）があるため、冷却塔補給水には水質基準が厳しく適用される。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"給湯用ボイラーは、常に缶水が新鮮な補給水と入れ替わるため、空気調和設備用温水ボイラーに比べて腐食しやすい。",
   alt:{q:"給湯用ボイラーは、缶水が密閉された状態で循環するため、空気調和設備用温水ボイラーに比べて腐食しにくい。",ans:false},
   ans:true,
   exp:"給湯用ボイラーは使用の度に新鮮な水（溶存酸素・硬度成分を多く含む）が補給されるため腐食・スケール付着が激しい。空調用温水ボイラーは密閉回路で同じ水（缶水）を循環し、一度酸素が消費されると腐食が進みにくい。したがって給湯ボイラーの方が腐食しやすい。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"各個通気方式は、各衛生器具のトラップごとに取り出した通気管を通気横枝管に接続し、その端部を通気立て管等に接続する方式であり、自己サイホン作用の防止に有効である。",
   alt:{q:"各個通気方式は、各衛生器具のトラップごとに取り出した通気管を通気横枝管に接続する方式であり、誘導サイホン作用の防止には有効だが、自己サイホン作用の防止には効果がない。",ans:false},
   ans:true,
   exp:"各個通気方式は各器具トラップのすぐ下流から個別に通気管を立ち上げてトラップの封水を保護する。器具自身の排水が流れる際に生じる自己サイホン（器具トラップの封水が吸引される現象）の防止に最も効果的な通気方式。誘導サイホン（他の器具排水による吸引）にはループ通気が有効。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"伸頂通気方式は、通気立て管を設けず、排水立て管の頂上に設置した伸頂通気管を用いて通気を行う方式であり、一般に、各個通気方式やループ通気方式に比べて許容流量値が小さい。",
   alt:{q:"伸頂通気方式は、通気立て管を設けず、排水立て管の頂上に設置した伸頂通気管を用いて通気を行う方式であり、一般に、各個通気方式やループ通気方式に比べて許容流量値が大きい。",ans:false},
   ans:true,
   exp:"伸頂通気方式は排水立て管頂部のみから大気開放する最もシンプルな通気方式だが、通気能力は限られる。各個通気やループ通気を設けた方式に比べて許容排水流量（排水立て管の排水能力）が小さくなる。大流量が必要な建物では各個通気・ループ通気・特殊継手通気等を採用する。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"伸頂通気方式の排水通気配管において、伸頂通気管の管径は排水立て管の管径と同じ管径とした。",
   alt:{q:"伸頂通気方式の排水通気配管において、通気流速を高めるために、伸頂通気管の管径を排水立て管の管径よりも１サイズ小さいものとした。",ans:false},
   ans:true,
   exp:"伸頂通気管の管径は原則として排水立て管と同径以上としなければならない（縮小禁止）。管径を小さくすると通気抵抗が増大し、排水時の圧力変動がトラップ封水を破壊しやすくなる。「1サイズ小さい」は法令・基準に違反する不適切な設計。"},
  {subject:"環境",topic:"給排水衛生設備",
   q:"排水槽の通気管は、他の排水系統の通気管と接続せず、単独で外気に開放する。",
   alt:{q:"排水槽の通気管は、他の排水系統の通気管と接続し、外気に開放する。",ans:false},
   ans:true,
   exp:"排水槽（汚水槽・雑排水槽）は悪臭が強く発生するため、通気管は他の排水系統の通気管と接続せず、単独で外気（臭気が問題にならない箇所）に直接開放する。接続すると悪臭が他の通気管を経由して室内に逆流するリスクがある。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"風力発電に用いられる風車は、一般に、水平軸風車（回転軸が地面に対して水平な風車）と垂直軸風車（回転軸が地面に対して垂直な風車）に分類することができ、垂直軸風車は小型風車での採用例が多い。",
   alt:{q:"風力発電に用いられる風車は、一般に、水平軸風車と垂直軸風車に分類することができ、水平軸風車は小型風車での採用例が多い。",ans:false},
   ans:true,
   exp:"水平軸風車（プロペラ型）は高効率で大型の風力発電に広く採用される（洋上・陸上の大型風車はほぼ水平軸）。垂直軸風車（ダリウス型・サボニウス型等）は風向を問わず発電できるため、都市部の建物屋上や小型分散型電源での採用例が多い。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"非常用エレベーターの機械室の床面積は、機械の配置及び管理に支障がない場合においては、昇降路の水平投影面積の２倍以上としなくてもよい。",
   alt:{q:"非常用エレベーターの機械室の床面積は、機械の配置及び管理に支障があるかどうかにかかわらず、常に昇降路の水平投影面積の３倍以上としなければならない。",ans:false},
   ans:true,
   exp:"令第129条の11第4項：非常用エレベーターの機械室床面積は昇降路の水平投影面積の2倍以上が原則。ただし機械の配置及び管理に支障がない場合はこれより小さくできる（緩和規定）。「3倍以上」という規定は存在せず、また例外なく2倍以上という絶対規定でもない。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"貸事務所ビルの乗用エレベーターのサービス水準については、エレベーターが２台以上ある場合、平均運転間隔を40秒以下となるように計画することが望ましい。",
   alt:{q:"貸事務所ビルの乗用エレベーターのサービス水準については、エレベーターが２台以上ある場合、平均運転間隔を90秒以下となるように計画することが望ましい。",ans:false},
   ans:true,
   exp:"エレベーターの平均インターバル（平均運転間隔）の目標値：貸事務所ビルでは30〜40秒以下が望ましいとされる。90秒では利用者の待ち時間が長く、サービス水準として不十分。住宅では60〜90秒程度が許容範囲とされる場合もある。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"乗用エレベーターは、一般に、火災発生時の乗客の避難を図るため、火災時管制運転により速やかに避難階（１階又は地上に通じる出入口のある階）に帰還・停止させる計画とする。",
   alt:{q:"乗用エレベーターは、一般に、火災発生時の乗客の避難を図るため、火災時管制運転により速やかに最寄階に停止させる計画とする。",ans:false},
   ans:true,
   exp:"火災時管制運転：火災信号を受けると乗用エレベーターは途中停止せずに「避難階（1階等）」に直行・停止し、以降の運転を停止する。「最寄階に停止」は地震時管制運転（P波感知後に最寄階に停止してドアを開放する動作）であり、火災時とは異なる。"},
  {subject:"環境",topic:"照明設備",
   q:"配光曲線は、光源の各方向に対する光度の分布を示すものである。",
   alt:{q:"配光曲線は、光源の各方向に対する照度の分布を示すものである。",ans:false},
   ans:true,
   exp:"配光曲線（polar curve）は照明器具・光源から各方向に放射される「光度（cd：カンデラ）」の大きさを極座標で表したもの。照度（lx）は受照面での明るさを表す別の量。配光曲線から任意の方向の光度を読み取り、逆二乗の法則で任意点の照度を計算する。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"消防用水は、大規模建築物に設置が義務付けられる消防活動のための水源であり、消防ポンプ車が消火活動に使用するもので、屋内消火栓やスプリンクラー設備とは別の消防活動上必要な施設である。",
   alt:{q:"消防用水を、屋内消火栓設備やスプリンクラー設備等の初期消火設備のための専用水源として設置した。",ans:false},
   ans:true,
   exp:"消防用水（消防法第17条等）は敷地面積・延べ面積が一定規模以上の建築物に設置が義務付けられる、消防隊が消火活動に使用するための水槽・プール等の水源（消防活動上必要な施設）。屋内消火栓やスプリンクラーの「初期消火設備のための専用水源」ではなく、消防隊専用の水源。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"屋内消火栓設備において、１号消火栓については、階ごとに、その階の各部分から消火栓のホース接続口までの水平距離が25m以下となるように設置した。",
   alt:{q:"屋内消火栓設備において、１号消火栓については、階ごとに、その階の各部分から消火栓のホース接続口までの水平距離が15m以下となるように設置した。",ans:false},
   ans:true,
   exp:"消防法施行規則：屋内消火栓の設置基準として、1号消火栓はホース接続口までの水平距離25m以下、2号消火栓（及び広範囲型2号消火栓）は15m以下。1号・2号の違いを混同しないこと。1号は放水量が多く2人操作が必要で25mのホースを使う。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"閉鎖型スプリンクラーヘッドの種別について、感度種別が１種で、かつ、有効散水半径が2.3m以上であるものは「高感度型」に分類される。",
   alt:{q:"閉鎖型スプリンクラーヘッドの種別について、感度種別が１種で、かつ、有効散水半径が2.6m以上であるものは「高感度型」に分類される。",ans:true},
   ans:false,
   exp:"高感度型ヘッドの要件は①感度種別1種（RTI≤50[(m・s)^(1/2)]）かつ②有効散水半径2.6m以上。感度が高く応答が速いため標準型（有効散水半径2.3m）より広い散水半径が認められ、ヘッドの設置個数を減らせる。2.3mは標準型の値であり、高感度型の基準は2.6m。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"水噴霧消火設備は、微粒子の水を放射して消火する設備で、駐車場や変電室等に採用される。",
   alt:{q:"水噴霧消火設備は、微粒子の水を放射して消火する設備で、飛行機の格納庫に採用される。",ans:false},
   ans:true,
   exp:"水噴霧消火設備は微細な霧状の水（ミスト）を放射し、冷却・窒息・乳化作用で消火。適用場所：駐車場・変電室・ケーブルダクト・危険物貯蔵所等。飛行機格納庫には可燃性液体（航空燃料）の火災に対応した「泡消火設備」が義務付けられる。水噴霧は油火災対応として一部認められるが格納庫の代表的設備は泡消火。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"排煙設備の設置が必要な百貨店において、排煙設備の排煙口を、防煙区画のそれぞれについて、当該防煙区画の各部分から排煙口のいずれかに至る水平距離が30m以下となるように設置した。",
   alt:{q:"排煙設備の設置が必要な百貨店において、排煙設備の排煙口を、防煙区画のそれぞれについて、当該防煙区画の各部分から排煙口のいずれかに至る水平距離が40m以下となるように設置した。",ans:false},
   ans:true,
   exp:"建築基準法施行令第126条の3第1項第4号：排煙口は防煙区画の各部分から一のいずれかの排煙口まで水平距離30m以下となるように設置する。40mでは基準を超えており、防煙区画の一部が排煙口から遠すぎて排煙効果が不足する。防煙垂れ壁で仕切られた各防煙区画ごとに排煙口が必要。"},
  {subject:"環境",topic:"温熱環境",
   q:"LEED（Leadership in Energy & Environmental Design）は、建築物や敷地等に関する環境性能評価システムの一つであり、取得したポイントの合計によって４段階の認証レベルが決まる。",
   alt:{q:"LEED（Leadership in Energy & Environmental Design）は、建築物や敷地等に関する環境性能評価システムの一つであり、取得したポイントの合計によって３段階の認証レベルが決まる。",ans:false},
   ans:true,
   exp:"LEED（米国グリーンビルディング協議会・USGBC）は米国発の建築環境性能評価システム。取得ポイントに応じてCertified（認証）・Silver（銀）・Gold（金）・Platinum（プラチナ）の4段階で認証される。日本のCASBEE（建築環境総合性能評価）とともに国際的に普及。"},

  {subject:"計画",topic:"高齢者・障害者",
   q:"美術館の車椅子使用者用トイレにおいて、内部の自動式引戸の開閉スイッチは、引戸の戸先からできるだけ遠い位置に設置した。",
   alt:{q:"美術館の車椅子使用者用トイレにおいて、内部の自動式引戸の開閉スイッチは、引戸の戸先からできるだけ近い位置に設置した。",ans:false},
   ans:true,
   exp:"自動式引戸の開閉スイッチは、スイッチを押した後に引戸が開いても利用者に当たらないよう、引戸の戸先からできるだけ遠い位置（吊り元側の壁面）に設置する。戸先近くに設置すると、ドア開放時に車椅子利用者と引戸が接触する危険がある。"},
  {subject:"計画",topic:"高齢者・障害者",
   q:"公共施設が建つ敷地内の主要な経路上の計画において、転倒防止や休憩、減速ができるように、傾斜路の途中に設置した踊り場の踏幅を、1,600mmとした。",
   alt:{q:"公共施設が建つ敷地内の主要な経路上の計画において、傾斜路の途中に設置した踊り場の踏幅を、800mmとした。",ans:false},
   ans:true,
   exp:"バリアフリー法・建築設計標準：スロープ途中に設ける踊り場の奥行き（踏幅）は1,500mm以上が基準。1,600mmはこれを満たす適切な寸法。800mmでは車椅子が転回・休憩できず基準未満。踊り場はスロープが方向転換する部分にも設けることで安全性を高める。"},
  {subject:"計画",topic:"建築積算",
   q:"工事費における共通費とは、共通仮設費、現場管理費及び一般管理費等を合わせたものである。",
   alt:{q:"工事費における共通費とは、材料費、労務費及び直接経費を合わせたものである。",ans:false},
   ans:true,
   exp:"建設工事費の構成：純工事費（直接工事費＋共通仮設費）＋現場管理費＝工事原価。工事原価＋一般管理費等＝工事費。共通費＝共通仮設費＋現場管理費＋一般管理費等。材料費・労務費・直接経費は直接工事費の構成要素であり、共通費ではない。"},
  {subject:"計画",topic:"建築積算",
   q:"型枠の数量において、コンクリートの上面が傾斜している場合、その勾配が10分の1を超えるものについては、その部分の上面型枠又はコンクリートの上面の処理を計測・計算の対象とする。",
   alt:{q:"型枠の数量において、コンクリートの上面が傾斜している場合、その勾配が10分の1以下のものについても、すべて上面型枠を計測・計算の対象とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準：コンクリート上面が傾斜している場合、勾配が1/10を超えるものに限り、上面型枠またはコンクリート上面の処理を計測・計算の対象とする。1/10以下の緩勾配の場合は対象外。急勾配でないと型枠の必要性が生じないという実態に基づく区分。"},
  {subject:"計画",topic:"建築積算",
   q:"鉄骨の溶接の数量において、原則として、溶接の種類に区分し、溶接断面形状ごとに長さを求め、すみ肉溶接脚長６mmに換算した延べ長さとする。",
   alt:{q:"鉄骨の溶接の数量において、原則として、溶接の種類や断面形状によらず、実際の溶接長さをそのまま計測した延べ長さとする。",ans:false},
   ans:true,
   exp:"建築数量積算基準：鉄骨溶接の数量は溶接の種類（すみ肉・突合せ等）・断面形状ごとに計測し、すみ肉溶接脚長6mm相当に換算した延べ長さ（換算長さ）で統一して表す。換算により異なる断面形状の溶接を比較・集計しやすくなる。"},
  {subject:"計画",topic:"建築積算",
   q:"防水層等の所要数量において、シート防水のシートの重ね代は、計測数量に１０％の割増しをすることを標準とする。",
   alt:{q:"防水層等の所要数量において、シート防水のシートの重ね代は、計測数量に５％の割増しをすることを標準とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準：シート防水のシート所要数量は、計測した設計数量に対してシートの重ね代（ラップ）として10%の割増しを標準とする。5%では重ね代が不足し防水性能が確保できない。なお、ルーフィング類も同様に10%割増しが一般的。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"「モラルハザード」は、保険の領域から派生した概念で、近年では、一般に、「倫理観の欠如」と訳され、企業等が節度なく利益を追求する状態をいう。",
   alt:{q:"「モラルハザード」は、保険の領域から派生した概念で、近年では、一般に、「危機管理計画」と訳され、企業等が緊急事態に備えるための行動指針を策定することをいう。",ans:false},
   ans:true,
   exp:"モラルハザード（moral hazard）：保険分野では「保険に加入することで損失回避の注意が低下する現象」を指す。転じて近年は「倫理観の欠如」と訳され、企業や個人が倫理的な抑制なく過剰な利益追求・リスクテイクを行う状態全般を指す言葉として使われる。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"「公益通報」には、通報先や状況によって、「内部通報」、「行政機関への通報」及び「外部通報」の三つの種類がある。",
   alt:{q:"「公益通報」には、通報先や状況によって、「内部通報」及び「行政機関への通報」の二つの種類がある。",ans:false},
   ans:true,
   exp:"公益通報者保護法（2004年制定、2022年改正施行）：公益通報の種類は①事業者内部への通報（内部通報）②行政機関への通報③報道機関・消費者団体等への外部通報（一定の要件が必要）の三種類。二種類だけでは外部通報が保護対象から外れ誤り。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"設計図書の内容を把握し、設計図書に明らかな矛盾、誤謬、脱漏、不適切な納まり等を発見した場合には、設計者に報告し、必要に応じて発注者に通知する業務は、工事監理に関する標準業務である。",
   alt:{q:"設計図書の内容を把握し、設計図書に明らかな矛盾、誤謬、脱漏、不適切な納まり等を発見した場合には、設計者に報告し、必要に応じて工事施工者に確認する業務は、工事監理に関する標準業務である。",ans:false},
   ans:true,
   exp:"工事監理業務（建築士法・標準業務）：設計図書の矛盾・誤謬・脱漏等を発見した場合の対応は、①設計者に報告し②必要に応じて発注者に通知する。「工事施工者に確認する」は誤り。工事施工者は施工の実施者であり、設計図書の誤りを確認・修正する立場にない。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"建築物の企画段階におけるブリーフィングは、一般に、発注者及び関係者の要求、目的、制約条件を明らかにし、分析するプロセスであり、その成果物はブリーフと呼ばれている。",
   alt:{q:"建築物の企画段階におけるブリーフィングは、一般に、設計者が独自に作成する詳細設計仕様書の策定プロセスであり、その成果物はデザインブックと呼ばれている。",ans:false},
   ans:true,
   exp:"ブリーフィング（briefing）：プロジェクト初期段階で発注者・関係者の要求・目的・予算・制約条件等を整理・明確化する作業プロセス。成果物はブリーフ（brief）と呼ばれる。ブリーフは設計者への指示書・要件定義書として機能する。設計者が独自に作成するものではなく、発注者との協働作業。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"建築物の企画段階におけるフィージビリティ・スタディは、企画内容が事業経営上の観点で実行可能かどうかを確かめる検討作業である。",
   alt:{q:"建築物の企画段階におけるフィージビリティ・スタディは、完成した建築物の利用者満足度を事後的に評価する検討作業である。",ans:false},
   ans:true,
   exp:"フィージビリティ・スタディ（feasibility study、FS）：企画段階において、事業計画の経済性・技術的実現可能性・法的適合性・市場性等を総合的に検討し、事業の実行可能性（フィージビリティ）を事前に確認する作業。完成後の事後評価はPOE（建築後評価）と呼ばれ別の概念。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"CRE（Corporate Real Estate）は、企業が所有する不動産について、経営戦略的な視点に立って見直しを行い、不動産投資の効率性を最大限向上させるという考え方である。",
   alt:{q:"CSRは、企業が所有する不動産について、経営戦略的な視点に立って見直しを行い、不動産投資の効率性を最大限向上させるという考え方である。",ans:false},
   ans:true,
   exp:"CRE（Corporate Real Estate）戦略：企業が保有・使用する不動産（オフィス・工場・倉庫等）を経営戦略の観点から最適化し、資産効率の向上・コスト削減・事業リスク低減を図る考え方。CSR（Corporate Social Responsibility）は「企業の社会的責任」であり、環境・社会・ガバナンスへの配慮を指す全く別の概念。"},
  {subject:"計画",topic:"設計・工事監理",
   q:"BCPは、企業が災害や事故で被害を受けても、重要な業務が中断しないこと、中断しても可能な限り短い期間で再開すること等、事業の継続を追求するための計画である。",
   alt:{q:"BCPは、企業が社会的責任を果たすために、環境保全・地域貢献・コンプライアンス遵守等の取組みを継続的に推進するための計画である。",ans:false},
   ans:true,
   exp:"BCP（Business Continuity Plan、事業継続計画）：地震・水害・テロ・システム障害等の緊急事態が発生した際にも重要業務を継続・早期復旧させるための計画。リスク分析・代替拠点確保・優先業務の特定・訓練等を含む。社会的責任・環境貢献等の取組みはCSR（企業の社会的責任）の範疇。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"ダウンゾーニングは、都市計画で定められた容積率の引下げや建築することができる用途を住宅等に限定する等、規制を現行に比べて厳しいものに変更することである。",
   alt:{q:"ダウンゾーニングは、都市計画で定められた容積率の引上げや建築することができる用途を拡大する等、規制を現行に比べて緩やかなものに変更することである。",ans:false},
   ans:true,
   exp:"ダウンゾーニング（downzoning）：用途地域等の規制を現行より厳しい方向に変更すること（容積率引下げ・用途制限の強化等）。住宅地の過密化防止や緑地保全等の目的で行われる。逆に規制を緩和する方向への変更はアップゾーニング（upzoning）という。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"TOD（Transit Oriented Development）は、公共交通機関の利用を前提として、過度に自動車へ依存しない持続可能な都市を実現する方法の一つである。",
   alt:{q:"TOD（Transit Oriented Development）は、広大な駐車場と幹線道路網を中心に配置した、自動車利用を前提とした郊外型スプロール開発の手法の一つである。",ans:false},
   ans:true,
   exp:"TOD（公共交通指向型開発）：鉄道駅・バス停等の公共交通結節点の周辺に居住・商業・業務機能を高密度に集積させ、徒歩・自転車・公共交通を軸とした自動車依存度の低い持続可能な都市構造を目指す開発手法。コンパクトシティ・ウォーカブルシティと親和性が高い。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"ITS（Intelligent Transport Systems）とは、最先端の情報通信技術を用いて、交通事故、渋滞などの道路交通の問題解決を目的に構築する交通システムのことである。",
   alt:{q:"ITS（Intelligent Transport Systems）とは、過去の交通実績データの統計分析により、道路の拡幅整備計画を立案するためのシステムのことである。",ans:false},
   ans:true,
   exp:"ITS（高度道路交通システム）：AI・IoT・GPS・通信等の最先端情報通信技術を道路交通に活用し、交通事故削減・渋滞緩和・環境負荷低減・物流効率化等を実現するシステムの総称。ETC・カーナビ・信号制御・自動運転等が含まれる。単なる統計分析・道路整備計画とは異なる。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"エリアマネジメントは、地域の住民・事業者・地権者等が主体となり、地域における良好な環境や地域の価値を維持・向上させるための取組みのことである。",
   alt:{q:"エリアマネジメントは、行政主導により地域における良好な環境や地域の価値を維持・向上させるための取組みのことである。",ans:false},
   ans:true,
   exp:"エリアマネジメント：地域の良好な環境形成・価値向上を目的として、住民・事業者・地権者等の地域の関係者が主体的に参加・運営する取組み。BID（Business Improvement District）等の仕組みも類似概念。行政だけが主導するのではなく、地域の多様な主体が協働することが特徴。"},
  {subject:"計画",topic:"都市計画・住宅地計画実例",
   q:"千里ニュータウン（大阪府）は、近隣住区論に基づいて計画され、住区ごとに小学校・公園・商業施設等が配置された、我が国最初のニュータウンである。",
   alt:{q:"千里ニュータウン（大阪府）は、近隣住区の単位にはとらわれず、将来のワンセンター方式への移行等が意図された計画である。",ans:false},
   ans:true,
   exp:"千里ニュータウン（1962年入居開始）：クラレンス・ペリーの近隣住区論を採用し、住区（約4,000〜6,000人規模）ごとに小学校・公園・近隣商業施設を配置した我が国初のニュータウン。「近隣住区にとらわれず」というのは誤りで、むしろ近隣住区論の典型的な実践例として知られる。"},
  {subject:"計画",topic:"都市計画・住宅地計画実例",
   q:"筑波研究学園都市（茨城県）は、東京への一極集中を緩和するために、研究機関と居住環境を一体的に整備した、科学技術の振興を目的とした計画都市である。",
   alt:{q:"筑波研究学園都市（茨城県）は、東京への一極集中を促進するために、首都機能を集約した副都心として構想されたものである。",ans:false},
   ans:true,
   exp:"筑波研究学園都市（1963年閣議決定）：東京圏の過度集中を緩和しつつ学術研究機能を強化するため、茨城県南部に国・大学等の研究機関と住居・商業施設を計画的に整備した科学都市。約300の研究機関が立地。首都機能の集約ではなく分散・研究機能集積が目的。"},
  {subject:"計画",topic:"建築史実例",
   q:"パルテノン神殿（アテネ）は、外周にドリス式の円柱が並ぶ、古代ギリシアを代表するペリプテロス（外柱式）の神殿である。",
   alt:{q:"パルテノン神殿（アテネ）は、外周にドリス式の円柱が並び、クリアストーリーと呼ばれる高窓をとおして神室内に光を取り入れた、古代ギリシアの建築物である。",ans:false},
   ans:true,
   exp:"パルテノン神殿（BC447〜432年、フェイディアス監督・イクティノス設計）は外周に46本のドリス式円柱を持つ外柱式（ペリプテロス）神殿の傑作。クリアストーリー（高窓）は採光のための建築要素だが、これはゴシック大聖堂やバシリカ式教会で発達した手法。パルテノン神殿は扉口からの自然光と内部に設けた開口を用いており、クリアストーリーを持たない。"},
  {subject:"計画",topic:"建築史実例",
   q:"サン・ピエトロ大聖堂（ヴァチカン）は、ブラマンテ・ミケランジェロらが設計に関わったルネサンス・バロック建築の代表作で、大ドームと長大な身廊をもつラテン十字形の平面構成をとる。",
   alt:{q:"サン・ピエトロ大聖堂（ヴァチカン）は、身廊部と袖廊部がともに三廊式であり、内陣には周歩廊と放射状に並ぶ複数の祭室とをもつゴシック建築である。",ans:false},
   ans:true,
   exp:"サン・ピエトロ大聖堂（1506年着工・1626年完成）はブラマンテ（集中式案）・ミケランジェロ（大ドーム設計）・マデルノ（身廊延伸）・ベルニーニ（楕円形広場・天蓋）らが関わったルネサンス・バロックの最高傑作。「周歩廊と放射状祭室をもつ三廊式」はノートルダム・ド・パリ等のゴシック大聖堂の平面構成の特徴。"},
  {subject:"計画",topic:"建築史実例",
   q:"フランクリン街のアパート（パリ）は、オーギュスト・ペレによって設計された集合住宅であり、構造を鉄筋コンクリート造とした初期の集合住宅とされている。",
   alt:{q:"フランクリン街のアパート（パリ）は、ルイス・サリヴァンによって設計された集合住宅であり、構造を鉄筋コンクリート造とした初期の集合住宅とされている。",ans:false},
   ans:true,
   exp:"フランクラン街25番地のアパルトマン（パリ、1903年）はオーギュスト・ペレ（Auguste Perret）設計。RC造の構造フレームを外観に表現した先駆的な集合住宅。ルイス・サリヴァンは「フォーム・フォローズ・ファンクション」で知られるシカゴ派の建築家で設計者ではない。"},
  {subject:"計画",topic:"商業施設実例",
   q:"倉敷アイビースクエア（岡山県）は、明治時代に建設された旧倉敷紡績工場の建屋をホテル・文化施設として改修・再生させたもので、ツタが這う赤レンガの外観が特徴である。",
   alt:{q:"倉敷アイビースクエア（岡山県）は、明治初期に建設された工場を商業施設に改修し、中央に設けたガラス屋根のアトリウムを市民に開放することで、公共性の高い空間を実現したものである。",ans:false},
   ans:true,
   exp:"倉敷アイビースクエア（1974年開館）：旧倉敷紡績所（1889年・明治22年創業）の工場建屋を改修・転用した複合施設。ホテル鶴形・文化施設・記念館等で構成。ツタ（アイビー）が外壁を覆う赤レンガの外観が名称・特徴。ガラス屋根のアトリウムは主要な特徴ではなく、「商業施設への改修」も正確ではない。"},
  {subject:"計画",topic:"公共施設実例",
   q:"目黒区総合庁舎（東京都目黒区）は、民間企業の本社屋として建築された建築物を、耐震補強、設備改修等を行ったうえで、庁舎として再生・転用したものである。",
   alt:{q:"目黒区総合庁舎（東京都目黒区）は、新たに建設された専用庁舎であり、耐震性・機能性を高めた現代的な行政建築の事例である。",ans:false},
   ans:true,
   exp:"目黒区総合庁舎：旧千代田生命保険相互会社本社ビル（村野藤吾設計、1966年竣工）を目黒区が取得し、耐震補強・設備改修等を行って1987年に区の庁舎として転用。既存建物の有効活用と歴史的建築の保全を両立した先駆的な事例。"},
  {subject:"計画",topic:"商業施設実例",
   q:"リンゴット工場再開発計画（イタリア　トリノ）は、フィアット社の巨大な自動車工場をレンゾ・ピアノの設計によりショッピングモール・ホテル・コンサートホール等の複合施設として再生させたものである。",
   alt:{q:"リンゴット工場再開発計画（イタリア　トリノ）は、20世紀初頭に建設された巨大な自動車工場を、現代美術館として保存・再生させたものである。",ans:false},
   ans:true,
   exp:"リンゴット（Lingotto）工場（1923年完成、設計：マッテ＝トルッコ）はフィアット社の自動車工場で屋上試走路が有名。1984年に生産終了後、レンゾ・ピアノの設計（1989年〜）によりショッピングモール・コンサートホール（ジョヴァンニ・アニェリ）・ホテル・展示場等の複合施設として再開発。「現代美術館」単独への転用ではない。"},
 // ── 施工苦手問題フラッシュカード（IMG_3047〜3085）──
 {subject:"施工",topic:"仕上工事",
  q:"ロックウールフェルトの密度は20kg/m³以上のものを使用する。",
  alt:{q:"ロックウールフェルトの密度は10kg/m³以上のものを使用する。",ans:false},
  ans:true,
  exp:"ロックウールフェルトは密度が高いほど断熱・吸音性能が安定する。建築工事監理指針では密度20kg/m³以上のものを使用する。10kg/m³では性能不足となる。"},
 {subject:"施工",topic:"設備工事",
  q:"排水トラップの封水深さは50〜100mmとする。",
  alt:{q:"排水トラップの封水深さは30〜50mmとする。",ans:false},
  ans:true,
  exp:"排水トラップの封水深さは50mm以上100mm以下（5〜10cm）と規定されている。30〜50mmでは封水が薄すぎてサイホン現象や蒸発による破封が起きやすく、臭気・害虫の逆流につながる。"},
 {subject:"施工",topic:"仕上工事",
  q:"軽量鉄骨壁下地のスタッドは、上部ランナーの上端から10mm以内のすき間をあけて差し込む。",
  alt:{q:"軽量鉄骨壁下地のスタッドは、上部ランナーの上端から20mm以内のすき間をあけて差し込む。",ans:false},
  ans:true,
  exp:"JASS 26の規定では、スタッドの上端はランナー上端から10mm以内のすき間を設けて差し込む。これはスラブのたわみ・振動を壁に伝えないためのスライド機構。20mmでは隙間が大きすぎる。"},
 {subject:"施工",topic:"仕上工事",
  q:"軽量鉄骨天井下地において、吊りボルトの間隔は900mm程度とし、端部の吊りボルトは端から150mm以内に取り付ける。",
  alt:{q:"軽量鉄骨天井下地において、吊りボルトの間隔は1,200mm程度とし、端部の吊りボルトは端から300mm以内に取り付ける。",ans:false},
  ans:true,
  exp:"JASS 26では吊りボルト間隔は900mm程度とし、端部では端から150mm以内に取り付ける。1,200mm間隔では野縁受けのたわみが増大し、端部300mmでは端部剛性が不十分となる。"},
 {subject:"施工",topic:"仕上工事",
  q:"軽量鉄骨天井下地において、段違い部の斜め補強は600mm以下の間隔で取り付ける。",
  alt:{q:"軽量鉄骨天井下地において、段違い部の斜め補強は900mm以下の間隔で取り付ける。",ans:false},
  ans:true,
  exp:"JASS 26では段差（段違い）部の斜め補強は600mm以下の間隔で設ける。900mm以下では補強効果が不十分で、段差部の変形や振れが生じやすい。"},
 {subject:"施工",topic:"仕上工事",
  q:"軽量鉄骨天井下地において、吊りボルトのふところが1.5m以上となる場合は、振れ止め補強を設ける。",
  alt:{q:"軽量鉄骨天井下地において、吊りボルトのふところが2.0m以上となる場合は、振れ止め補強を設ける。",ans:false},
  ans:true,
  exp:"JASS 26では吊りボルトのふところ（天井裏の高さ）が1.5m以上の場合に振れ止め補強を設けることが規定されている。2.0mを基準とするのは誤りで、1.5m以上で対応が必要。"},
 {subject:"施工",topic:"設備工事",
  q:"ダクトの吊り金物は、フランジ部分を避けてダクト本体の側面に取り付けた。",
  alt:{q:"ダクトの吊り金物は、ダクトのフランジ部分に取り付けた。",ans:false},
  ans:true,
  exp:"ダクトのフランジ部は継手であり変形しやすい。吊り金物はフランジを避けてダクト本体の側面または底面に取り付けるのが正しい。フランジ部に取り付けると変形・破損のおそれがある。"},
 {subject:"施工",topic:"仕上工事",
  q:"軽量鉄骨天井下地において、野縁のはね出しは150mm以下とした。",
  alt:{q:"軽量鉄骨天井下地において、野縁のはね出しは180mm以下とした。",ans:false},
  ans:true,
  exp:"JASS 26では野縁のはね出し（端部の張り出し長さ）は150mm以下とする。180mmを超えると端部の剛性が確保できず、たわみや振れが生じやすい。"},
 {subject:"施工",topic:"仕上工事",
  q:"網入りガラスの小口の防錆処理は、ガラス全高の1/4の範囲に施す。",
  alt:{q:"網入りガラスの小口の防錆処理は、ガラス全高の1/2の範囲に施す。",ans:false},
  ans:true,
  exp:"JASS 17では網入りガラスの小口（端面）に防錆処理をガラス全高の1/4の範囲に施す。不十分だと網の錆が膨張してガラスが破損する（錆割れ）。1/2まで施す必要はない。"},
 {subject:"施工",topic:"仕上工事",
  q:"ガラスのセッティングブロックは、ガラス下辺の両端から各1/4の位置に設ける。",
  alt:{q:"ガラスのセッティングブロックは、ガラス下辺の両端から各1/3の位置に設ける。",ans:false},
  ans:true,
  exp:"JASS 17では、ガラス重量を支えるセッティングブロックはガラス下辺の両端より各1/4位置（計2箇所）に設ける。1/3位置では荷重分担のバランスが崩れ、サッシ枠への偏荷重や傾きの原因となる。"},
 {subject:"施工",topic:"仕上工事",
  q:"ALCパネルの外壁目地には、貧調合モルタルを充填した。",
  alt:{q:"ALCパネルの外壁目地には、富調合モルタルを充填した。",ans:false},
  ans:true,
  exp:"ALC外壁パネルの目地には、貧調合モルタルまたは弾性シーリング材を使用する。富調合（セメント量の多い）モルタルは乾燥収縮が大きくひび割れを起こしやすく不適切。"},
 {subject:"施工",topic:"仕上工事",
  q:"特定天井の仕様ルートにおいて、天井の単位面積質量が20kg/m²以下であることが要件の一つとなっている。",
  alt:{q:"特定天井の仕様ルートにおいて、天井の単位面積質量が30kg/m²以下であることが要件の一つとなっている。",ans:false},
  ans:true,
  exp:"建築基準法施行令第39条に基づく特定天井の告示（平成25年）では、仕様ルートの要件として単位面積質量20kg/m²以下が定められている。30kg/m²は誤りで、重量が大きいほど地震力が増大し仕様ルートの適用外となる。"},
 {subject:"施工",topic:"仕上工事",
  q:"スウェイ（首振り）方式のカーテンウォールにおいて、スライドホール部分のボルトは手締め程度とした。",
  alt:{q:"スウェイ（首振り）方式のカーテンウォールにおいて、スライドホール部分のボルトは所定のトルクで本締めした。",ans:false},
  ans:true,
  exp:"スウェイ方式のカーテンウォールでは、地震時にパネルが首振り動作できるようスライドホール部のボルトは本締めせず手締め程度とする。本締めするとスライドが拘束され、パネルや躯体に過大な力が生じる。"},
 {subject:"施工",topic:"仕上工事",
  q:"PCカーテンウォールにおいて、地震時の層間変位に追従するにはストーリー（ロッキング）方式を用いる。",
  alt:{q:"PCカーテンウォールのスパンドレルパネル方式は、地震時の層間変位に追従する方式である。",ans:false},
  ans:true,
  exp:"PCカーテンウォールのストーリー（ロッキング）方式は、パネルが揺れに追従して回転することで層間変位を吸収する。スパンドレルパネル方式は縦方向軸力変位（クリープ・温度変形等）への追従が主目的であり、層間変位への追従は別の機構。"},
 {subject:"施工",topic:"仕上工事",
  q:"押出成形セメント板（ECP）の目地幅は、長辺目地で8mm、短辺目地で15mmを標準とする。",
  alt:{q:"押出成形セメント板（ECP）の目地幅は、長辺目地で15mm、短辺目地で8mmを標準とする。",ans:false},
  ans:true,
  exp:"JASS 27ではECPの目地幅は長辺目地8mm・短辺目地15mmを標準とする。短辺目地は層間変位への追従余裕が必要なため長辺より大きくする。長辺と短辺の値を逆に覚えないよう注意。"},
 {subject:"施工",topic:"仕上工事",
  q:"ビニル床シートの熱溶接工法は、接着剤が硬化した後に溶接を行う。",
  alt:{q:"ビニル床シートの熱溶接工法は、接着剤が未硬化の状態で溶接を行う。",ans:false},
  ans:true,
  exp:"ビニル床シートの熱溶接（ウェルディング）は、接着剤が十分に硬化した後、目地部をルーター等で溝掘りし、熱風溶接機でビニル溶接棒を溶かして接合する。未硬化状態では接着剤のはがれや仕上がり不良の原因となる。"},
 {subject:"施工",topic:"仕上工事",
  q:"現場発泡ウレタンフォームの吹付け厚さの許容誤差は0～+10mmとする。",
  alt:{q:"現場発泡ウレタンフォームの吹付け厚さの許容誤差は±10mmとする。",ans:false},
  ans:true,
  exp:"現場発泡ウレタンフォームは吹付けによる施工であり、厚さが規定値を下回ることは断熱・防露性能上許容されないため、厚さの管理許容差は0～+10mm（不足側は認めず、超過側のみ+10mmまで許容）とされている。「±10mm」は不足側も許容することになり誤り。"},
 {subject:"施工",topic:"仕上工事",
  q:"タイル工事の竣工後引張接着強度試験において、引張強さ0.4N/mm²以上かつタイル本体破壊率50%以上を合格基準とする。",
  alt:{q:"タイル工事の竣工後引張接着強度試験において、引張強さ0.6N/mm²以上かつタイル本体破壊率50%以上を合格基準とする。",ans:false},
  ans:true,
  exp:"JASS 19では竣工後の引張接着強度試験の合格基準は0.4N/mm²以上かつタイル本体破壊率50%以上。0.6N/mm²は施工中（張付け後）の中間確認基準値ではなく、竣工時の合格値は0.4N/mm²。"},
 {subject:"施工",topic:"仕上工事",
  q:"外壁乾式工法の石張り工事において、石材の厚さは30mm以上、最大寸法は1,200mm以下、かつ面積は0.8m²以下とする。",
  alt:{q:"外壁乾式工法の石張り工事において、石材の厚さは25mm以上、最大寸法は1,500mm以下、かつ面積は1.0m²以下とする。",ans:false},
  ans:true,
  exp:"建築工事監理指針では外壁乾式石張りの石材は厚さ30mm以上・最大寸法1,200mm以下・面積0.8m²以下と規定。25mm厚は強度不足、1,500mm・1.0m²超は重量増加によるファスナー耐力超過のおそれがある。"},
 {subject:"施工",topic:"仕上工事",
  q:"カーテンウォールの躯体付け金物の取付け許容差は、鉛直方向10mm、水平方向25mmとする。",
  alt:{q:"カーテンウォールの躯体付け金物の取付け許容差は、鉛直方向25mm、水平方向10mmとする。",ans:false},
  ans:true,
  exp:"JASS 14ではカーテンウォール躯体付け金物の取付け精度は鉛直方向±10mm・水平方向±25mm。鉛直方向は層間変位への影響が大きいため精度が厳しい（10mm）。鉛直と水平の値を逆に覚えないよう注意。"},
 {subject:"施工",topic:"仕上工事",
  q:"グリッパー工法によりカーペットを敷き込む場合、幅100mmにつき20N程度の張力をかけて伸長する。",
  alt:{q:"グリッパー工法によりカーペットを敷き込む場合、幅300mmにつき20N程度の張力をかけて伸長する。",ans:false},
  ans:true,
  exp:"JASS 26では、グリッパー工法のカーペット伸長は幅100mmにつき20N程度の張力を伸長用工具（ニーキッカー等）でかけて引き伸ばすとされている。300mmにつき20Nでは単位幅あたりの張力が不足する。"},
 {subject:"施工",topic:"仕上工事",
  q:"防湿フィルムの継目は、下地材のある部分で30mm以上重ね合わせ、その部分を合板・せっこうボード・乾燥木材等で挟みつける。",
  alt:{q:"防湿フィルムの継目は、下地材のある部分で100mm以上重ね合わせ、その部分を合板・せっこうボード・乾燥木材等で挟みつける。",ans:false},
  ans:true,
  exp:"防湿フィルムは連続させて隙間のないように施工し、継目は下地材のある部分で30mm以上重ね合わせて合板等で挟みつける。継目を下地材位置で機械的に固定することで気密・防湿性を確保する。"},
 {subject:"施工",topic:"設備工事",
  q:"横走り配管の吊り金物支持間隔は、ビニル管・耐火二層管・ポリエチレン管の場合、呼び径15〜80では1.0m以下、呼び径100〜300では2.0m以下とする。",
  alt:{q:"横走り配管の吊り金物支持間隔は、ビニル管・耐火二層管・ポリエチレン管の場合、呼び径15〜80では2.0m以下、呼び径100〜300では3.0m以下とする。",ans:false},
  ans:true,
  exp:"建築工事監理指針では横走り配管のビニル管等の吊り金物間隔は呼び径15〜80で1.0m以下、100〜300で2.0m以下と規定。ビニル系は金属管より間隔を小さくする必要がある。2.0m・3.0mは誤りで支持不足となる。"},
 {subject:"施工",topic:"仕上工事",
  q:"とい工事において、硬質ポリ塩化ビニル管を用いた屋外のたてどいのとい受け金物の取付け間隔は、2m程度とする。",
  alt:{q:"とい工事において、硬質ポリ塩化ビニル管を用いた屋外のたてどいのとい受け金物の取付け間隔は、3m程度とする。",ans:false},
  ans:true,
  exp:"建築工事監理指針（とい工事）では屋外のたてどい受け金物の取付け間隔は硬質ポリ塩化ビニル管の場合2m程度とする。3m程度では間隔が広すぎ、たてどいの支持が不十分となる。"},
 {subject:"施工",topic:"仕上工事",
  q:"軽量鉄骨壁下地のランナーは、端部を押さえ、間隔900mm程度に打込みピン等で床・梁下・スラブ下等に固定する。",
  alt:{q:"軽量鉄骨壁下地のランナーは、端部を押さえ、間隔600mm程度に打込みピン等で床・梁下・スラブ下等に固定する。",ans:false},
  ans:true,
  exp:"JASS 26では軽量鉄骨壁下地のランナーは間隔900mm程度で打込みピン等により躯体に固定するのが標準とされている。端部（ランナー端から150mm以内）は必ず固定する。600mm程度は特記のない場合の標準値（900mm程度）とは異なる。"},
 {subject:"施工",topic:"仕上工事",
  q:"銅板葺屋根に取り付ける軒樋は、耐食性を考慮し、銅との電位差が小さい材料（銅製・ステンレス製等）とする。",
  alt:{q:"銅板葺屋根に取り付ける軒樋について、耐候性を考慮し、銅との電位差が大きい溶融亜鉛めっき鋼板製のものとした。",ans:false},
  ans:true,
  exp:"銅板葺屋根の軒樋には電食（ガルバニック腐食）を防ぐため銅との電位差が小さい材料を使用する。溶融亜鉛めっき鋼板（Zn）と銅（Cu）は電位差が大きく電食が進行し、腐食・穴あきの原因となる。"},
 {subject:"施工",topic:"設備工事",
  q:"軽量鉄骨間仕切壁内に配管するPF管（合成樹脂製可とう電線管）のバインド線による支持間隔は、1.5m以下とする。",
  alt:{q:"軽量鉄骨間仕切壁内に配管するPF管（合成樹脂製可とう電線管）のバインド線による支持間隔は、3.0m以下とする。",ans:false},
  ans:true,
  exp:"建築工事監理指針では、PF管を軽量鉄骨間仕切壁内に配管する場合のバインド線による支持間隔は1.5m以下とする。3.0mでは管が弛んで配線引き込みが困難になる。"},
 {subject:"施工",topic:"仕上工事",
  q:"外壁乾式工法の石張り工事において、目地に用いるシーリング材は、特記がない場合ポリサルファイド系またはポリウレタン系とする。",
  alt:{q:"外壁乾式工法の石張り工事において、目地に用いるシーリング材について特記がなかったのでシリコーン系シーリング材を使用した。",ans:false},
  ans:true,
  exp:"外壁乾式石張りの目地にシリコーン系を使用すると、石材（特に多孔質石材）にシリコーン成分が浸透して汚染（黒ずみ・染み）を引き起こすおそれがある。石材目地にはポリサルファイド系・ポリウレタン系を使用するのが原則。"},
 {subject:"施工",topic:"仕上工事",
  q:"鋼板製屋根用折板を使用した屋根工事において、折板のけらば包みは1m程度の間隔で端部用タイトフレームに取り付ける。",
  alt:{q:"鋼板製屋根用折板を使用した屋根工事において、折板のけらば包みは2m程度の間隔で端部用タイトフレームに取り付ける。",ans:false},
  ans:true,
  exp:"建築工事監理指針では折板屋根のけらば包み板は端部用タイトフレームに1m程度の間隔で取り付ける。2m間隔では風圧力に対して固定力が不足し、けらば包みのはがれ・変形が生じやすい。"},
 {subject:"施工",topic:"仮設工事",
  q:"単管足場の壁つなぎは、垂直方向5m以下、水平方向5.5m以下の間隔で取り付ける。",
  alt:{q:"単管足場の壁つなぎは、垂直方向5.5m以下、水平方向5m以下の間隔で取り付ける。",ans:false},
  ans:true,
  exp:"労働安全衛生規則第570条では単管足場の壁つなぎは垂直方向5m以下・水平方向5.5m以下と規定。設問は垂直・水平の数値が入れ替わっており誤り。"},
 {subject:"施工",topic:"仮設工事",
  q:"枠組足場の壁つなぎは、垂直方向9m以下、水平方向8m以下の間隔で取り付ける。",
  alt:{q:"枠組足場の壁つなぎは、垂直方向6m以下、水平方向8m以下の間隔で取り付ける。",ans:false},
  ans:true,
  exp:"労働安全衛生規則第570条では枠組足場（高さ5m未満を除く）の壁つなぎは垂直方向9m以下・水平方向8m以下と規定。単管足場（垂直5m・水平5.5m）より大きな間隔が許容されている。垂直を6mとするのは誤り。"},
 {subject:"施工",topic:"仮設工事",
  q:"切りばり上の通路において、手すりの高さは850mm以上とし中桟を設けるとともに、高さ100mm以上の幅木を設ける。",
  alt:{q:"切りばり上の通路において、手すりの高さは750mm以上とし中桟を設けるとともに、高さ100mm以上の幅木を設ける。",ans:false},
  ans:true,
  exp:"労働安全衛生規則第575条の8では、切りばり上の通路の手すりは高さ850mm以上・中桟を設置し、高さ100mm以上の幅木を設けることを規定。750mmは高さ不足。また床板と床板の隙間は30mm以下とする。"},
 {subject:"施工",topic:"仮設工事",
  q:"防護棚（朝顔）は、1段目を地上から10m以内の高さに設け、2段目以降は下段から10m以内の間隔で設ける。はね出し長さは足場より水平距離で2m以上とする。",
  alt:{q:"防護棚（朝顔）は、1段目を地上から5m以内の高さに設け、2段目以降は下段から10m以内の間隔で設ける。はね出し長さは足場より水平距離で2m以上とする。",ans:false},
  ans:true,
  exp:"防護棚（朝顔）の1段目は地上から10m以内の位置に設け、2段目以降は下段から10m以内の間隔で設置する。はね出し長さは建物から水平距離2m以上。1段目を5mとする規定は誤り。"},
 {subject:"施工",topic:"仮設工事",
  q:"移動式クレーンによる荷の吊り上げ作業において、送電電圧6,600Vの絶縁防護のない配電線からの最小離隔距離は2m以上を確保する。",
  alt:{q:"移動式クレーンによる荷の吊り上げ作業において、送電電圧6,600Vの絶縁防護のない配電線からの最小離隔距離は1m以上を確保する。",ans:false},

  {subject:"環境",topic:"空調設備",

  {subject:"環境",topic:"空調設備",

  {subject:"環境",topic:"給排水衛生設備",

  {subject:"環境",topic:"換気",

  {subject:"環境",topic:"日射・日影・日照",

  {subject:"環境",topic:"音響",

   alt:{q:"複層ガラス（厚さ3mmの単板ガラス2枚と乾燥空気を封入した6mmの中空層からなる。）は、その面密度の合計と同じ面密度をもつ単板ガラス（厚さ6mm）に比べて、一般に、全ての周波数域で遮音性能が向上する。",ans:false},

  {subject:"環境",topic:"音響",

  {subject:"環境",topic:"空調設備",

  {subject:"環境",topic:"換気",

  {subject:"環境",topic:"換気",
   q:"化学処理や実験等に用いられる作業台と排気フードが組み合わされたドラフトチャンバーの排気風量は、作業用開口部の面積と制御風速によって決定される。",
   alt:{q:"化学処理や実験等に用いられる作業台と排気フードが組み合わされたドラフトチャンバーの排気風量は、室の容積と換気回数によって決定される。",ans:false},

  {subject:"環境",topic:"給排水衛生設備",
   q:"潜熱回収型ガス給湯機は、一般に、潜熱回収時に発生する酸性の凝縮水を機器内の中和器で処理し排出する仕組みとなっている。",

  {subject:"環境",topic:"電気輸送設備",

  {subject:"環境",topic:"消火・防災設備",
   q:"スプリンクラー設備の設置が必要なホテルにおいて、床面から天井面までの高さが12mのロビーに、放水型ヘッドを使用したスプリンクラー設備を設置した。",

   ans:true,

  {subject:"環境",topic:"音響",
   q:"NC値とは、室内騒音を評価する指標の一つであり、対象となる騒音のオクターブバンドごとの音圧レベルをNC曲線群上にプロットし、全ての帯域で、あるNC曲線を下回ったときのその曲線値である。",
   alt:{q:"NC値とは、室内騒音を評価する指標の一つであり、対象となる騒音の全帯域を合成したA特性音圧レベルの値そのものである。",ans:false},
   ans:true,

  {subject:"環境",topic:"温熱環境",

  {subject:"環境",topic:"温熱環境",

  {subject:"環境",topic:"空調設備",

   alt:{q:"音響インテンシティレベル（音の強さのレベル）は、音のもつ単位体積当たりの力学的エネルギー量を、基準の力学的エネルギー量で除し、デシベル表示したものである。",ans:false},

  {subject:"環境",topic:"日射・日影・日照",

   alt:{q:"熱線吸収板ガラスは、同じ厚さの透明フロート板ガラスと比べて、室内への日射熱侵入を抑える効果があり、熱貫流率も大幅に小さくなる。",ans:false},

  {subject:"環境",topic:"日射・日影・日照",
   q:"透明フロート板ガラスは、可視光線に比べて、波長の長い赤外線の吸収率が高いため、一般に、日射が当たると室内の温度が上昇する。",
   alt:{q:"透明フロート板ガラスは、可視光線と赤外線の吸収率がほぼ等しいため、日射が当たっても室内の温度上昇にはほとんど影響しない。",ans:false},

  {subject:"環境",topic:"消火・防災設備",

   alt:{q:"第二種排煙は、排気を機械で行う吸引型の排煙方式であり、出火のおそれがある火災室そのものに用いられる。",ans:false},
   ans:true,
   exp:"第二種排煙（加圧防排煙に相当）は機械給気により当該区画を正圧に保ち煙の侵入を押し出す方式で、階段付室・廊下など出火のおそれが少なく煙の侵入防止が求められる空間に用いられる。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"加圧防排煙方式は、機械給気により圧力を高めて煙の侵入を防止する方式であり、階段や付室、共用廊下等の避難上重要な空間に用いられる。",
   alt:{q:"加圧防排煙方式は、機械排気により圧力を下げて煙を吸い出す方式であり、火災室そのものの排煙に用いられる。",ans:false},
   ans:true,
   exp:"加圧防排煙方式は機械給気によって階段・付室・共用廊下等の避難経路となる空間を正圧に維持し、煙の侵入を防止する方式である。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"自然排煙方式は、空間の上部に排煙口を設けて発生した煙を外部に排出する方式であり、その効率は排気を行う開口部の位置及び面積だけでなく、給気の経路にも影響される。",
   alt:{q:"自然排煙方式は、空間の上部に排煙口を設けて発生した煙を外部に排出する方式であり、その効率は給気の経路によらず、排気を行う開口部の位置及び面積で決まる。",ans:false},
   ans:true,
   exp:"自然排煙は温度差による浮力を利用して煙を排出するため、排気口（排煙口）の位置・面積だけでなく、給気経路（給気口の位置・面積）の確保が不十分だと有効な排煙ができない。給気経路によらないとするのは誤り。"},
  {subject:"環境",topic:"採光",
   q:"CIE標準曇天空下では、鉛直面照度は方位（向き）によらずほぼ同じ値となる。",
   alt:{q:"CIE標準曇天空下では、西向きの壁面の鉛直面照度よりも、南向きの壁面の鉛直面照度のほうが低くなる。",ans:false},
   ans:true,

  {subject:"環境",topic:"採光",

   ans:true,
   exp:"昼光率＝室内のある点の照度／全天空照度×100（%）で定義される比率であり、天空の輝度分布が一様であれば、全天空照度が変化しても室内照度も同じ割合で変化するため、昼光率自体は全天空照度の大小に影響されない。"},
  {subject:"環境",topic:"色彩",

  {subject:"環境",topic:"音響",
   q:"孔あき板と剛壁との間に空気層を設けた吸音構造（共鳴器型吸音構造）において、空気層の厚みを2倍にすると、共鳴周波数は1/√2倍になる。",
   alt:{q:"孔あき板と剛壁との間に空気層を設けた吸音構造（共鳴器型吸音構造）において、空気層の厚みを2倍にすると、共鳴周波数は1/2倍になる。",ans:false},

   exp:"共鳴器型吸音構造（ヘルムホルツ共鳴器）の共鳴周波数fは、背後空気層の厚さDの平方根に反比例する（f∝1/√D）。空気層厚さを2倍にすると、共鳴周波数は1/√2倍となる。1/2倍ではない。"},
  {subject:"環境",topic:"音響",
   q:"内装材の吸音率が室内で一様な直方体の室において、その室の平面寸法は変えずに天井の高さを1/2倍にすると、残響時間は一般に1/2倍になるとは限らない。",
   alt:{q:"内装材の吸音率が室内で一様な直方体の室において、その室の平面寸法は変えずに天井の高さを1/2倍にすると、残響時間は1/2倍になる。",ans:false},
   ans:true,
   exp:"残響時間T＝0.161V/A（V：室容積、A：総吸音力）。平面寸法を変えず高さのみ1/2倍にすると、容積Vは1/2倍になるが、壁面積のみが1/2倍になり床・天井面積は変わらないため総吸音力Aの減少率は容積の減少率と一致しない。したがって残響時間は一般に単純な1/2倍にはならない。"},
  {subject:"環境",topic:"空調設備",
   q:"デシカント空調システムにおいて、冷温水コイルは予冷、予熱を行うものであり、予冷することで、デシカントローターの除湿性能を上げることができる。",

  {subject:"環境",topic:"空調設備",
   q:"デシカントローターは、除湿剤による吸湿を行うものであり、除湿剤の種類（シリカゲル系、ゼオライト系等）により、それぞれ再生温度が異なる。",
   alt:{q:"デシカントローターは、除湿剤による吸湿を行うものであり、除湿剤の種類にかかわらず、再生温度は常に一定である。",ans:false},
   ans:true,
   exp:"デシカントローターに用いる除湿剤（シリカゲル系、ゼオライト系等）は、それぞれ吸着特性が異なり、再生（吸着した水分を放出させる）に必要な温度も種類ごとに異なる。"},
  {subject:"環境",topic:"空調設備",

  {subject:"環境",topic:"空調設備",
   q:"デシカント空調システムにおける加湿器は、冬期において加湿を行うものであり、デシカントローターを使用して還気より回収した湿分だけでは室内の湿度が目標値に達しない場合に稼働する。",
   alt:{q:"デシカント空調システムにおける加湿器は、夏期の除湿不足を補うために稼働するものであり、冬期には使用しない。",ans:false},
   ans:true,

  {subject:"環境",topic:"消火・防災設備",
   q:"排煙ファンに接続された排煙主ダクト（竪ダクト）が各階の床を貫通する部分には、排煙機能を妨げないよう、原則として防火ダンパー（FD）を設けない。",
   alt:{q:"排煙ファンに接続された排煙主ダクト（竪ダクト）が各階の床を貫通する部分に、防火ダンパー（FD）を設けた。",ans:false},

  {subject:"環境",topic:"空調設備",

  {subject:"環境",topic:"空調設備",
   q:"井水を熱源水とする水熱源ヒートポンプは、一般に、熱源水の温度が冷房時には外気温度よりも低く、暖房時には外気温度よりも高いので、空気熱源ヒートポンプに比べてCOPが高い。",
   alt:{q:"井水を熱源水とする水熱源ヒートポンプは、一般に、熱源水の温度が冷房時には外気温度よりも高く、暖房時には外気温度よりも低いので、空気熱源ヒートポンプに比べてCOPが低い。",ans:false},
   ans:true,
   exp:"井水（地下水）は年間を通じて温度がほぼ一定（15℃前後）であり、夏期は外気より低く、冬期は外気より高い。これにより水熱源ヒートポンプは、外気温度の影響を受けやすい空気熱源ヒートポンプに比べてCOPが高くなる。"},
  {subject:"環境",topic:"給排水衛生設備",

  {subject:"環境",topic:"電気輸送設備",
   q:"太陽電池モジュールは、一部のセルに影が当たると発電能力が低下するだけではなく、ホットスポットが生じるおそれがあり、その対策の一つとして、バイパスダイオードの設置がある。",
   alt:{q:"太陽電池モジュールは、一部のセルに影が当たっても発電能力やホットスポットの発生には影響がないため、特段の対策は不要である。",ans:false},

  {subject:"環境",topic:"電気輸送設備",
   q:"外部雷保護システムは、保護レベルに応じて、保護角法、回転球体法、メッシュ法のいずれかを選択し、重要度の高い建築物は保護レベルⅠで計画する。",
   alt:{q:"外部雷保護システムは、保護レベルに応じて、保護角法、回転球体法、メッシュ法のいずれかを選択し、重要度の高い建築物は保護レベルⅣで計画する。",ans:false},
   ans:true,
   exp:"外部雷保護システムの保護レベルはⅠ〜Ⅳに区分され、Ⅰが最も保護効果の高い（厳しい）レベルである。重要度の高い建築物ほど高い保護効果が求められるため保護レベルⅠを採用する。レベルⅣは最も緩やかな基準であり誤り。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"避難口誘導灯は、避難口の位置を明示するものであり、表示面の縦寸法及び表示面の明るさ等により、A級、B級、C級に区分される。",
   alt:{q:"避難口誘導灯は、避難口の位置を明示するものであり、停電時においても点灯が継続可能な時間（予備電源の最低容量）により、A級、B級、C級に区分される。",ans:false},
   ans:true,
   exp:"避難口誘導灯のA級・B級・C級の区分は、表示面の縦寸法及び表示面の明るさ（表示灯の光度等）による区分であり、予備電源の点灯継続時間による区分ではない。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"非常コンセント設備は、消防隊が有効に消火活動を行えるよう、単相交流100V、15A以上の電気を供給できるものとする。",
   alt:{q:"非常コンセント設備は、消防隊が有効に消火活動を行えるよう、単相交流200V、5A以上の電気を供給できるものとする。",ans:false},
   ans:true,
   exp:"消防法施行令第29条の2により、非常コンセント設備は単相交流100V、15A以上の電気を供給できるものとしなければならない。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"開放型スプリンクラー設備は、火災の際、一斉開放弁を開くことにより、放水区域内の全てのスプリンクラーヘッドから散水する設備である。",
   alt:{q:"開放型スプリンクラー設備は、火災の際、感知したヘッドのみが個別に開放して散水する設備であり、一斉開放弁は用いない。",ans:false},
   ans:true,
   exp:"開放型スプリンクラー設備は、あらかじめヘッドを開放状態にしておき、火災感知に応じて一斉開放弁を作動させることで、当該放水区域内の全ヘッドから一斉に散水する方式。舞台部等、燃え広がりの早い空間に用いられる。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"粉末消火設備は、炭酸水素ナトリウム等の粉末を使用した負触媒効果により消火するものであり、航空機の格納庫や寒冷地の駐車場等に適している。",
   alt:{q:"粉末消火設備は、水を主成分とした薬剤により冷却効果で消火するものであり、精密機器室や電気室等の水損を避けたい場所に適している。",ans:false},
   ans:true,
   exp:"粉末消火設備は炭酸水素ナトリウム等の消火粉末による負触媒効果（燃焼の連鎖反応抑制）で消火する設備。低温でも凍結の心配がなく即効性があるため、航空機格納庫や寒冷地の駐車場等に適する。"},
  {subject:"環境",topic:"消火・防災設備",
   q:"消防用水は、公設消防隊が消防ポンプ車によって水を吸い上げ、消火活動に使用する水源であり、建築物の1階及び2階の床面積の合計に耐火建築物等の建築物の区分に応じた係数を乗じた値を基準として必要貯水量が定められる。",
   alt:{q:"消防用水は、公設消防隊が消防ポンプ車によって水を吸い上げ、消火活動に使用する水源であり、敷地面積に耐火建築物等の建築物の区分に応じた係数を乗じた値が必要貯水量となる。",ans:false},
   ans:true,
   exp:"消防法施行令第27条により、消防用水の必要貯水量は「敷地面積」ではなく「建築物の1階及び2階の部分の床面積の合計」に、耐火建築物・準耐火建築物・その他の建築物の区分に応じた係数を乗じて算定する。"},
  {subject:"環境",topic:"電気輸送設備",
   q:"エスカレーターの落下防止のため、エスカレーターの一端を梁等の支持材に堅固に固定し、他端は非固定とした場合の非固定部分は、一般に、隙間及びかかり代長さを確保する。",
   alt:{q:"エスカレーターの落下防止のため、エスカレーターの一端を梁等の支持材に堅固に固定し、他端についても同様に堅固に固定し、隙間やかかり代は設けなかった。",ans:false},
   ans:true,
   exp:"エスカレーターは地震時の躯体変形に追従できるよう、一端を固定端、他端を可動端（非固定）とし、可動端側には地震時の相対変位を吸収するための隙間及び十分なかかり代長さを確保する。両端を堅固に固定すると躯体変形時にエスカレーター本体が破損するおそれがある。"},
  {subject:"環境",topic:"温熱環境",
   q:"エンボディドカーボンは、建物の生涯を通して排出されるカーボン（ホールライフカーボン）のうち、建物の新築、改修、解体時に発生するカーボンのことである。",
   alt:{q:"エンボディドカーボンは、建物の生涯を通して排出されるカーボン（ホールライフカーボン）のうち、建物の運用時（使用時）のエネルギー消費により発生するカーボンのことである。",ans:false},
   ans:true,
   exp:"ホールライフカーボン（建物の生涯を通じたCO2排出量）は、運用時のエネルギー消費による「オペレーショナルカーボン」と、新築・改修・解体時の資材製造や施工等に伴う「エンボディドカーボン」に大別される。運用時のエネルギー消費によるものはオペレーショナルカーボンであり、エンボディドカーボンではない。"},
  {subject:"環境",topic:"温熱環境",
   q:"「住宅の品質確保の促進等に関する法律」に基づく「日本住宅性能表示基準」に規定される「一次エネルギー消費量等級」の「等級4」は、「建築物のエネルギー消費性能の向上等に関する法律」の住宅の省エネルギー基準における基準値相当の省エネルギー性能であることを示す。",
   alt:{q:"「住宅の品質確保の促進等に関する法律」に基づく「日本住宅性能表示基準」に規定される「一次エネルギー消費量等級」の「等級4」は、ZEB相当の極めて高い省エネルギー性能であることを示す。",ans:false},
   ans:true,
   exp:"日本住宅性能表示基準の一次エネルギー消費量等級は等級1〜6まであり、「等級4」は建築物省エネ法の住宅省エネルギー基準における基準値相当の性能を示す水準とされている。より上位の等級5・6はそれを上回る性能を示す。"},
  {subject:"環境",topic:"伝熱・結露",
   q:"「建築物のエネルギー消費性能の向上等に関する法律」の住宅の省エネルギー基準における外皮性能基準では、外皮平均熱貫流率及び冷房期の平均日射熱取得率を地域区分別に規定された値以下とすることが求められる。",
   alt:{q:"「建築物のエネルギー消費性能の向上等に関する法律」の住宅の省エネルギー基準における外皮性能基準では、外皮平均熱貫流率及び冷房期の平均日射熱取得率を地域区分別に規定された値以上とすることが求められる。",ans:false},
   ans:true,
   exp:"住宅の外皮性能基準は、外皮平均熱貫流率（UA値）及び冷房期の平均日射熱取得率（ηAC値）を、地域区分ごとに定められた基準値以下とすることが求められる。暖房期は日射熱取得がむしろ暖房負荷の低減に寄与するため規制対象ではない。「以上」とすると断熱・日射遮蔽性能の低い住宅でも基準を満たすことになり、規定の趣旨と逆になるため誤り。"},

  {subject:"計画",topic:"建築基本計画",
   q:"フェーズフリーデザインは、日常時と非常時に境目を設けず、平常時から使い慣れた製品やサービスが災害時にも役立つよう設計する考え方であり、防災の新しいアプローチとして広く普及している。",
   alt:{q:"フェーズフリーデザインは、障害の有無、年齢や性別、体型、出身、身体や認知機能等の差によらず、できるだけ安全かつ便利に利用しやすいようにあらかじめ配慮されたものであり、公共施設等の整備の理念として広く普及している。",ans:false},
   ans:true,
   exp:"フェーズフリーは「日常時」と「非常時」の垣根をなくし、平常時に使うものやサービスが災害時にもそのまま役立つようにする考え方。「障害の有無・年齢・性別等によらず誰もが利用しやすいように配慮する」という説明はユニバーサルデザインの定義であり、フェーズフリーの説明としては誤り。"},
  {subject:"計画",topic:"建築史",
   q:"慈照寺東求堂同仁斎（京都府）は、現存最古とされる違い棚と付書院をもつ、書院造の例である。",

  {subject:"計画",topic:"建築基本計画",
   q:"外壁をタイル仕上げとするに当たり、寒冷地で使用することから、Ⅲ類（陶器質に相当）からⅠ類（磁器質に相当）に変更した。",
   alt:{q:"外壁をタイル仕上げとするに当たり、寒冷地で使用することから、Ⅰ類（磁器質に相当）からⅢ類（陶器質に相当）に変更した。",ans:false},
   ans:true,
   exp:"寒冷地では凍害（吸水した水分の凍結膨張によるタイルの破損）を防ぐため、吸水率の低いⅠ類（磁器質相当）のタイルを用いる必要がある。吸水率の高いⅢ類（陶器質相当）へ変更するのは凍害のリスクを高めるため不適切。"},
  {subject:"計画",topic:"建築基本計画",
   q:"「減価償却資産の耐用年数等に関する省令」により、減価償却期間の算定に用いる法定耐用年数が定められているが、これは会計上の償却計算のための年数であり、建築物を居住用途として使用できる期間を規定するものではない。",
   alt:{q:"「減価償却資産の耐用年数等に関する省令」により、減価償却期間の算定に用いる法定耐用年数が定められており、これにより、建築物を居住用途として使用できる期間が規定されている。",ans:false},
   ans:true,
   exp:"法定耐用年数は税務上の減価償却計算に用いる会計上の年数であり、建築物の物理的・機能的な使用可能期間（実際に居住可能な期間）を規定するものではない。適切な維持管理により法定耐用年数を超えて使用できる建築物も多い。"},
  {subject:"計画",topic:"建築基本計画",
   q:"オイルステインは、木材に浸透する塗料であり塗膜を形成しないため、木目を生かしたい木材の仕上げ等に用いられる。",
   alt:{q:"オイルステインは、木材に塗膜を形成し、耐久性を向上させることができるので、木材を使用した外壁等に用いられる。",ans:false},
   ans:true,
   exp:"オイルステインは木材の内部に浸透して着色する塗料であり、表面に塗膜を形成しない。塗膜を形成しないため耐久性向上の効果は限定的であり、主に木目を生かした着色仕上げに用いられる。"},
  {subject:"計画",topic:"高齢者・障害者",
   q:"乳幼児用おむつ交換台は、壁面と直交する方向の利用を想定した壁取り付け方式を採用したので、引出し寸法（奥行寸法）を600mm以上とした。",
   alt:{q:"乳幼児用おむつ交換台は、壁面と直交する方向の利用を想定した壁取り付け方式を採用したので、引出し寸法（奥行寸法）を500mmとした。",ans:false},
   ans:true,
   exp:"「高齢者、障害者等の円滑な移動等に配慮した建築設計標準」では、壁取り付け方式の乳幼児用おむつ交換台の引出し寸法（奥行寸法）は600mm以上を確保することが求められている。500mmでは乳幼児を安全に寝かせるスペースとして不足する。"},
  {subject:"計画",topic:"高齢者・障害者",
   q:"腰掛け便器の便房内の操作部は、視覚障害者が識別しやすいよう、紙巻器の直上に洗浄ボタンを設け、呼出しボタンを洗浄ボタンと同じ高さで腰掛け便器の後方側に200mm離した位置に配置した。",
   alt:{q:"腰掛け便器の便房内の操作部は、洗浄ボタンと呼出しボタンを近接させると誤操作の原因となるため、洗浄ボタンと呼出しボタンの高さを大きく変え、水平方向にも500mm程度離して配置した。",ans:false},
   ans:true,
   exp:"視覚障害者が紙巻器の位置を手がかりに洗浄ボタンを識別できるよう紙巻器の直上に洗浄ボタンを設け、呼出しボタンは洗浄ボタンと誤認しないよう同じ高さで200mm程度離した位置に配置することが標準とされる。"},
  {subject:"計画",topic:"都市計画・住宅地計画史",
   q:"C.A.ペリーの「近隣住区理論」は、小学校を中心として住区の規模や施設配置の原則を示した理論である。",
   alt:{q:"C.A.ペリーの「近隣住区理論」は、都市と田園の利点をあわせもつ自立した小都市を計画する理論であり、その理論に基づいて、レッチワース（イギリス）などが計画された。",ans:false},
   ans:true,
   exp:"「都市と田園の利点をあわせもつ自立した小都市」を計画する理論はエベネザー・ハワードの「田園都市（Garden City）論」であり、レッチワースはこの田園都市論に基づいて計画された。C.A.ペリーの近隣住区理論は、小学校を中心とした住区単位の計画原則を示すもので、レッチワースの計画根拠とは別の概念。両者を混同するのは誤り。"},
  {subject:"計画",topic:"都市計画・住宅地計画",
   q:"都市計画法に基づく「地区計画」は、地区の課題や特徴を踏まえ、住民と市町村とが連携しながら、地区の目指すべき将来像を設定し、その実現に向けてまちづくりを進めていく地区である。",
   alt:{q:"都市計画法に基づく「高度利用地区」は、地区の課題や特徴を踏まえ、住民と市町村とが連携しながら、地区の目指すべき将来像を設定し、その実現に向けてまちづくりを進めていく地区である。",ans:false},
   ans:true,
   exp:"住民と市町村が連携して地区の将来像を設定しまちづくりを進める制度は「地区計画」の説明である。「高度利用地区」は容積率の最高・最低限度、建蔽率の最高限度、建築面積の最低限度、壁面位置の制限等を都市計画に定める、性質の異なる制度であり、混同してはならない。"},
  {subject:"計画",topic:"高齢者・障害者",
   q:"サービス付き高齢者向け住宅は、バリアフリー構造を有し、安否確認サービスや生活相談サービスの提供により、高齢者が安心して暮らすことができる住宅であり、高齢期の居住の安定の確保に寄与している。",
   alt:{q:"サービス付き高齢者向け住宅は、バリアフリー構造を有し、介護・医療と連携してリハビリテーションサービスを受けながら暮らすことで、家庭への復帰を目指すケア付きの住宅であり、高齢期の居住の安定の確保に寄与している。",ans:false},
   ans:true,
   exp:"サービス付き高齢者向け住宅（サ高住）の必須サービスは「安否確認」と「生活相談」。「リハビリを受けながら家庭への復帰を目指す」のは介護老人保健施設（老健）の目的であり、サ高住は在宅生活を前提とした高齢者向け賃貸住宅である。"},
  {subject:"計画",topic:"公共建築",

   alt:{q:"公民館において、避難所としての利用を想定し、マンホールトイレを避難時の居住エリアから離れた人目につきにくい場所に設置できる計画とした。",ans:false},
   ans:true,
   exp:"マンホールトイレは避難生活中に頻繁に利用される設備であるため、夜間の移動負担や防犯面を考慮し、避難者がアクセスしやすい居住エリアに近い場所に設置することが望ましい。居住エリアから離れた人目につきにくい場所に設置するのは利用上不適切。"},

  {subject:"計画",topic:"公共建築",

   alt:{q:"総合病院の産科部門は、LDR（Labor Delivery Recovery）を採用し、陣痛・分娩・回復という出産の過程に応じて、専用の部屋をそれぞれ設けた。",ans:false},

  {subject:"計画",topic:"商業施設",
   q:"大規模店舗において、竣工後に短期間で容易にテナントの入れ替えや区画変更ができるよう、汎用性の高い検証法（ルートA・ルートB等）による全館避難安全検証法の性能設計を行った。",

  {subject:"環境",topic:"給排水衛生設備",

  {subject:"環境",topic:"空調設備",

  {"subject":"施工","topic":"施工業務","q":"特記とは、標準仕様書と異なる事項や標準仕様書に含まれていない事項について、設計図書のうち、質問回答書、現場説明書、特記仕様書及び図面において指定された事項をいう。","alt":{"q":"特記とは、標準仕様書と異なる事項や標準仕様書に含まれていない事項について、現場代理人が独自の判断で指定した事項をいい、設計図書への記載は必要としない。","ans":false},"ans":true,"exp":"特記事項は設計図書（質問回答書・現場説明書・特記仕様書・図面）において指定された事項をいい、現場代理人が独自に定められるものではない。"},

  {"subject":"施工","topic":"基礎・地業工事","q":"工事現場に仮置きする既製コンクリート杭については、仮置きするための場所が狭かったので、所定の措置を講じたうえで、同径のものを平置きで2段まで積み重ねる計画とした。","alt":{"q":"工事現場に仮置きする既製コンクリート杭については、仮置きするための場所が狭かったので、所定の措置を講じたうえで、異径のものを混在させて平置きで4段まで積み重ねる計画とした。","ans":false},"ans":true,"exp":"既製コンクリート杭の仮置きは、同径のものをまとめ、くさび等で転動防止措置を講じたうえで、平置き2段程度までとするのが一般的。"},
  {"subject":"施工","topic":"仮設工事","q":"単管足場の壁つなぎの設置間隔を、垂直方向5.5m、水平方向5.0mとし、地上第一の布が地上より2.0mの位置に設けられていることを確認した。","alt":{"q":"単管足場の壁つなぎの設置間隔を、垂直方向5.0m以下、水平方向5.5m以下とし、地上第一の布が地上より2.0m以下の位置に設けられていることを確認した。","ans":true},"ans":false,"exp":"単管足場の壁つなぎ間隔は垂直方向5.0m以下・水平方向5.5m以下が基準（労安則）。設問は垂直・水平の数値が逆で誤り。"},

  {"subject":"施工","topic":"仮設工事","q":"単管パイプを用いて床面開口部の周囲に設ける仮設の手摺すりについては、高さを90cmとし、物体落下防止として高さ10cmの幅木を設け、墜落防止として床から50cmの位置に中桟を取り付けた。","alt":{"q":"単管パイプを用いて床面開口部の周囲に設ける仮設の手摺すりについては、高さを60cmとし、物体落下防止の幅木は設けず、中桟も省略した。","ans":false},"ans":true,"exp":"仮設手すりは高さ85cm以上（概ね90cm）、幅木高さ10cm程度、中桟は床から35〜50cm程度の位置に設けるのが標準。"},
  {"subject":"施工","topic":"基礎・地業工事","q":"セメントミルク工法による既製コンクリート杭工事において、建込み後の杭については、保持治具を用いて杭心に合わせて保持し、7日間養生を行った。","alt":{"q":"セメントミルク工法による既製コンクリート杭工事において、建込み後の杭については、保持治具を用いず自立させたまま、養生を行わずに後続作業を行った。","ans":false},"ans":true,"exp":"セメントミルク工法では、杭の建込み後、根固め液が所要の強度を発現するまで保持治具等で杭心・鉛直精度を保持して養生する。"},

  {"subject":"施工","topic":"鉄筋工事","q":"大梁の主筋の定着に当たり、所定のフックあり定着の長さを確保することができなかったので、大梁の主筋を柱仕口内に90度縦に折り曲げて定着することとし、柱仕口面から大梁の主筋の鉄筋外面までの投影定着長さを柱せいの3/4とした。","alt":{"q":"大梁の主筋の定着に当たり、所定のフックあり定着の長さを確保することができなかったので、大梁の主筋を柱仕口内に90度縦に折り曲げて定着することとし、柱仕口面から大梁の主筋の鉄筋外面までの投影定着長さを柱せいの1/4とした。","ans":false},"ans":true,"exp":"柱内への90度折曲げ定着の場合、投影定着長さは柱せいの3/4以上を確保する必要がある（RC規準）。"},

  {"subject":"施工","topic":"コンクリート工事","q":"軽量コンクリートのポンプ圧送中のスランプロス（スランプ低下）を抑制するために、人工軽量骨材はあらかじめ十分に乾燥させたものを使用した。","alt":{"q":"軽量コンクリートのポンプ圧送中のスランプロス（スランプ低下）を抑制するために、人工軽量骨材はあらかじめ十分に吸水させたものを使用した。","ans":true},"ans":false,"exp":"人工軽量骨材が乾燥していると、圧送中に骨材が水分を吸収してスランプロスが大きくなる。あらかじめプレウェッティング（十分吸水）させて使用する。"},
  {"subject":"施工","topic":"コンクリート工事","q":"プレキャスト部材の製造については、部材の大型化や輸送費の低減を図るために、工事現場に仮設の製造設備や品質管理体制を整え、第三者機関の認定を取得した仮設工場で行う計画とした。","alt":{"q":"プレキャスト部材の製造については、部材の大型化や輸送費の低減を図るために、工事現場に仮設の製造設備を整え、品質管理体制や第三者機関による認定を受けないまま製造する計画とした。","ans":false},"ans":true,"exp":"現場に仮設工場を設けてプレキャスト部材を製造する場合も、工場製品と同等の品質管理体制を整え、第三者機関の認定を取得することが求められる。"},
  {"subject":"施工","topic":"コンクリート工事","q":"プレキャスト部材に用いるコンクリートの空気量は、特記がなく、凍結融解作用を受けるおそれもなかったので、目標値を3.0%とした。","alt":{"q":"プレキャスト部材に用いるコンクリートの空気量は、特記がなく、凍結融解作用を受けるおそれがあったので、目標値を3.0%とした。","ans":false},"ans":true,"exp":"コンクリートの空気量の目標値は、凍結融解作用を受けるおそれがない場合は3.0%程度、受けるおそれがある場合は4.5%程度とするのが一般的。凍結融解のおそれがあるのに3.0%とするのは不適切。"},
  {"subject":"施工","topic":"コンクリート工事","q":"工事現場において、プレキャスト部材のエンクローズ溶接継手については、溶接後の鉄筋の残留応力が過大とならないように、同一接合部の鉄筋の溶接作業は間隔を空けて行った。","alt":{"q":"工事現場において、プレキャスト部材のエンクローズ溶接継手については、溶接後の鉄筋の残留応力が過大とならないように、同一接合部の鉄筋の溶接作業は連続して行った。","ans":true},"ans":false,"exp":"エンクローズ溶接継手は、入熱や冷却の管理上、同一接合部内の鉄筋の溶接作業を連続して行うのが標準。間隔を空けると冷却によるひずみ・残留応力の管理が難しくなる。"},
