   alt:{q:"喫煙室において、非喫煙場所との境界の開口部における気流の風速は、喫煙室に向かって0.1m/s以上とした。",ans:false},
   ans:true,
   exp:"職場の受動喫煙防止対策に関する指針（厚生労働省）および労働安全衛生法に基づく喫煙室の設計基準では、喫煙室の開口部（出入口）における気流速度は喫煙室方向に向かって0.2m/s以上とすることが要件。0.1m/sでは煙の逆流防止に不十分。"},
  {subject:"環境",topic:"給排水設備",
   q:"雨水排水管と汚水排水管とを別系統で配管した建築物において、公共下水道が合流式であったことから、雨水排水と汚水排水とを屋外の排水ますで同一系統とした。",
   alt:{q:"雨水排水管と汚水排水管とを別系統で配管した建築物において、公共下水道が合流式であっても、敷地内の排水は雨水・汚水を別系統のまま公共下水道に接続しなければならない。",ans:false},
   ans:true,
   exp:"公共下水道が合流式（雨水・汚水を同一管で流す方式）の地域では、建物内で別系統の雨水管と汚水管を屋外の排水ますで合流させ、合流式下水道に接続することが適切。分流式下水道では雨水を下水道に直接接続できない場合がある。"},
  {subject:"環境",topic:"給排水設備",
   q:"公共下水道が合流式である地域においては、害虫や臭気等の侵入防止を目的として、雨水排水はトラップますを介して一般排水系統の敷地排水管に接続する。",
   alt:{q:"公共下水道が合流式である地域においては、雨水排水は臭気・害虫の侵入リスクがないため、トラップなしで直接公共下水道に接続することができる。",ans:false},
   ans:true,
   exp:"合流式下水道に接続する雨水排水管は、下水道管内の臭気・害虫が逆流することがあるため、トラップます（Uトラップ等）を介して敷地排水管に接続し、侵入を防止する。トラップなし直接接続では室内に下水臭・害虫が侵入するリスクがある。"},
  {subject:"環境",topic:"給排水設備",
   q:"管径200mmの敷地排水管の排水ますは、起点、屈曲点、合流箇所、ますの間隔が40m以内となるような位置等に設ける。",
   alt:{q:"管径200mmの敷地排水管の排水ますは、起点、屈曲点、合流箇所、ますの間隔が25m以内となるような位置等に設ける。",ans:false},
   ans:true,
   exp:"空気調和・衛生工学会基準等による排水ます（インスペクションチェンバー）の設置間隔の目安：管径100mm以下15m以内、管径150mm以下30m以内、管径200mm以下45m以内。40mは45m以内の基準を満足する適切な設計値。25mは過剰に短い。"},
  {subject:"環境",topic:"給排水設備",
   q:"上水系統の受水槽の水抜き管とオーバーフロー管は、いずれも十分な排水口空間を介して排水管等への間接排水とする。",
   alt:{q:"上水系統の受水槽の水抜き管は直接排水としてよく、オーバーフロー管のみ十分な排水口空間を介した間接排水とする。",ans:false},
   ans:true,
   exp:"受水槽の水抜き管・オーバーフロー管はいずれも排水管への直接接続（クロスコネクション）を禁止し、排水口空間（エアギャップ）を設けた間接排水とする。水抜き管・OFLパイプともに排水管内の汚水・臭気が逆流して上水を汚染するのを防ぐためである。"},
  {subject:"環境",topic:"電気設備",
   q:"コージェネレーションシステムに使用される発電機の発電効率は、一般に、ガスタービンに比べてガスエンジンのほうが高い。",
   alt:{q:"コージェネレーションシステムに使用される発電機の発電効率は、一般に、ガスエンジンに比べてガスタービンのほうが高い。",ans:false},
   ans:true,
   exp:"発電効率の比較：ガスエンジン（内燃機関）は30〜40%程度、ガスタービン（外燃機関）は20〜35%程度。ガスエンジンのほうが発電効率が高い。ただし、ガスタービンは排熱温度が高く排熱利用効率（熱電比）が高い特徴があり、用途によって使い分ける。"},
  {subject:"環境",topic:"電気設備",
   q:"太陽光発電システムの構成要素の一つであるパワーコンディショナは、インバータ及び系統連系保護装置が組み合わされたものである。",
   alt:{q:"太陽光発電システムの構成要素の一つであるパワーコンディショナは、インバータ、系統連系保護装置及び蓄電池が組み合わされたものである。",ans:false},
   ans:true,
   exp:"パワーコンディショナ（PCS）の基本構成：①インバータ（DC→AC変換）＋②系統連系保護装置（単独運転防止・過電圧・過電流保護等）。蓄電池はパワコンとは別の機器（蓄電システム）であり、標準的なパワコンには含まれない。蓄電池内蔵のハイブリッドパワコンは別製品。"},
  {subject:"環境",topic:"電気設備",
   q:"力率は、交流回路に電力を供給する際における、「有効電力」を「皮相電力」で除したものである。",
   alt:{q:"力率は、交流回路に電力を供給する際における、「皮相電力」を「有効電力」で除したものである。",ans:false},
   ans:true,
   exp:"力率（Power Factor）＝有効電力（W）÷皮相電力（VA）＝cosθ。皮相電力は有効電力と無効電力の合成（√(P²+Q²)）。力率が高い（1に近い）ほど電力を効率よく利用している。「皮相電力÷有効電力」は逆数であり誤り。"},
  {subject:"環境",topic:"電気設備",
   q:"需要率は、ある電力系統における、「接続された負荷の最大需要電力」を「負荷設備容量の総和」で除したものである。",
   alt:{q:"需要率は、ある電力系統における、「負荷設備容量の総和」を「接続された負荷の最大需要電力」で除したものである。",ans:false},
   ans:true,
   exp:"需要率＝最大需要電力（kW）÷負荷設備容量の総和（kW）≤1.0。すべての設備が同時に定格運転されることはないため、需要率は通常1未満。「設備容量÷最大需要電力」は逆数（不等率に近い概念）であり誤り。"},
  {subject:"環境",topic:"電気設備",
   q:"負荷率は、ある期間における、「平均需要電力」を「最大需要電力」で除したものである。",
   alt:{q:"負荷率は、ある期間における、「最大需要電力」を「平均需要電力」で除したものである。",ans:false},
   ans:true,
   exp:"負荷率＝平均需要電力÷最大需要電力（≤1.0）。負荷率が高いほど電力消費が平均化されており電力設備を効率よく利用していることを示す。「最大需要電力÷平均需要電力」は逆数（≥1.0）となり定義と逆。"},
  {subject:"環境",topic:"電気設備",
   q:"不等率は、「ある系統に接続されている個々の負荷の最大需要電力の合計」を「その系統の最大需要電力」で除したものである。",
   alt:{q:"不等率は、「その系統の最大需要電力」を「ある系統に接続されている個々の負荷の最大需要電力の合計」で除したものである。",ans:false},
   ans:true,
   exp:"不等率＝Σ（個々の負荷の最大需要電力）÷系統全体の最大需要電力（≥1.0）。各負荷の最大値が同時に生じないため、不等率は必ず1以上となる。設備計画では不等率を考慮して電源容量を低減できる。逆数は「同時需要係数」と呼ばれる。"},
  {subject:"環境",topic:"消防設備",
   q:"火災時に廊下において形成される上方の煙と下方の比較的清浄な空気とからなる二層流は、煙の温度が低いほど安定する。",
   alt:{q:"火災時に廊下において形成される上方の煙と下方の比較的清浄な空気とからなる二層流は、煙の温度が高いほど安定する。",ans:false},
   ans:true,
   exp:"火災時の廊下二層流は、高温の煙と低温の清浄空気との温度差（密度差）による層状分離。煙の温度が低いほど浮力が小さく、上下の密度差が小さくなるため層状流が維持されやすく安定する。煙温度が高いほど浮力が増大・乱流が促進されて二層流は不安定になり煙が全体に広がりやすい。"},
  {subject:"環境",topic:"省エネ",
   q:"地域冷暖房システムの導入は、一般に、未利用熱の活用による排熱削減が期待でき、ヒートアイランド現象の緩和にも効果的である。",
   alt:{q:"地域冷暖房システムの導入は、熱源機を集中設置するため排熱が増大し、ヒートアイランド現象を促進する可能性がある。",ans:false},
   ans:true,
   exp:"地域冷暖房は面的に熱源を集中管理することで大型高効率機器の採用・河川水・下水処理水・工場排熱等の未利用エネルギー活用が可能となり、個別熱源方式に比べて排熱を削減できる。また排熱の集中管理によりヒートアイランド緩和にも貢献する。"},
  {subject:"環境",topic:"省エネ",
   q:"建築物省エネルギー性能表示制度（BELS）のマークは、BEIの値が小さいほど星の数が増える。",
   alt:{q:"建築物省エネルギー性能表示制度（BELS）のマークは、BEIの値が大きいほど星の数が増える。",ans:false},
   ans:true,
   exp:"BEI（Building Energy Index）＝設計一次エネルギー消費量÷基準一次エネルギー消費量。BEI<1で省エネ達成、BEIが小さいほど省エネ性能が高い。BELSの星評価はBEI≤0.8で★★★★★（5つ星）となるなど、BEI値が小さいほど高評価（星多い）。"},
  {subject:"環境",topic:"省エネ",
   q:"「建築物のエネルギー消費性能の向上に関する法律」に基づく新築住宅の省エネルギー基準では、原則として、外皮平均熱貫流率（UA値）や冷房期の平均日射熱取得率（ηAC値）を地域の区分に応じた基準値以下となること等が求められる。",
   alt:{q:"「建築物のエネルギー消費性能の向上に関する法律」に基づく新築住宅の省エネルギー基準では、原則として、外皮平均熱貫流率（UA値）や冷房期の平均日射熱取得率（ηAC値）を地域の区分に応じた基準値以上となること等が求められる。",ans:false},
   ans:true,
   exp:"建築物省エネ法の外皮性能基準：UA値（外皮平均熱貫流率）は「基準値以下」（値が小さいほど断熱性能が高い）、ηAC値（冷房期平均日射熱取得率）も「基準値以下」（値が小さいほど日射遮蔽性能が高い）が要件。「以上」とすると意味が逆（断熱・遮蔽性能の低い建物でよくなる）であり誤り。"},

  {subject:"計画",topic:"バリアフリー",
   q:"「高齢者、障害者等の円滑な移動等に配慮した建築設計標準（国土交通省）」に照らして、宿泊施設における車椅子使用者用客室内の浴室の出入口の有効幅員を、85cmとした。",
   alt:{q:"「高齢者、障害者等の円滑な移動等に配慮した建築設計標準（国土交通省）」に照らして、宿泊施設における車椅子使用者用客室内の浴室の出入口の有効幅員を、70cmとした。",ans:false},
   ans:true,
   exp:"建築設計標準では、車椅子使用者用客室内の浴室出入口の有効幅員は80cm以上を求めている。85cmはこの基準を満たす適切な設計値。70cmでは車椅子が通過できず基準未満となり不適切。"},
  {subject:"計画",topic:"積算",
   q:"鉄筋の所要数量は、その設計数量の３％割増しを標準とする。",
   alt:{q:"鉄筋の所要数量は、その設計数量の５％割増しを標準とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準（国土交通省）により、鉄筋の所要数量は設計数量の3%増しを標準とする。5%ではなく3%が正しい割増率。なお、木材・ボルト等ではそれぞれ異なる割増率が規定されている。"},
  {subject:"計画",topic:"積算",
   q:"仮設における共通仮設は、工事全体にわたって共通的に必要な仮設をいい、仮囲いや現場事務所等がこれに該当する。",
   alt:{q:"仮設における直接仮設は、工事種目ごとの工事科目で単独に使用する仮設をいう。",ans:false},
   ans:true,
   exp:"積算における仮設の分類：共通仮設は複数の工事種目にまたがり工事全体で共用する仮設（仮囲い・現場事務所・仮設電力・仮設水道等）。直接仮設は各工事科目の中で当該工事に直接附属して使用される仮設（型枠支保工・建方用足場等）。直接仮設は工種ごとの工事費に含まれる。"},
  {subject:"計画",topic:"仮設工事",
   q:"法付け工法の場合、作業上のゆとり幅は0.5mを標準とし、山留め工法の場合には、山留め壁と躯体との間の余幅は1.0mを標準とする。",
   alt:{q:"法付け工法の場合、作業上のゆとり幅は1.0mを標準とし、山留め工法の場合には、山留め壁と躯体との間の余幅は0.5mを標準とする。",ans:false},
   ans:true,
   exp:"建築工事における掘削の余幅の標準：法付けオープンカット工法の場合は作業上のゆとり幅0.5m、山留め工法の場合は山留め壁と構造体外周面との間の余幅1.0m（支保工の設置・解体・防水工事等の作業スペース確保のため）を標準とする。"},
  {subject:"計画",topic:"積算",
   q:"全面がガラスである建具類のガラスの数量において、かまち、方立、桟等の見付幅が0.1mを超えるものがあるときは、その面積を差し引いた面積とする。",
   alt:{q:"全面がガラスである建具類のガラスの数量において、かまち、方立、桟等の見付幅が0.05mを超えるものがあるときは、その面積を差し引いた面積とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準では、全面ガラスの建具についてガラス面積を計測する際、かまち・方立・桟等の見付幅が0.1m（10cm）を超えるものについてはその部分の面積を差し引いて純粋なガラス面積を算出する。0.05mでは差引が多くなりすぎる。"},
  {subject:"計画",topic:"建築生産",
   q:"LCMは、建築物の機能や効用の維持・向上を、通常、建築物の企画から解体・廃棄処分まで、適切なコストのもとで管理・実行することをいい、LCCの低減を行うことが目的の一つである。",
   alt:{q:"LCMは、建築物の機能や効用の維持・向上を、通常、建築物の企画から解体・廃棄処分まで、適切なコストのもとで管理・実行することをいい、LCCの最大化を行うことが目的の一つである。",ans:false},
   ans:true,
   exp:"LCM（ライフサイクルマネジメント）は建築物の企画・設計・施工・維持管理・改修・解体・廃棄に至るライフサイクル全体を通じて、建築物の機能・効用の維持向上を適切なコスト管理のもとで実行するもの。目的の一つはLCC（ライフサイクルコスト）の低減であり、最大化ではない。"},
  {subject:"計画",topic:"建築生産",
   q:"賃貸住宅におけるサブリース事業は、賃貸管理事業者が建物所有者等から建築物を転貸目的として賃借し、自らが転貸人となって入居者に転貸するシステムによって行う賃貸管理事業である。",
   alt:{q:"賃貸住宅におけるサブリース事業は、賃貸管理事業者が建物所有者等から建築物を転貸目的として賃借し、自らが賃借人のまま入居者を管理するシステムによって行う賃貸管理事業である。",ans:false},
   ans:true,
   exp:"サブリース（一括借上げ）事業：賃貸管理事業者（サブリース業者）が①建物オーナーから建物を一括賃借（自らは賃借人）し、②入居者に転貸する（自らは転貸人）二段構えの賃貸管理。業者がオーナーへの賃料保証と入居者管理の両方を担う。「賃借人のまま」では転貸関係が成立しない。"},
  {subject:"計画",topic:"建築生産",
   q:"建築物におけるコミッショニングは、一般に、環境・エネルギー性能等の観点から建築物のオーナーやユーザーが求める要求性能を把握して、その要求性能の実現を検証することである。",
   alt:{q:"建築物におけるコミッショニングは、一般に、環境・エネルギー性能等の観点から建築物の設計者が求める要求性能を把握して、その要求性能の実現を検証することである。",ans:false},
   ans:true,
   exp:"コミッショニング（Cx）は建築物のオーナー・ユーザーの要求性能（Owner's Project Requirements）を出発点とし、設計・施工・引渡し・運用の各段階でその要求性能の実現を体系的に検証・確認するプロセス。「設計者が求める」ではなくオーナー・ユーザーの要求が起点。"},
  {subject:"計画",topic:"都市計画",
   q:"景観法に基づく景観協定は、景観計画区域内の一団の土地の区域における良好な景観の形成に関する事項について、原則として、土地所有者等の全員の合意により結ばれる。",
   alt:{q:"景観法に基づく景観協定は、景観計画区域内の一団の土地の区域における良好な景観の形成に関する事項について、原則として、土地所有者等の過半数の合意により結ばれる。",ans:false},
   ans:true,
   exp:"景観法第81条：景観協定は景観計画区域内の土地所有者等の全員の合意により締結される（一人協定の場合は単独で可）。建築協定と同様、全員合意が原則。過半数の合意では締結できない。"},
  {subject:"計画",topic:"都市計画",
   q:"高度利用地区は、市街地の合理的かつ健全な高度利用と都市機能の更新を図るため、都市計画に建築物の容積率の最高限度及び最低限度、建蔽率の最高限度、建築面積の最低限度並びに壁面の位置の制限を定めることができる地区である。",
   alt:{q:"高度利用地区は、市街地の合理的かつ健全な高度利用を図るため、都市計画に建築物の高さの最高限度又は最低限度を定めることができる地区である。",ans:false},
   ans:true,
   exp:"高度利用地区（都市計画法第9条第19項）では容積率の最高・最低限度、建蔽率の最高限度、建築面積の最低限度、壁面位置の制限を定める。「建築物の高さの最高・最低限度を定める」のは高度地区（法第9条第18項）であり別の制度。高度利用地区と高度地区は名称が似ているが異なる。"},
  {subject:"計画",topic:"都市計画史",
   q:"『広場の造形（芸術的原理に基づく都市計画）』（カミロ・ジッテ、1889年）は、ヨーロッパ各地の歴史的な広場を分析することで、中世の街並みに起源をもつ自然発生的な都市空間の構成を再評価し、そのスケール感や空間感覚を学ぶことの重要性を主張した。",
   alt:{q:"『広場の造形（芸術的原理に基づく都市計画）』（カミロ・ジッテ、1889年）は、ヨーロッパ各地の歴史的な広場を分析することで、近代都市計画の機能的・合理的側面を評価し、大規模な放射状街路計画の優位性を主張した。",ans:false},
   ans:true,
   exp:"カミロ・ジッテ（Camillo Sitte）の『広場の造形』（1889）はウィーンのリンク通りなど近代的な都市整備を批判し、歴史的なヨーロッパの広場・街路の分析を通じて、人間的なスケール感・囲まれ感・不規則性の美を再評価した。機能主義的な大規模街路計画への批判を含む。"},
  {subject:"計画",topic:"都市計画史",
   q:"ジェイン・ジェイコブズは、著書「アメリカ大都市の死と生」において、頻繁に使われている街路は安全となる傾向にあり、街路には常に住民、通行人、店員などの多数の目を置く必要があるとしている。",
   alt:{q:"ジェイン・ジェイコブズは、著書「アメリカ大都市の死と生」において、頻繁に使われている街路は危険となる傾向にあり、プライバシー確保のため街路への「目」を減らすことの重要性を主張している。",ans:false},
   ans:true,
   exp:"ジェイン・ジェイコブズ『アメリカ大都市の死と生』（1961年）：「街路の目（eyes on the street）」の概念を提唱。人が頻繁に使う活気ある街路は自然監視が機能して安全になり、逆に人気のない街路は危険になると論じた。近代都市計画（スーパーブロック・高層団地等）への批判でもある。"},
  {subject:"計画",topic:"都市計画",
   q:"インナーシティ問題は、都市の中心とその周辺の市街地における人口の減少と産業の衰退、地域の荒廃等のことである。",
   alt:{q:"インナーシティ問題は、都市の郊外における人口の急増と産業の過密による交通渋滞や環境悪化のことである。",ans:false},
   ans:true,
   exp:"インナーシティ（inner city）問題：1970〜80年代から先進国の大都市中心部・旧工業地区で顕在化した、人口流出・産業空洞化・建物老朽化・貧困・犯罪増加等の複合的な都市問題。郊外では逆にスプロール問題が発生する。"},
  {subject:"計画",topic:"都市計画史",
   q:"レッチワース（イギリス、20世紀初頭）は、エベネザー・ハワードの「田園都市（Garden City）」の構想に基づいて建設された、世界最初の田園都市である。",
   alt:{q:"レッチワース（イギリス、20世紀初頭）は、パトリック・ゲデスの「保存的外科手術」という概念のもと、都市の歴史性を保存しながら再開発が行われた都市である。",ans:false},
   ans:true,
   exp:"レッチワース（Letchworth Garden City、1903年着工）はエベネザー・ハワード（Ebenezer Howard）の著書『明日の田園都市』（1902）の構想を実現した世界初の田園都市。パトリック・ゲデスの「保存的外科手術（Conservative Surgery）」は既存都市の歴史性を活かした段階的改善の手法で全く別の概念。"},
  {subject:"計画",topic:"都市計画",
   q:"都市再生特別地区の指定により、通常の用途地域の用途・容積率等の制限を超えた土地の高度利用と都市機能の更新を促進することができる。",
   alt:{q:"北海道札幌市では、都市再生特別地区の指定により、建築物の形態意匠の制限の他、建築物の高さの最高限度や敷地面積の最低限度を定めることで市街地の良好な景観形成に取り組んでいる。",ans:false},
   ans:true,
   exp:"都市再生特別地区（都市再生特別措置法）は、用途地域による制限によらず、容積率の割増や用途制限の緩和等を定め、民間都市開発を誘導して都市機能の更新を図る制度。「建築物の形態意匠の制限・高さの最高限度・敷地面積の最低限度を定める」のは地区計画の内容であり、都市再生特別地区の制度とは異なる。"},
  {subject:"計画",topic:"建築実例",
   q:"長野県小布施町においては、葛飾北斎の作品を収蔵した北斎館を核として、江戸時代の豪商の屋敷を整備した「栗の小径」等のオープンガーデンによるまちづくりを行っている。",
   alt:{q:"小布施町（長野県）においては、明治時代に建築された黒漆喰仕上げの建築物を保存・改装し、この建築物を核とした街並み「黒壁スクエア」を中心にして観光振興によるまちづくりを行っている。",ans:false},
   ans:true,
   exp:"長野県小布施町のまちづくり：葛飾北斎の晩年の滞在地であることを活かした北斎館を核として、豪商高井鴻山の屋敷周辺を「栗の小径」等として整備するオープンガーデンのまちづくりで有名。「黒壁スクエア」は滋賀県長浜市の、旧第百三十国立銀行（明治期の黒漆喰建物）を保存・活用した別のまちづくり事例。"},
  {subject:"計画",topic:"建築実例",
   q:"ドックランズ再開発計画（ロンドン）は、老朽化した港湾施設（旧ドック）を大規模に再整備し、オフィス・住宅・商業施設等の高度複合開発によって都市機能の更新を図ったプロジェクトである。",
   alt:{q:"ドックランズ再開発計画（ロンドン）は、大規模な区画の整理によって街区を撤去し、中央部を遊歩道とする広場をつくり出したプロジェクトである。",ans:false},
   ans:true,
   exp:"ロンドン・ドックランズ再開発（1981年〜、LDDC主導）：テムズ川東部の旧港湾・工業地区（ドックランズ）を大規模に再開発。カナリーワーフの超高層オフィス群・住宅・商業施設を整備し、DLR（軽量鉄道）を整備して旧衰退地区を新たな商業・業務中心地として再生した。"},
  {subject:"計画",topic:"建築実例",
   q:"富山県富山市では、レジリエンス戦略を策定し、自然災害による大きな被害や少子高齢化等の社会構造の変化に直面しても、速やかに復興し、さらに成長する能力や強靭さを有する都市づくりに取り組んでいる。",
   alt:{q:"富山県富山市では、人口増加を見込んだ市街地拡大型の都市整備を推進し、広大な低密度郊外住宅地の開発を積極的に行うことで都市活力の維持に取り組んでいる。",ans:false},
   ans:true,
   exp:"富山市はアジア都市気候変動レジリエンス・ネットワーク（ACCCRN）に参加するなど、気候変動や人口減少等のリスクへの強靱性（レジリエンス）向上を目指した都市づくりに取り組む。同時に公共交通活性化・コンパクトシティ（LRT整備等）でも全国的に知られる。"},
  {subject:"計画",topic:"建築実例",
   q:"千里ニュータウン（大阪府）は、高度経済成長期に大阪圏に流入し、増加した人口の受け皿として、「近隣住区」等の都市計画理論に基づき開発された我が国で最初のニュータウンである。",
   alt:{q:"高蔵寺ニュータウン（愛知県）は、高度経済成長期に名古屋圏に流入し、増加した人口の受け皿として、「近隣住区」等の都市計画理論に基づき開発された我が国で最初のニュータウンである。",ans:false},
   ans:true,
   exp:"日本最初のニュータウンは千里ニュータウン（大阪府豊中市・吹田市、1962年入居開始）。日本住宅公団主導でクラレンス・ペリーの「近隣住区論」を採用。高蔵寺ニュータウン（愛知県春日井市）は1968年入居開始で千里より後発。"},
  {subject:"計画",topic:"建築実例",
   q:"ジョン F. ケネディ国際空港TWAターミナルビル（ニューヨーク、E.サーリネン、1962年）は、長さ約105mの屋根をもち、４本のY字柱脚に支えられた４枚の鉄筋コンクリート造によるシェルで構成されている。",
   alt:{q:"ジョン F. ケネディ国際空港TWAターミナルビル（ニューヨーク、E.サーリネン、1962年）は、長さ約105mの屋根をもち、２本のX字柱脚に支えられた２枚の鉄筋コンクリート造によるシェルで構成されている。",ans:false},
   ans:true,
   exp:"TWAフライトセンター（1962年、エーロ・サーリネン設計）：飛翔する鳥・蝶を連想させる有機的な外観をもつRC薄肉シェル構造。中央部で高さが下がり両翼に広がる屋根は4枚のシェルで構成され、Y字形の4本の柱脚（ピア）に支持される。2001年廃止後、現在はホテルに転用。"},
  {subject:"計画",topic:"建築実例",
   q:"ロームシアター京都（旧京都会館）（京都府）は、昭和30年代に建設された既存建築物を保存し、意匠的な要素を再現しながら、増築と一部建て替えを行うことで、機能拡充が図られたものである。",
   alt:{q:"ロームシアター京都（旧京都会館）（京都府）は、昭和30年代に建設された既存建築物を全面解体し、現代的なデザインで建て替えることで機能拡充が図られたものである。",ans:false},
   ans:true,
   exp:"ロームシアター京都（旧京都会館、1960年竣工・前川國男設計）：2016年リニューアルオープン。既存建物を保存・活用しながら、前川建築の意匠（テラコッタタイル・格子状外壁）を再現。メインホールを拡張し新ウィングを増築したが、全面解体ではなく保存を前提とした改修。"},
  {subject:"計画",topic:"建築実例",
   q:"金沢市民芸術村（石川県）は、大正から昭和初期に建設された紡績工場の倉庫を改修し、工房、レストラン、オープンスペース等から構成される芸術文化施設へ再生させたものである。",
   alt:{q:"金沢市民芸術村（石川県）は、明治時代に建設された醸造所の倉庫を改修し、工房、レストラン、オープンスペース等から構成される芸術文化施設へ再生させたものである。",ans:false},
   ans:true,
   exp:"金沢市民芸術村（1996年開館）：大正から昭和初期に建設された旧大和紡績（のちのカネボウ）金沢工場の倉庫群（レンガ造・木造トラス）を改修・転用。ドラマ工房・音楽工房・邦楽工房・美術工房等からなる24時間365日利用可能な芸術文化施設として再生。醸造所の倉庫ではない。"},

  // ── 環境追加②（24問）──
  {subject:"環境",topic:"省エネ",
   q:"建築物の二次エネルギー消費量を一次エネルギー消費量に換算して同じ単位で比べた場合、二次エネルギー消費量は一次エネルギー消費量よりも小さくなる。",
   alt:{q:"建築物の二次エネルギー消費量を一次エネルギー消費量に換算して同じ単位で比べた場合、二次エネルギー消費量は一次エネルギー消費量よりも大きくなる。",ans:false},
   ans:true,
   exp:"一次エネルギーは石油・石炭・天然ガス等の原料エネルギー。二次エネルギー（電気・ガス・熱等）はその変換・輸送過程で損失を伴って得られる。変換効率は1未満であるため、同量の二次エネルギーを得るには常に多くの一次エネルギーが必要。よって換算後の二次エネルギー消費量＜一次エネルギー消費量。"},
  {subject:"環境",topic:"空調設備",
   q:"軸流送風機は、一般に、遠心送風機に比べて静圧の低い用途に用いられる。",
   alt:{q:"軸流送風機は、一般に、遠心送風機に比べて静圧の高い用途に用いられる。",ans:false},
   ans:true,
   exp:"送風機の特性：遠心送風機（シロッコファン・多翼ファン等）は高静圧・比較的低風量で、ダクト抵抗の大きい空調ダクト系に適する。軸流送風機（プロペラファン等）は低静圧・大風量で、換気扇・冷却塔ファン等の静圧が低くて済む用途に適する。「静圧の高い用途」は遠心送風機。"},
  {subject:"環境",topic:"空調設備",
   q:"パッケージ型空調機のAPF（Annual Performance Factor）は、「冷房期間総合負荷及び暖房期間総合負荷の和」を「通年消費電力量」で除した値により表される。",
   alt:{q:"パッケージ型空調機のAPF（Annual Performance Factor）は、「通年消費電力量」を「冷房期間総合負荷及び暖房期間総合負荷の和」で除した値により表される。",ans:false},
   ans:true,
   exp:"APF（通年エネルギー消費効率）＝（冷房期間総合負荷＋暖房期間総合負荷）÷通年消費電力量。分子は熱量（kWh相当）、分母は電力消費量（kWh）。APFが大きいほど高効率。「消費電力量÷負荷の和」はその逆数（エネルギー消費原単位に近い概念）であり誤り。"},
  {subject:"環境",topic:"空調設備",
   q:"空調熱源用の冷却塔の設計出口水温は、冷凍機の冷却水入口水温の許容範囲内の低い温度で運転したほうが、省エネルギー上有効である。",
   alt:{q:"空調熱源用の冷却塔の設計出口水温は、冷凍機の冷却水入口水温の許容範囲内の高い温度で運転したほうが、省エネルギー上有効である。",ans:false},
   ans:true,
   exp:"冷凍機（チラー）のCOP（成績係数）は冷却水入口水温が低いほど高くなる（凝縮圧力が下がり仕事量が減少）。冷却塔の出口水温（＝冷凍機冷却水入口水温）を低くすることで冷凍機の省エネになる。ただし低温すぎると冷凍機保護のため制限がある。"},
  {subject:"環境",topic:"給排水設備",
   q:"水道直結直圧方式は、水道本管の圧力を利用して建築物内の必要箇所に給水する方式であり、一般に、３階建て以下の建築物で小規模なものに適用することができる。",
   alt:{q:"水道直結直圧方式は、水道本管の圧力を利用して建築物内の必要箇所に給水する方式であり、一般に、10階建て以上の高層建築物にも適用することができる。",ans:false},
   ans:true,
   exp:"水道直結直圧方式は水道本管の圧力（通常0.2〜0.4MPa程度）をそのまま利用するため、圧力・水量の制約から一般に3階建て以下の小規模建物に適用される。高層建物では水道本管の圧力が不足するため増圧ポンプを用いる直結増圧方式や高置タンク方式が必要。"},
  {subject:"環境",topic:"給排水設備",
   q:"集合住宅における設計用給水量として、居住者１人１日当たり250lとした。",
   alt:{q:"集合住宅における設計用給水量として、居住者１人１日当たり50lとした。",ans:false},
   ans:true,
   exp:"集合住宅の設計用給水量の目安は居住者1人1日当たり200〜400L程度。250Lはこの範囲内の適切な設計値。50Lは過少で生活用水（飲料・炊事・入浴・洗濯等）として全く不十分。なお、一般事務所では1人1日当たり60〜100L程度が目安。"},
  {subject:"環境",topic:"給排水設備",
   q:"給水配管設備において、管内の圧力が高かったので、ウォーターハンマー防止のためエアチャンバーを設けた。",
   alt:{q:"給水配管設備において、管内の圧力が高かったので、ウォーターハンマー防止のため逆止弁を設けた。",ans:false},
   ans:true,
   exp:"ウォーターハンマー（水撃）は弁の急閉鎖等により生じる圧力衝撃。防止策：エアチャンバー（空気室）・ウォーターハンマーアレスタ・クッション弁・定水位弁等で圧力衝撃を緩衝する。逆止弁は逆流防止のための弁であり、ウォーターハンマー防止は主な目的ではない。"},
  {subject:"環境",topic:"給排水設備",
   q:"排水を再利用した雑用水については、便器洗浄水や修景用水の他に、清掃用水にも使用できるが、冷却塔補給水への使用は認められていない。",
   alt:{q:"排水を再利用した雑用水については、便器洗浄水や修景用水の他に、清掃用水や冷却塔補給水にも使用した。",ans:false},
   ans:true,
   exp:"建築物衛生法・水道法等に基づく雑用水（中水）の使用用途：便所洗浄水・散水・修景・清掃用水は認められるが、冷却塔補給水は一般に認められていない。冷却塔内でエアロゾル化した水が人体に吸入されるリスク（レジオネラ属菌等）があるため、冷却塔補給水には水質基準が厳しく適用される。"},
  {subject:"環境",topic:"給排水設備",
   q:"給湯用ボイラーは、常に缶水が新鮮な補給水と入れ替わるため、空気調和設備用温水ボイラーに比べて腐食しやすい。",
   alt:{q:"給湯用ボイラーは、缶水が密閉された状態で循環するため、空気調和設備用温水ボイラーに比べて腐食しにくい。",ans:false},
   ans:true,
   exp:"給湯用ボイラーは使用の度に新鮮な水（溶存酸素・硬度成分を多く含む）が補給されるため腐食・スケール付着が激しい。空調用温水ボイラーは密閉回路で同じ水（缶水）を循環し、一度酸素が消費されると腐食が進みにくい。したがって給湯ボイラーの方が腐食しやすい。"},
  {subject:"環境",topic:"給排水設備",
   q:"各個通気方式は、各衛生器具のトラップごとに取り出した通気管を通気横枝管に接続し、その端部を通気立て管等に接続する方式であり、自己サイホン作用の防止に有効である。",
   alt:{q:"各個通気方式は、各衛生器具のトラップごとに取り出した通気管を通気横枝管に接続する方式であり、誘導サイホン作用の防止には有効だが、自己サイホン作用の防止には効果がない。",ans:false},
   ans:true,
   exp:"各個通気方式は各器具トラップのすぐ下流から個別に通気管を立ち上げてトラップの封水を保護する。器具自身の排水が流れる際に生じる自己サイホン（器具トラップの封水が吸引される現象）の防止に最も効果的な通気方式。誘導サイホン（他の器具排水による吸引）にはループ通気が有効。"},
  {subject:"環境",topic:"給排水設備",
   q:"伸頂通気方式は、通気立て管を設けず、排水立て管の頂上に設置した伸頂通気管を用いて通気を行う方式であり、一般に、各個通気方式やループ通気方式に比べて許容流量値が小さい。",
   alt:{q:"伸頂通気方式は、通気立て管を設けず、排水立て管の頂上に設置した伸頂通気管を用いて通気を行う方式であり、一般に、各個通気方式やループ通気方式に比べて許容流量値が大きい。",ans:false},
   ans:true,
   exp:"伸頂通気方式は排水立て管頂部のみから大気開放する最もシンプルな通気方式だが、通気能力は限られる。各個通気やループ通気を設けた方式に比べて許容排水流量（排水立て管の排水能力）が小さくなる。大流量が必要な建物では各個通気・ループ通気・特殊継手通気等を採用する。"},
  {subject:"環境",topic:"給排水設備",
   q:"伸頂通気方式の排水通気配管において、伸頂通気管の管径は排水立て管の管径と同じ管径とした。",
   alt:{q:"伸頂通気方式の排水通気配管において、通気流速を高めるために、伸頂通気管の管径を排水立て管の管径よりも１サイズ小さいものとした。",ans:false},
   ans:true,
   exp:"伸頂通気管の管径は原則として排水立て管と同径以上としなければならない（縮小禁止）。管径を小さくすると通気抵抗が増大し、排水時の圧力変動がトラップ封水を破壊しやすくなる。「1サイズ小さい」は法令・基準に違反する不適切な設計。"},
  {subject:"環境",topic:"給排水設備",
   q:"排水槽の通気管は、他の排水系統の通気管と接続せず、単独で外気に開放する。",
   alt:{q:"排水槽の通気管は、他の排水系統の通気管と接続し、外気に開放する。",ans:false},
   ans:true,
   exp:"排水槽（汚水槽・雑排水槽）は悪臭が強く発生するため、通気管は他の排水系統の通気管と接続せず、単独で外気（臭気が問題にならない箇所）に直接開放する。接続すると悪臭が他の通気管を経由して室内に逆流するリスクがある。"},
  {subject:"環境",topic:"電気設備",
   q:"風力発電に用いられる風車は、一般に、水平軸風車（回転軸が地面に対して水平な風車）と垂直軸風車（回転軸が地面に対して垂直な風車）に分類することができ、垂直軸風車は小型風車での採用例が多い。",
   alt:{q:"風力発電に用いられる風車は、一般に、水平軸風車と垂直軸風車に分類することができ、水平軸風車は小型風車での採用例が多い。",ans:false},
   ans:true,
   exp:"水平軸風車（プロペラ型）は高効率で大型の風力発電に広く採用される（洋上・陸上の大型風車はほぼ水平軸）。垂直軸風車（ダリウス型・サボニウス型等）は風向を問わず発電できるため、都市部の建物屋上や小型分散型電源での採用例が多い。"},
  {subject:"環境",topic:"電気設備",
   q:"非常用エレベーターの機械室の床面積は、機械の配置及び管理に支障がない場合においては、昇降路の水平投影面積の２倍以上としなくてもよい。",
   alt:{q:"非常用エレベーターの機械室の床面積は、機械の配置及び管理に支障があるかどうかにかかわらず、常に昇降路の水平投影面積の３倍以上としなければならない。",ans:false},
   ans:true,
   exp:"令第129条の11第4項：非常用エレベーターの機械室床面積は昇降路の水平投影面積の2倍以上が原則。ただし機械の配置及び管理に支障がない場合はこれより小さくできる（緩和規定）。「3倍以上」という規定は存在せず、また例外なく2倍以上という絶対規定でもない。"},
  {subject:"環境",topic:"電気設備",
   q:"貸事務所ビルの乗用エレベーターのサービス水準については、エレベーターが２台以上ある場合、平均運転間隔を40秒以下となるように計画することが望ましい。",
   alt:{q:"貸事務所ビルの乗用エレベーターのサービス水準については、エレベーターが２台以上ある場合、平均運転間隔を90秒以下となるように計画することが望ましい。",ans:false},
   ans:true,
   exp:"エレベーターの平均インターバル（平均運転間隔）の目標値：貸事務所ビルでは30〜40秒以下が望ましいとされる。90秒では利用者の待ち時間が長く、サービス水準として不十分。住宅では60〜90秒程度が許容範囲とされる場合もある。"},
  {subject:"環境",topic:"電気設備",
   q:"乗用エレベーターは、一般に、火災発生時の乗客の避難を図るため、火災時管制運転により速やかに避難階（１階又は地上に通じる出入口のある階）に帰還・停止させる計画とする。",
   alt:{q:"乗用エレベーターは、一般に、火災発生時の乗客の避難を図るため、火災時管制運転により速やかに最寄階に停止させる計画とする。",ans:false},
   ans:true,
   exp:"火災時管制運転：火災信号を受けると乗用エレベーターは途中停止せずに「避難階（1階等）」に直行・停止し、以降の運転を停止する。「最寄階に停止」は地震時管制運転（P波感知後に最寄階に停止してドアを開放する動作）であり、火災時とは異なる。"},
  {subject:"環境",topic:"光環境",
   q:"配光曲線は、光源の各方向に対する光度の分布を示すものである。",
   alt:{q:"配光曲線は、光源の各方向に対する照度の分布を示すものである。",ans:false},
   ans:true,
   exp:"配光曲線（polar curve）は照明器具・光源から各方向に放射される「光度（cd：カンデラ）」の大きさを極座標で表したもの。照度（lx）は受照面での明るさを表す別の量。配光曲線から任意の方向の光度を読み取り、逆二乗の法則で任意点の照度を計算する。"},
  {subject:"環境",topic:"消防設備",
   q:"消防用水は、大規模建築物に設置が義務付けられる消防活動のための水源であり、消防ポンプ車が消火活動に使用するもので、屋内消火栓やスプリンクラー設備とは別の消防活動上必要な施設である。",
   alt:{q:"消防用水を、屋内消火栓設備やスプリンクラー設備等の初期消火設備のための専用水源として設置した。",ans:false},
   ans:true,
   exp:"消防用水（消防法第17条等）は敷地面積・延べ面積が一定規模以上の建築物に設置が義務付けられる、消防隊が消火活動に使用するための水槽・プール等の水源（消防活動上必要な施設）。屋内消火栓やスプリンクラーの「初期消火設備のための専用水源」ではなく、消防隊専用の水源。"},
  {subject:"環境",topic:"消防設備",
   q:"屋内消火栓設備において、１号消火栓については、階ごとに、その階の各部分から消火栓のホース接続口までの水平距離が25m以下となるように設置した。",
   alt:{q:"屋内消火栓設備において、１号消火栓については、階ごとに、その階の各部分から消火栓のホース接続口までの水平距離が15m以下となるように設置した。",ans:false},
   ans:true,
   exp:"消防法施行規則：屋内消火栓の設置基準として、1号消火栓はホース接続口までの水平距離25m以下、2号消火栓（及び広範囲型2号消火栓）は15m以下。1号・2号の違いを混同しないこと。1号は放水量が多く2人操作が必要で25mのホースを使う。"},
  {subject:"環境",topic:"消防設備",
   q:"閉鎖型スプリンクラーヘッドの種別について、感度種別が１種で、かつ、有効散水半径が2.3m以上であるものは「高感度型」に分類される。",
   alt:{q:"閉鎖型スプリンクラーヘッドの種別について、感度種別が１種で、かつ、有効散水半径が2.6m以上であるものは「高感度型」に分類される。",ans:false},
   ans:true,
   exp:"消防庁告示に基づく高感度型スプリンクラーヘッドの要件：①感度種別1種（RTI≤50[(m・s)^(1/2)]）かつ②有効散水半径2.3m以上のもの。2.6mは標準型（感度種別2種）の有効散水半径の目安であり、高感度型の基準値（2.3m）と混同しないこと。"},
  {subject:"環境",topic:"消防設備",
   q:"水噴霧消火設備は、微粒子の水を放射して消火する設備で、駐車場や変電室等に採用される。",
   alt:{q:"水噴霧消火設備は、微粒子の水を放射して消火する設備で、飛行機の格納庫に採用される。",ans:false},
   ans:true,
   exp:"水噴霧消火設備は微細な霧状の水（ミスト）を放射し、冷却・窒息・乳化作用で消火。適用場所：駐車場・変電室・ケーブルダクト・危険物貯蔵所等。飛行機格納庫には可燃性液体（航空燃料）の火災に対応した「泡消火設備」が義務付けられる。水噴霧は油火災対応として一部認められるが格納庫の代表的設備は泡消火。"},
  {subject:"環境",topic:"消防設備",
   q:"排煙設備の設置が必要な百貨店において、排煙設備の排煙口を、防煙区画のそれぞれについて、当該防煙区画の各部分から排煙口のいずれかに至る水平距離が30m以下となるように設置した。",
   alt:{q:"排煙設備の設置が必要な百貨店において、排煙設備の排煙口を、防煙区画のそれぞれについて、当該防煙区画の各部分から排煙口のいずれかに至る水平距離が20m以下となるように設置した。",ans:false},
   ans:true,
   exp:"建築基準法施行令第126条の3第1項第4号：排煙口は防煙区画の各部分から一のいずれかの排煙口まで水平距離30m以下となるように設置する。20mはより安全側ではあるが、法定値（30m以下）が基準。防煙垂れ壁で仕切られた各防煙区画ごとに排煙口が必要。"},
  {subject:"環境",topic:"省エネ",
   q:"LEED（Leadership in Energy & Environmental Design）は、建築物や敷地等に関する環境性能評価システムの一つであり、取得したポイントの合計によって４段階の認証レベルが決まる。",
   alt:{q:"LEED（Leadership in Energy & Environmental Design）は、建築物や敷地等に関する環境性能評価システムの一つであり、取得したポイントの合計によって３段階の認証レベルが決まる。",ans:false},
   ans:true,
   exp:"LEED（米国グリーンビルディング協議会・USGBC）は米国発の建築環境性能評価システム。取得ポイントに応じてCertified（認証）・Silver（銀）・Gold（金）・Platinum（プラチナ）の4段階で認証される。日本のCASBEE（建築環境総合性能評価）とともに国際的に普及。"},

  {subject:"計画",topic:"バリアフリー",
   q:"美術館の車椅子使用者用トイレにおいて、内部の自動式引戸の開閉スイッチは、引戸の戸先からできるだけ遠い位置に設置した。",
   alt:{q:"美術館の車椅子使用者用トイレにおいて、内部の自動式引戸の開閉スイッチは、引戸の戸先からできるだけ近い位置に設置した。",ans:false},
   ans:true,
   exp:"自動式引戸の開閉スイッチは、スイッチを押した後に引戸が開いても利用者に当たらないよう、引戸の戸先からできるだけ遠い位置（吊り元側の壁面）に設置する。戸先近くに設置すると、ドア開放時に車椅子利用者と引戸が接触する危険がある。"},
  {subject:"計画",topic:"バリアフリー",
   q:"公共施設が建つ敷地内の主要な経路上の計画において、転倒防止や休憩、減速ができるように、傾斜路の途中に設置した踊り場の踏幅を、1,600mmとした。",
   alt:{q:"公共施設が建つ敷地内の主要な経路上の計画において、傾斜路の途中に設置した踊り場の踏幅を、800mmとした。",ans:false},
   ans:true,
   exp:"バリアフリー法・建築設計標準：スロープ途中に設ける踊り場の奥行き（踏幅）は1,500mm以上が基準。1,600mmはこれを満たす適切な寸法。800mmでは車椅子が転回・休憩できず基準未満。踊り場はスロープが方向転換する部分にも設けることで安全性を高める。"},
  {subject:"計画",topic:"積算",
   q:"工事費における共通費とは、共通仮設費、現場管理費及び一般管理費等を合わせたものである。",
   alt:{q:"工事費における共通費とは、材料費、労務費及び直接経費を合わせたものである。",ans:false},
   ans:true,
   exp:"建設工事費の構成：純工事費（直接工事費＋共通仮設費）＋現場管理費＝工事原価。工事原価＋一般管理費等＝工事費。共通費＝共通仮設費＋現場管理費＋一般管理費等。材料費・労務費・直接経費は直接工事費の構成要素であり、共通費ではない。"},
  {subject:"計画",topic:"積算",
   q:"型枠の数量において、コンクリートの上面が傾斜している場合、その勾配が10分の1を超えるものについては、その部分の上面型枠又はコンクリートの上面の処理を計測・計算の対象とする。",
   alt:{q:"型枠の数量において、コンクリートの上面が傾斜している場合、その勾配が10分の1以下のものについても、すべて上面型枠を計測・計算の対象とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準：コンクリート上面が傾斜している場合、勾配が1/10を超えるものに限り、上面型枠またはコンクリート上面の処理を計測・計算の対象とする。1/10以下の緩勾配の場合は対象外。急勾配でないと型枠の必要性が生じないという実態に基づく区分。"},
  {subject:"計画",topic:"積算",
   q:"鉄骨の溶接の数量において、原則として、溶接の種類に区分し、溶接断面形状ごとに長さを求め、すみ肉溶接脚長６mmに換算した延べ長さとする。",
   alt:{q:"鉄骨の溶接の数量において、原則として、溶接の種類や断面形状によらず、実際の溶接長さをそのまま計測した延べ長さとする。",ans:false},
   ans:true,
   exp:"建築数量積算基準：鉄骨溶接の数量は溶接の種類（すみ肉・突合せ等）・断面形状ごとに計測し、すみ肉溶接脚長6mm相当に換算した延べ長さ（換算長さ）で統一して表す。換算により異なる断面形状の溶接を比較・集計しやすくなる。"},
  {subject:"計画",topic:"積算",
   q:"防水層等の所要数量において、シート防水のシートの重ね代は、計測数量に１０％の割増しをすることを標準とする。",
   alt:{q:"防水層等の所要数量において、シート防水のシートの重ね代は、計測数量に５％の割増しをすることを標準とする。",ans:false},
   ans:true,
   exp:"建築数量積算基準：シート防水のシート所要数量は、計測した設計数量に対してシートの重ね代（ラップ）として10%の割増しを標準とする。5%では重ね代が不足し防水性能が確保できない。なお、ルーフィング類も同様に10%割増しが一般的。"},
  {subject:"計画",topic:"建築生産",
   q:"「モラルハザード」は、保険の領域から派生した概念で、近年では、一般に、「倫理観の欠如」と訳され、企業等が節度なく利益を追求する状態をいう。",
   alt:{q:"「モラルハザード」は、保険の領域から派生した概念で、近年では、一般に、「危機管理計画」と訳され、企業等が緊急事態に備えるための行動指針を策定することをいう。",ans:false},
   ans:true,
   exp:"モラルハザード（moral hazard）：保険分野では「保険に加入することで損失回避の注意が低下する現象」を指す。転じて近年は「倫理観の欠如」と訳され、企業や個人が倫理的な抑制なく過剰な利益追求・リスクテイクを行う状態全般を指す言葉として使われる。"},
  {subject:"計画",topic:"建築生産",
   q:"「公益通報」には、通報先や状況によって、「内部通報」、「行政機関への通報」及び「外部通報」の三つの種類がある。",
   alt:{q:"「公益通報」には、通報先や状況によって、「内部通報」及び「行政機関への通報」の二つの種類がある。",ans:false},
   ans:true,
   exp:"公益通報者保護法（2004年制定、2022年改正施行）：公益通報の種類は①事業者内部への通報（内部通報）②行政機関への通報③報道機関・消費者団体等への外部通報（一定の要件が必要）の三種類。二種類だけでは外部通報が保護対象から外れ誤り。"},
  {subject:"計画",topic:"建築生産",
   q:"設計図書の内容を把握し、設計図書に明らかな矛盾、誤謬、脱漏、不適切な納まり等を発見した場合には、設計者に報告し、必要に応じて発注者に通知する業務は、工事監理に関する標準業務である。",
   alt:{q:"設計図書の内容を把握し、設計図書に明らかな矛盾、誤謬、脱漏、不適切な納まり等を発見した場合には、設計者に報告し、必要に応じて工事施工者に確認する業務は、工事監理に関する標準業務である。",ans:false},
   ans:true,
   exp:"工事監理業務（建築士法・標準業務）：設計図書の矛盾・誤謬・脱漏等を発見した場合の対応は、①設計者に報告し②必要に応じて発注者に通知する。「工事施工者に確認する」は誤り。工事施工者は施工の実施者であり、設計図書の誤りを確認・修正する立場にない。"},
  {subject:"計画",topic:"建築生産",
   q:"建築物の企画段階におけるブリーフィングは、一般に、発注者及び関係者の要求、目的、制約条件を明らかにし、分析するプロセスであり、その成果物はブリーフと呼ばれている。",
   alt:{q:"建築物の企画段階におけるブリーフィングは、一般に、設計者が独自に作成する詳細設計仕様書の策定プロセスであり、その成果物はデザインブックと呼ばれている。",ans:false},
   ans:true,
   exp:"ブリーフィング（briefing）：プロジェクト初期段階で発注者・関係者の要求・目的・予算・制約条件等を整理・明確化する作業プロセス。成果物はブリーフ（brief）と呼ばれる。ブリーフは設計者への指示書・要件定義書として機能する。設計者が独自に作成するものではなく、発注者との協働作業。"},
  {subject:"計画",topic:"建築生産",
   q:"建築物の企画段階におけるフィージビリティ・スタディは、企画内容が事業経営上の観点で実行可能かどうかを確かめる検討作業である。",
   alt:{q:"建築物の企画段階におけるフィージビリティ・スタディは、完成した建築物の利用者満足度を事後的に評価する検討作業である。",ans:false},
   ans:true,
   exp:"フィージビリティ・スタディ（feasibility study、FS）：企画段階において、事業計画の経済性・技術的実現可能性・法的適合性・市場性等を総合的に検討し、事業の実行可能性（フィージビリティ）を事前に確認する作業。完成後の事後評価はPOE（建築後評価）と呼ばれ別の概念。"},
  {subject:"計画",topic:"建築生産",
   q:"CRE（Corporate Real Estate）は、企業が所有する不動産について、経営戦略的な視点に立って見直しを行い、不動産投資の効率性を最大限向上させるという考え方である。",
   alt:{q:"CSRは、企業が所有する不動産について、経営戦略的な視点に立って見直しを行い、不動産投資の効率性を最大限向上させるという考え方である。",ans:false},
   ans:true,
   exp:"CRE（Corporate Real Estate）戦略：企業が保有・使用する不動産（オフィス・工場・倉庫等）を経営戦略の観点から最適化し、資産効率の向上・コスト削減・事業リスク低減を図る考え方。CSR（Corporate Social Responsibility）は「企業の社会的責任」であり、環境・社会・ガバナンスへの配慮を指す全く別の概念。"},
  {subject:"計画",topic:"建築生産",
   q:"BCPは、企業が災害や事故で被害を受けても、重要な業務が中断しないこと、中断しても可能な限り短い期間で再開すること等、事業の継続を追求するための計画である。",
   alt:{q:"BCPは、企業が社会的責任を果たすために、環境保全・地域貢献・コンプライアンス遵守等の取組みを継続的に推進するための計画である。",ans:false},
   ans:true,
   exp:"BCP（Business Continuity Plan、事業継続計画）：地震・水害・テロ・システム障害等の緊急事態が発生した際にも重要業務を継続・早期復旧させるための計画。リスク分析・代替拠点確保・優先業務の特定・訓練等を含む。社会的責任・環境貢献等の取組みはCSR（企業の社会的責任）の範疇。"},
  {subject:"計画",topic:"都市計画",
   q:"ダウンゾーニングは、都市計画で定められた容積率の引下げや建築することができる用途を住宅等に限定する等、規制を現行に比べて厳しいものに変更することである。",
   alt:{q:"ダウンゾーニングは、都市計画で定められた容積率の引上げや建築することができる用途を拡大する等、規制を現行に比べて緩やかなものに変更することである。",ans:false},
   ans:true,
   exp:"ダウンゾーニング（downzoning）：用途地域等の規制を現行より厳しい方向に変更すること（容積率引下げ・用途制限の強化等）。住宅地の過密化防止や緑地保全等の目的で行われる。逆に規制を緩和する方向への変更はアップゾーニング（upzoning）という。"},
  {subject:"計画",topic:"都市計画",
   q:"TOD（Transit Oriented Development）は、公共交通機関の利用を前提として、過度に自動車へ依存しない持続可能な都市を実現する方法の一つである。",
   alt:{q:"TOD（Transit Oriented Development）は、広大な駐車場と幹線道路網を中心に配置した、自動車利用を前提とした郊外型スプロール開発の手法の一つである。",ans:false},
   ans:true,
   exp:"TOD（公共交通指向型開発）：鉄道駅・バス停等の公共交通結節点の周辺に居住・商業・業務機能を高密度に集積させ、徒歩・自転車・公共交通を軸とした自動車依存度の低い持続可能な都市構造を目指す開発手法。コンパクトシティ・ウォーカブルシティと親和性が高い。"},
  {subject:"計画",topic:"都市計画",
   q:"ITS（Intelligent Transport Systems）とは、最先端の情報通信技術を用いて、交通事故、渋滞などの道路交通の問題解決を目的に構築する交通システムのことである。",
   alt:{q:"ITS（Intelligent Transport Systems）とは、過去の交通実績データの統計分析により、道路の拡幅整備計画を立案するためのシステムのことである。",ans:false},
   ans:true,
   exp:"ITS（高度道路交通システム）：AI・IoT・GPS・通信等の最先端情報通信技術を道路交通に活用し、交通事故削減・渋滞緩和・環境負荷低減・物流効率化等を実現するシステムの総称。ETC・カーナビ・信号制御・自動運転等が含まれる。単なる統計分析・道路整備計画とは異なる。"},
  {subject:"計画",topic:"都市計画",
   q:"エリアマネジメントは、地域の住民・事業者・地権者等が主体となり、地域における良好な環境や地域の価値を維持・向上させるための取組みのことである。",
   alt:{q:"エリアマネジメントは、行政主導により地域における良好な環境や地域の価値を維持・向上させるための取組みのことである。",ans:false},
   ans:true,
   exp:"エリアマネジメント：地域の良好な環境形成・価値向上を目的として、住民・事業者・地権者等の地域の関係者が主体的に参加・運営する取組み。BID（Business Improvement District）等の仕組みも類似概念。行政だけが主導するのではなく、地域の多様な主体が協働することが特徴。"},
  {subject:"計画",topic:"建築実例",
   q:"千里ニュータウン（大阪府）は、近隣住区論に基づいて計画され、住区ごとに小学校・公園・商業施設等が配置された、我が国最初のニュータウンである。",
   alt:{q:"千里ニュータウン（大阪府）は、近隣住区の単位にはとらわれず、将来のワンセンター方式への移行等が意図された計画である。",ans:false},
   ans:true,
   exp:"千里ニュータウン（1962年入居開始）：クラレンス・ペリーの近隣住区論を採用し、住区（約4,000〜6,000人規模）ごとに小学校・公園・近隣商業施設を配置した我が国初のニュータウン。「近隣住区にとらわれず」というのは誤りで、むしろ近隣住区論の典型的な実践例として知られる。"},
  {subject:"計画",topic:"建築実例",
   q:"筑波研究学園都市（茨城県）は、東京への一極集中を緩和するために、研究機関と居住環境を一体的に整備した、科学技術の振興を目的とした計画都市である。",
   alt:{q:"筑波研究学園都市（茨城県）は、東京への一極集中を促進するために、首都機能を集約した副都心として構想されたものである。",ans:false},
   ans:true,
   exp:"筑波研究学園都市（1963年閣議決定）：東京圏の過度集中を緩和しつつ学術研究機能を強化するため、茨城県南部に国・大学等の研究機関と住居・商業施設を計画的に整備した科学都市。約300の研究機関が立地。首都機能の集約ではなく分散・研究機能集積が目的。"},
  {subject:"計画",topic:"建築史",
   q:"パルテノン神殿（アテネ）は、外周にドリス式の円柱が並ぶ、古代ギリシアを代表するペリプテロス（外柱式）の神殿である。",
   alt:{q:"パルテノン神殿（アテネ）は、外周にドリス式の円柱が並び、クリアストーリーと呼ばれる高窓をとおして神室内に光を取り入れた、古代ギリシアの建築物である。",ans:false},
   ans:true,
   exp:"パルテノン神殿（BC447〜432年、フェイディアス監督・イクティノス設計）は外周に46本のドリス式円柱を持つ外柱式（ペリプテロス）神殿の傑作。クリアストーリー（高窓）は採光のための建築要素だが、これはゴシック大聖堂やバシリカ式教会で発達した手法。パルテノン神殿は扉口からの自然光と内部に設けた開口を用いており、クリアストーリーを持たない。"},
  {subject:"計画",topic:"建築史",
   q:"サン・ピエトロ大聖堂（ヴァチカン）は、ブラマンテ・ミケランジェロらが設計に関わったルネサンス・バロック建築の代表作で、大ドームと長大な身廊をもつラテン十字形の平面構成をとる。",
   alt:{q:"サン・ピエトロ大聖堂（ヴァチカン）は、身廊部と袖廊部がともに三廊式であり、内陣には周歩廊と放射状に並ぶ複数の祭室とをもつゴシック建築である。",ans:false},
   ans:true,
   exp:"サン・ピエトロ大聖堂（1506年着工・1626年完成）はブラマンテ（集中式案）・ミケランジェロ（大ドーム設計）・マデルノ（身廊延伸）・ベルニーニ（楕円形広場・天蓋）らが関わったルネサンス・バロックの最高傑作。「周歩廊と放射状祭室をもつ三廊式」はノートルダム・ド・パリ等のゴシック大聖堂の平面構成の特徴。"},
  {subject:"計画",topic:"建築史",
   q:"フランクリン街のアパート（パリ）は、オーギュスト・ペレによって設計された集合住宅であり、構造を鉄筋コンクリート造とした初期の集合住宅とされている。",
   alt:{q:"フランクリン街のアパート（パリ）は、ルイス・サリヴァンによって設計された集合住宅であり、構造を鉄筋コンクリート造とした初期の集合住宅とされている。",ans:false},
   ans:true,
   exp:"フランクラン街25番地のアパルトマン（パリ、1903年）はオーギュスト・ペレ（Auguste Perret）設計。RC造の構造フレームを外観に表現した先駆的な集合住宅。ルイス・サリヴァンは「フォーム・フォローズ・ファンクション」で知られるシカゴ派の建築家で設計者ではない。"},
  {subject:"計画",topic:"建築実例",
   q:"倉敷アイビースクエア（岡山県）は、明治時代に建設された旧倉敷紡績工場の建屋をホテル・文化施設として改修・再生させたもので、ツタが這う赤レンガの外観が特徴である。",
   alt:{q:"倉敷アイビースクエア（岡山県）は、明治初期に建設された工場を商業施設に改修し、中央に設けたガラス屋根のアトリウムを市民に開放することで、公共性の高い空間を実現したものである。",ans:false},
   ans:true,
   exp:"倉敷アイビースクエア（1974年開館）：旧倉敷紡績所（1889年・明治22年創業）の工場建屋を改修・転用した複合施設。ホテル鶴形・文化施設・記念館等で構成。ツタ（アイビー）が外壁を覆う赤レンガの外観が名称・特徴。ガラス屋根のアトリウムは主要な特徴ではなく、「商業施設への改修」も正確ではない。"},
  {subject:"計画",topic:"建築実例",
   q:"目黒区総合庁舎（東京都目黒区）は、民間企業の本社屋として建築された建築物を、耐震補強、設備改修等を行ったうえで、庁舎として再生・転用したものである。",
   alt:{q:"目黒区総合庁舎（東京都目黒区）は、新たに建設された専用庁舎であり、耐震性・機能性を高めた現代的な行政建築の事例である。",ans:false},
   ans:true,
   exp:"目黒区総合庁舎：旧千代田生命保険相互会社本社ビル（村野藤吾設計、1966年竣工）を目黒区が取得し、耐震補強・設備改修等を行って1987年に区の庁舎として転用。既存建物の有効活用と歴史的建築の保全を両立した先駆的な事例。"},
  {subject:"計画",topic:"建築実例",
   q:"リンゴット工場再開発計画（イタリア　トリノ）は、フィアット社の巨大な自動車工場をレンゾ・ピアノの設計によりショッピングモール・ホテル・コンサートホール等の複合施設として再生させたものである。",
   alt:{q:"リンゴット工場再開発計画（イタリア　トリノ）は、20世紀初頭に建設された巨大な自動車工場を、現代美術館として保存・再生させたものである。",ans:false},
   ans:true,
   exp:"リンゴット（Lingotto）工場（1923年完成、設計：マッテ＝トルッコ）はフィアット社の自動車工場で屋上試走路が有名。1984年に生産終了後、レンゾ・ピアノの設計（1989年〜）によりショッピングモール・コンサートホール（ジョヴァンニ・アニェリ）・ホテル・展示場等の複合施設として再開発。「現代美術館」単独への転用ではない。"},
 // ── 施工苦手問題フラッシュカード（IMG_3047〜3085）──
 {subject:"施工",topic:"断熱工事",
  q:"ロックウールフェルトの密度は20kg/m³以上のものを使用する。",
  alt:{q:"ロックウールフェルトの密度は10kg/m³以上のものを使用する。",ans:false},
  ans:true,
  exp:"ロックウールフェルトは密度が高いほど断熱・吸音性能が安定する。建築工事監理指針では密度20kg/m³以上のものを使用する。10kg/m³では性能不足となる。"},
 {subject:"施工",topic:"給排水設備工事",
  q:"排水トラップの封水深さは50〜100mmとする。",
  alt:{q:"排水トラップの封水深さは30〜50mmとする。",ans:false},
  ans:true,
  exp:"排水トラップの封水深さは50mm以上100mm以下（5〜10cm）と規定されている。30〜50mmでは封水が薄すぎてサイホン現象や蒸発による破封が起きやすく、臭気・害虫の逆流につながる。"},
 {subject:"施工",topic:"軽量鉄骨工事",
  q:"軽量鉄骨壁下地のスタッドは、上部ランナーの上端から10mm以内のすき間をあけて差し込む。",
  alt:{q:"軽量鉄骨壁下地のスタッドは、上部ランナーの上端から20mm以内のすき間をあけて差し込む。",ans:false},
  ans:true,
  exp:"JASS 26の規定では、スタッドの上端はランナー上端から10mm以内のすき間を設けて差し込む。これはスラブのたわみ・振動を壁に伝えないためのスライド機構。20mmでは隙間が大きすぎる。"},
 {subject:"施工",topic:"軽量鉄骨工事",
  q:"軽量鉄骨天井下地において、吊りボルトの間隔は900mm程度とし、端部の吊りボルトは端から150mm以内に取り付ける。",
  alt:{q:"軽量鉄骨天井下地において、吊りボルトの間隔は1,200mm程度とし、端部の吊りボルトは端から300mm以内に取り付ける。",ans:false},
  ans:true,
  exp:"JASS 26では吊りボルト間隔は900mm程度とし、端部では端から150mm以内に取り付ける。1,200mm間隔では野縁受けのたわみが増大し、端部300mmでは端部剛性が不十分となる。"},
 {subject:"施工",topic:"軽量鉄骨工事",
  q:"軽量鉄骨天井下地において、段違い部の斜め補強は600mm以下の間隔で取り付ける。",
  alt:{q:"軽量鉄骨天井下地において、段違い部の斜め補強は900mm以下の間隔で取り付ける。",ans:false},
  ans:true,
  exp:"JASS 26では段差（段違い）部の斜め補強は600mm以下の間隔で設ける。900mm以下では補強効果が不十分で、段差部の変形や振れが生じやすい。"},
 {subject:"施工",topic:"軽量鉄骨工事",
  q:"軽量鉄骨天井下地において、吊りボルトのふところが1.5m以上となる場合は、振れ止め補強を設ける。",
  alt:{q:"軽量鉄骨天井下地において、吊りボルトのふところが2.0m以上となる場合は、振れ止め補強を設ける。",ans:false},
  ans:true,
  exp:"JASS 26では吊りボルトのふところ（天井裏の高さ）が1.5m以上の場合に振れ止め補強を設けることが規定されている。2.0mを基準とするのは誤りで、1.5m以上で対応が必要。"},
 {subject:"施工",topic:"ダクト工事",
  q:"ダクトの吊り金物は、フランジ部分を避けてダクト本体の側面に取り付けた。",
  alt:{q:"ダクトの吊り金物は、ダクトのフランジ部分に取り付けた。",ans:false},
  ans:true,
  exp:"ダクトのフランジ部は継手であり変形しやすい。吊り金物はフランジを避けてダクト本体の側面または底面に取り付けるのが正しい。フランジ部に取り付けると変形・破損のおそれがある。"},
 {subject:"施工",topic:"軽量鉄骨工事",
  q:"軽量鉄骨天井下地において、野縁のはね出しは150mm以下とした。",
  alt:{q:"軽量鉄骨天井下地において、野縁のはね出しは180mm以下とした。",ans:false},
  ans:true,
  exp:"JASS 26では野縁のはね出し（端部の張り出し長さ）は150mm以下とする。180mmを超えると端部の剛性が確保できず、たわみや振れが生じやすい。"},
 {subject:"施工",topic:"ガラス工事",
  q:"網入りガラスの小口の防錆処理は、ガラス全高の1/4の範囲に施す。",
  alt:{q:"網入りガラスの小口の防錆処理は、ガラス全高の1/2の範囲に施す。",ans:false},

let quizMode = 'all';   // 'all' | 'weighted' | 'wrong' | 'new'

// ─── 問題別履歴（localStorage）───
const HIST_KEY = 'mb_question_history';
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '{}'); } catch(e) { return {}; }
}
function saveHistory(h) {
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
}
function qKey(q) { return (q._origQ || q.q).slice(0, 40); }
function recordAnswer(q, isCorrect) {
  const h = getHistory();
  const k = qKey(q);
  if (!h[k]) h[k] = {o:0, x:0};
  if (isCorrect) h[k].o++; else h[k].x++;
  saveHistory(h);
}
function getQStats(q) {
  const h = getHistory();
  return h[qKey(q)] || {o:0, x:0};
}

// ─── 初期化 ───
const subjects = [...new Set(ALL_Q.map(q => q.subject))];
const topics   = [...new Set(ALL_Q.map(q => q.topic))];

function setMode(mode, btn) {
  quizMode = mode;
  document.querySelectorAll('[id^="mode-"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateCount();
}

function setCount(n, btn) {
  quizCount = n;
  document.querySelectorAll('[id^="cnt-"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateCount();
}

function getTotalAccuracy() {
  const h = getHistory();
  let o = 0, x = 0;
  ALL_Q.forEach(q => {
    const s = h[qKey(q)];
    if (s) { o += s.o; x += s.x; }
  });
  return { o, x, total: o + x };
}

function getSubjectAccuracy(subject) {
  const h = getHistory();
  let o = 0, x = 0;
  ALL_Q.filter(q => q.subject === subject).forEach(q => {
    const s = h[qKey(q)];
    if (s) { o += s.o; x += s.x; }
  });
  return { o, x, total: o + x };
}

function renderAccRow() {
  const el = document.getElementById('acc-row');
  if (selectedSubjects.size === 0) { el.innerHTML = ''; return; }
  const h = getHistory();
  let html = '';
  selectedSubjects.forEach(subj => {
    const { o, x, total } = getSubjectAccuracy(subj);
    const pct = total ? Math.round(o / total * 100) : null;
    const subjQs = ALL_Q.filter(q => q.subject === subj);
    const totalQ = subjQs.length;
    const answered = subjQs.filter(q => h[qKey(q)]).length;
    const unanswered = totalQ - answered;
    const unansweredStr = `<span style="color:#e67e22;font-weight:700">未回答 ${unanswered}問</span><span style="color:#888;font-size:11px"> / 全${totalQ}問</span>`;
    if (total === 0) {
      html += `<span class="acc-title">${subj}</span><div style="margin-bottom:4px">${unansweredStr}</div>`;
    } else {
      html += `
        <span class="acc-title">${subj}</span>
        <span class="acc-pct">${pct}%</span>
        <div class="acc-bar-wrap">
          <div class="acc-bar-bg"><div class="acc-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <span class="acc-detail">○${o} / ×${x} (計${total}回答)</span>
        <div style="margin-bottom:6px">${unansweredStr}</div>`;
    }
  });
  el.innerHTML = html;
}

// 科目→トピック のマップ
const subjectTopics = {};
ALL_Q.forEach(q => {
  if (!subjectTopics[q.subject]) subjectTopics[q.subject] = new Set();
  subjectTopics[q.subject].add(q.topic);
});

function init() {
  const st = document.getElementById('subject-tags');

  subjects.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tag'; btn.textContent = s; btn.dataset.val = s;
    btn.onclick = () => { toggleSubject(s, btn); };
    st.appendChild(btn);
  });

  // 初期表示：最初の科目を選択した状態にする
  const firstBtn = document.querySelector('#subject-tags .tag');
  if (firstBtn) toggleSubject(subjects[0], firstBtn);
  renderAccRow();
}

function rebuildTopicTags() {
  const tt = document.getElementById('topic-tags');
  tt.innerHTML = '';
  // 選択中の科目に属するトピックだけ表示
  const visibleTopics = new Set();
  selectedSubjects.forEach(s => {
    (subjectTopics[s] || new Set()).forEach(t => visibleTopics.add(t));
  });
  // ALL_Q の順序に合わせて並べる
  topics.forEach(t => {
    if (!visibleTopics.has(t)) return;
    const btn = document.createElement('button');
    btn.className = 'tag topic-tag'; btn.textContent = t; btn.dataset.val = t;
    if (selectedTopics.has(t)) btn.classList.add('active');
    btn.onclick = () => { toggleTopic(t, btn); };
    tt.appendChild(btn);
  });
}

function toggleSubject(s, btn) {
  // ラジオ式：他を全解除してこの科目だけ選択
  selectedSubjects.clear();
  selectedTopics.clear();
  document.querySelectorAll('#subject-tags .tag').forEach(b => b.classList.remove('active'));
  selectedSubjects.add(s);
  btn.classList.add('active');
  (subjectTopics[s] || new Set()).forEach(t => selectedTopics.add(t));
  rebuildTopicTags();
  renderAccRow();
  updateCount();
}

function toggleTopic(t, btn) {
  if (selectedTopics.has(t)) { selectedTopics.delete(t); btn.classList.remove('active'); }
  else { selectedTopics.add(t); btn.classList.add('active'); }
  updateCount();
}

function selectAll() {
  // 現在選択中の科目のトピックをすべて選択
  selectedSubjects.forEach(s => {
    (subjectTopics[s] || new Set()).forEach(t => selectedTopics.add(t));
  });
  rebuildTopicTags();
  updateCount();
}

function getFilteredQ() {
  let qs = ALL_Q.filter(q => selectedSubjects.has(q.subject) && selectedTopics.has(q.topic));
  if (quizMode === 'wrong') {
    const h = getHistory();
    qs = qs.filter(q => { const s = h[qKey(q)]; return s && s.x > 0; });
  } else if (quizMode === 'new') {
    const h = getHistory();
    qs = qs.filter(q => { const s = h[qKey(q)]; return !s || (s.o === 0 && s.x === 0); });
  }
  // 'weighted' は全問対象（startQuiz 内で比率調整）
  return qs;
}

function updateCount() {
  const qs = getFilteredQ();
  if (quizMode === 'weighted') {
    const h = getHistory();
    const weak = qs.filter(q => { const s = h[qKey(q)]; return s && s.x > 0; }).length;
    const n = quizCount > 0 ? Math.min(quizCount, qs.length) : qs.length;
    document.getElementById('count-badge').textContent = `${n}問（苦手優先 / 苦手${weak}問）`;
  } else {
    const n = quizCount > 0 ? Math.min(quizCount, qs.length) : qs.length;
    const modeNote = quizMode === 'wrong' ? '（苦手）' : quizMode === 'new' ? '（未回答）' : '';
    document.getElementById('count-badge').textContent = n + '問' + modeNote;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildWeightedQueue(allQ, targetCount) {
  const h = getHistory();
  const weak   = allQ.filter(q => { const s = h[qKey(q)]; return s && s.x > 0; });
  const normal = allQ.filter(q => { const s = h[qKey(q)]; return !s || s.x === 0; });
  if (weak.length === 0) return shuffle(allQ).slice(0, targetCount);
  // 苦手 70% / その他 30%（端数は stochastic rounding で処理）
  const weakTarget   = Math.round(targetCount * 0.7);
  const normalTarget = targetCount - weakTarget;
  const weakPicked   = shuffle(weak).slice(0, Math.min(weakTarget, weak.length));
  const normalPicked = shuffle(normal).slice(0, Math.min(normalTarget, normal.length));
  // 足りない分を補完
  const picked = [...weakPicked, ...normalPicked];
  if (picked.length < targetCount) {
    const used = new Set(picked.map(q => qKey(q)));
    const rest = shuffle(allQ).filter(q => !used.has(qKey(q)));
    picked.push(...rest.slice(0, targetCount - picked.length));
  }
  return shuffle(picked); // 順番をランダム化
}

function startQuiz() {
  const filtered = getFilteredQ();
  if (!filtered.length) {
    if (quizMode === 'wrong') alert('苦手問題がありません。まず通常モードで問題を解いてください。');
    else if (quizMode === 'new') alert('未回答の問題がありません。すべての問題を解き終えています。');
    else alert('問題がありません。分野を選択してください。');
    return;
  }
  let shuffled;
  if (quizMode === 'weighted') {
    const target = quizCount > 0 ? Math.min(quizCount, filtered.length) : filtered.length;
    shuffled = buildWeightedQueue(filtered, target);
  } else {
    shuffled = shuffle(filtered);
    if (quizCount > 0) shuffled = shuffled.slice(0, quizCount);
  }
  queue = shuffled.map(q => {
    if (q.alt && Math.random() < 0.5) {
      return {...q, q: q.alt.q, ans: q.alt.ans, _origQ: q.q};
    }
    return {...q, _origQ: q.q};
  });
  current = 0; correct = 0; answered = 0;
  document.getElementById('filter-section').classList.add('hidden');
  document.getElementById('score-bar').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('quiz-area');
  if (current >= queue.length) { showFinish(); return; }
  updateScore();
  const q = queue[current];
  const st = getQStats(q);
  const hasHistory = st.o + st.x > 0;
  const histHtml = hasHistory
    ? `<span class="hist-stat"><span class="hist-o">○${st.o}</span> <span class="hist-x">×${st.x}</span></span>`
    : `<span class="hist-stat" style="color:#ccc">初回</span>`;
  area.innerHTML = `
    <div class="q-card" id="current-card">
      <div class="q-meta">
        <span>${q.subject}</span><span>${q.topic}</span>
        <span>${current+1} / ${queue.length}</span>
        ${histHtml}
      </div>
      <div class="q-text">${q.q}</div>
      <div class="ans-row">
        <button class="ans-btn maru" onclick="answer(true, this)" id="btn-maru">○</button>
        <button class="ans-btn batsu" onclick="answer(false, this)" id="btn-batsu">×</button>
      </div>
      <div class="result-box" id="result-box"></div>
      <button class="btn btn-primary next-btn" id="next-btn" onclick="nextQ()">次の問題 →</button>
    </div>`;
}

function answer(selected, btn) {
  const q = queue[current];
  const isCorrect = (selected === q.ans);
  answered++;
  if (isCorrect) correct++;
  recordAnswer(q, isCorrect);

  document.getElementById('btn-maru').disabled = true;
  document.getElementById('btn-batsu').disabled = true;

  const maruBtn = document.getElementById('btn-maru');
  const batsuBtn = document.getElementById('btn-batsu');
  const correctBtn = q.ans ? maruBtn : batsuBtn;

  correctBtn.classList.add('correct');
  if (!isCorrect) btn.classList.add('wrong');
  btn.classList.add('selected');

  const rb = document.getElementById('result-box');
  rb.className = 'result-box ' + (isCorrect ? 'correct' : 'wrong');
  rb.innerHTML = `<div class="verdict">${isCorrect ? '✓ 正解！' : '✗ 不正解'}</div>
    <div class="exp-text">${q.exp}</div>`;
  rb.style.display = 'block';

  document.getElementById('next-btn').style.display = 'block';
  updateScore();
}

function nextQ() {
  current++;
  renderQuestion();
}

function updateScore() {
  document.getElementById('score-disp').textContent = `${correct} / ${answered}`;
  const accPct = answered ? Math.round(correct / answered * 100) : null;
  document.getElementById('acc-disp').textContent = accPct !== null ? accPct + '%' : '－';
  const pct = queue.length ? Math.round(current / queue.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${current} / ${queue.length} 問`;
}

function endQuiz() {
  showFinish();
}

function backToFilter() {
  document.getElementById('finish-card').classList.add('hidden');
  document.getElementById('score-bar').classList.add('hidden');
  document.getElementById('quiz-area').innerHTML = '';
  document.getElementById('filter-section').classList.remove('hidden');
  renderAccRow();
  updateCount();
}

function showFinish() {
  document.getElementById('quiz-area').innerHTML = '';
  document.getElementById('score-bar').classList.add('hidden');
  const fc = document.getElementById('finish-card');
  fc.classList.remove('hidden');
  const pct = answered ? Math.round(correct/answered*100) : 0;
  const { o, x, total } = getTotalAccuracy();
  const allPct = total ? Math.round(o/total*100) : 0;
  document.getElementById('finish-score').textContent = `${correct} / ${answered}`;
  document.getElementById('finish-sub').innerHTML =
    `今回の正答率 <strong>${pct}%</strong>　（${queue.length}問中 ${answered}問回答）<br>
     <span style="font-size:12px;color:#aaa;margin-top:4px;display:block">
       累計正答率 ${allPct}%（○${o} / ×${x}、計${total}回）
     </span>`;
}

// ─── マイリスト ───
let mylistActiveSubject = null;

function showMylist() {
  const h = getHistory();
  // 2回以上間違えた問題を抽出（base question を使用）
  const weak2 = ALL_Q.filter(q => {
    const s = h[qKey(q)];
    return s && s.x >= 2;
  });

  const overlay = document.getElementById('mylist-overlay');
  const tabsEl  = document.getElementById('mylist-tabs');
  const bodyEl  = document.getElementById('mylist-body');

  // 科目タブ生成
  const subjectsInList = [...new Set(weak2.map(q => q.subject))];
  // 初期タブ：選択中科目が含まれていればそちら、なければ最初
  if (!mylistActiveSubject || !subjectsInList.includes(mylistActiveSubject)) {
    mylistActiveSubject = subjectsInList.length > 0 ? subjectsInList[0] : null;
  }

  function renderTabs() {
    tabsEl.innerHTML = subjectsInList.length === 0 ? '' :
      subjectsInList.map(s =>
        `<button class="mylist-tab${s === mylistActiveSubject ? ' active' : ''}"
          onclick="mylistSelectSubject('${s}')">${s}
          <span style="font-size:10px;opacity:.7">${weak2.filter(q=>q.subject===s).length}問</span>
        </button>`
      ).join('');
  }

  function renderBody() {
    if (weak2.length === 0) {
      bodyEl.innerHTML = `<div class="mylist-empty">まだ2回以上間違えた問題はありません。<br>問題を解いていくとここに追加されます。</div>`;
      return;
    }
    const target = mylistActiveSubject
      ? weak2.filter(q => q.subject === mylistActiveSubject)
      : weak2;
    if (target.length === 0) {
      bodyEl.innerHTML = `<div class="mylist-empty">この科目には該当問題がありません。</div>`;
      return;
    }
    // トピックごとにグループ化
    const byTopic = {};
    target.forEach(q => {
      if (!byTopic[q.topic]) byTopic[q.topic] = [];
      byTopic[q.topic].push(q);
    });
    let html = '';
    Object.entries(byTopic).forEach(([topic, qs]) => {
      html += `<div class="mylist-subject-head">${topic}</div>`;
      qs.forEach(q => {
        const s = h[qKey(q)] || {o:0,x:0};
        // 正答の状態（○＝正しい文）を優先表示
        let displayQ;
        if (q.ans === true) {
          displayQ = q.q;                          // base が正しい文
        } else if (q.alt && q.alt.ans === true) {
          displayQ = q.alt.q;                      // alt が正しい文
        } else {
          displayQ = q.q;                          // どちらも×の場合は base
        }
        html += `<div class="mylist-item">
          <div class="mylist-ans maru">○</div>
          <div class="mylist-q">
            <div class="mylist-topic">${q.topic}</div>
            ${displayQ}
          </div>
          <div class="mylist-stat"><span style="color:#e74c3c">○${s.o}</span> <span style="color:#3498db">×${s.x}</span></div>
        </div>`;
      });
    });
    bodyEl.innerHTML = html;
  }

  // グローバルに公開（タブクリック用）
  window.mylistSelectSubject = function(s) {
    mylistActiveSubject = s;
    renderTabs();
    renderBody();
    bodyEl.scrollTop = 0;
  };

  renderTabs();
  renderBody();
  overlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeMylist() {
  document.getElementById('mylist-overlay').classList.add('hidden');
  document.body.style.overflow = '';
}

function closeMylistOnBg(e) {
  if (e.target === document.getElementById('mylist-overlay')) closeMylist();
}

init();
</script>
